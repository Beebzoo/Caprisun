  // --- Trivia quiz ---------------------------------------------------------

  const QUIZ_CATEGORIES = [
    { key: 'history',    label: 'History' },
    { key: 'geography',  label: 'Geography' },
    { key: 'science',    label: 'Science' },
    { key: 'literature', label: 'Literature' },
    { key: 'media',      label: 'Media' },
    { key: 'art',        label: 'Art' },
    { key: 'sports',     label: 'Sports' },
    { key: 'language',   label: 'Language' },
  ];
  const QUIZ_BATCH_SIZE = 10;

  let quizQuestions = null; // cached array after first fetch
  let quizQuestionsLoading = null; // in-flight promise

  function loadQuizQuestions() {
    if (quizQuestions) return Promise.resolve(quizQuestions);
    if (quizQuestionsLoading) return quizQuestionsLoading;
    quizQuestionsLoading = fetch('quiz-questions.json')
      .then(r => { if (!r.ok) throw new Error('Could not load questions'); return r.json(); })
      .then(data => { quizQuestions = data; return data; })
      .catch(err => { quizQuestionsLoading = null; throw err; });
    return quizQuestionsLoading;
  }

  function pickBatch(all, category) {
    const pool = category ? all.filter(q => q.category === category) : all.slice();
    const seen = state.quizSeen || {};
    // Sort by "last seen" ascending (unseen = '' = first)
    pool.sort((a, b) => {
      const sa = seen[a.id] || '';
      const sb = seen[b.id] || '';
      if (sa !== sb) return sa.localeCompare(sb);
      return Math.random() - 0.5;
    });
    // Take the first N least-recently-seen, then shuffle the slice for order variety
    const picked = pool.slice(0, QUIZ_BATCH_SIZE);
    for (let i = picked.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [picked[i], picked[j]] = [picked[j], picked[i]];
    }
    return picked;
  }

  function answerShape(answer) {
    const raw = (answer || '').trim();
    if (!raw) return 'phrase';
    // Strip trailing parenthetical detail and em-dash commentary for shape check
    let main = raw.replace(/\s*\([^)]*\)/g, ' ').replace(/\s*—.*$/, '').trim();
    if (!main) return 'phrase';
    // Year (with optional era suffix)
    if (/^\d{3,4}s?(\s*(BC|BCE|AD|CE))?$/i.test(main)) return 'year';
    // Year with trailing text ("1989 and beyond")
    if (/^\d{3,4}(\s|$)/.test(main)) return 'year';
    // Pure number with optional unit
    if (/^~?[-+]?\d+(\.\d+)?\s*[a-zA-Z%°·/]*$/.test(main)) return 'number';
    if (/^~?\d[\d,\.]*\s*(million|billion|thousand|percent|%|°C|°F|m|km|kg|years|days)?$/i.test(main)) return 'number';
    // Quote
    if (raw.startsWith('"') || raw.startsWith('“') || raw.startsWith('‘')) return 'quote';
    return 'phrase';
  }

  function answerWordCount(a) {
    const stripped = (a || '').replace(/[()""''“”‘’]/g, '');
    const m = stripped.match(/\S+/g);
    return m ? m.length : 0;
  }

  function lengthBucket(n) {
    if (n <= 2) return 'tiny';
    if (n <= 5) return 'short';
    if (n <= 12) return 'medium';
    return 'long';
  }

  function buildChoices(q, all) {
    // Prefer the curated options shipped with the question.
    if (q.options && q.correct_letter) {
      const letters = ['a', 'b', 'c', 'd'];
      const curated = letters
        .map(l => q.options[l])
        .filter(v => typeof v === 'string' && v.trim().length > 0);
      const correctOption = q.options[q.correct_letter];
      if (curated.length >= 2 && typeof correctOption === 'string' && correctOption.length > 0) {
        const options = curated.slice();
        for (let i = options.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [options[i], options[j]] = [options[j], options[i]];
        }
        return { options, correctOption };
      }
    }

    const correctShape = answerShape(q.answer);
    const correctLen = lengthBucket(answerWordCount(q.answer));
    const sameCat = all.filter(o => o.category === q.category && o.id !== q.id);

    const tier = (o) => {
      const s = answerShape(o.answer);
      const l = lengthBucket(answerWordCount(o.answer));
      if (s === correctShape && l === correctLen) return 0;
      if (s === correctShape) return 1;
      if (l === correctLen) return 2;
      return 3;
    };

    // Sort by tier, break ties randomly
    const ranked = sameCat
      .map(o => ({ o, t: tier(o), r: Math.random() }))
      .sort((a, b) => a.t - b.t || a.r - b.r)
      .map(x => x.o);

    const distractors = [];
    const seen = new Set([(q.answer || '').toLowerCase().trim()]);
    for (const other of ranked) {
      const a = (other.answer || '').trim();
      const key = a.toLowerCase();
      if (!seen.has(key)) {
        distractors.push(a);
        seen.add(key);
      }
      if (distractors.length === 3) break;
    }

    // Final fallback: any category, same shape (rare — e.g. thin quote pool)
    if (distractors.length < 3) {
      const rest = all.filter(o => o.id !== q.id && answerShape(o.answer) === correctShape);
      for (let i = rest.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      for (const other of rest) {
        const a = (other.answer || '').trim();
        const key = a.toLowerCase();
        if (!seen.has(key)) {
          distractors.push(a);
          seen.add(key);
        }
        if (distractors.length === 3) break;
      }
    }

    const options = [...distractors, q.answer];
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    return { options, correctOption: q.answer };
  }

  function normalizeAns(s) {
    return (s || '')
      .toLowerCase()
      .replace(/\([^)]*\)/g, ' ')
      .replace(/[.,;:!?—\-–()\[\]{}"'`“”‘’]/g, ' ')
      .replace(/\b(the|a|an)\b/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function acceptableAnswers(correct) {
    const variants = new Set();
    const raw = correct || '';
    variants.add(normalizeAns(raw));
    const pm = raw.match(/\(([^)]+)\)/);
    if (pm) variants.add(normalizeAns(pm[1]));
    variants.add(normalizeAns(raw.replace(/[()]/g, ' ')));
    // Split "X and Y" as alternates so partial credit is possible
    const noParens = normalizeAns(raw.replace(/\([^)]*\)/g, ' '));
    for (const sep of [' and ', ' or ', ' / ']) {
      if (noParens.includes(sep)) {
        noParens.split(sep).forEach(part => variants.add(part.trim()));
      }
    }
    return [...variants].filter(v => v && v.length > 0);
  }

  function isTypedCorrect(userInput, correctAnswer) {
    const u = normalizeAns(userInput);
    if (!u || u.length < 2) return false;
    const variants = acceptableAnswers(correctAnswer);
    for (const v of variants) {
      if (v === u) return true;
      // Accept meaningful substring matches: user-typed is a substring of variant,
      // and covers at least half the variant (so "aug" doesn't pass for "augustus").
      if (v.includes(u) && u.length >= 4 && u.length >= v.length * 0.5) return true;
      if (u.includes(v) && v.length >= 4) return true;
    }
    return false;
  }

  function renderPlayTile() {
    const sub = document.getElementById('play-sub');
    if (!sub) return;
    const s = state.quizStats || {};
    if (typeof s.lastScore === 'number' && s.lastPlayedAt) {
      const best = s.bestScore || 0;
      sub.textContent = `Last round ${s.lastScore}/10 · Best ${best}/10`;
    } else {
      sub.textContent = 'How many can you get?';
    }
  }

  function categoryCounts() {
    const out = {};
    for (const c of QUIZ_CATEGORIES) out[c.key] = 0;
    if (quizQuestions) {
      for (const q of quizQuestions) {
        if (out[q.category] !== undefined) out[q.category]++;
      }
    }
    return out;
  }

  function openQuizHub() {
    openSheet(`
      <h2>Trivia</h2>
      <p class="subtle">A round of 10. Pick a category or roll everything together.</p>
      <div id="quiz-hub-body">
        <p class="subtle">Loading questions…</p>
      </div>
    `);
    loadQuizQuestions()
      .then(renderQuizHubBody)
      .catch(err => {
        const body = document.getElementById('quiz-hub-body');
        if (body) body.innerHTML = `<p class="subtle" style="color:var(--terracotta)">${(err && err.message) || 'Could not load questions.'}</p>
          <div class="sheet-actions"><button class="btn btn-ghost" id="cancel">Close</button></div>`;
        const cancel = document.getElementById('quiz-hub-body')?.querySelector('#cancel');
        if (cancel) cancel.addEventListener('click', closeSheet);
      });
  }

  const QUIZ_MODES = [
    { key: 'choice', label: 'Multiple choice', sub: 'Four options' },
    { key: 'typed',  label: 'Type answer',    sub: 'Free text' },
    { key: 'flash',  label: 'Flash card',     sub: 'Self-rate' },
  ];

  function renderQuizHubBody() {
    const body = document.getElementById('quiz-hub-body');
    if (!body) return;
    const counts = categoryCounts();
    const total = quizQuestions.length;
    const s = state.quizStats || {};
    const prefs = state.quizPrefs || { mode: 'choice', category: null };
    const rate = s.questionsSeen > 0 ? Math.round((s.questionsCorrect / s.questionsSeen) * 100) : null;

    let selectedCat = prefs.category || null;
    let selectedMode = prefs.mode || 'choice';

    const renderCats = () => `
      <button class="cat-chip ${selectedCat === null ? 'on' : ''}" data-cat="">
        All<span class="ccount">${total} questions</span>
      </button>
      ${QUIZ_CATEGORIES.map(c => `
        <button class="cat-chip ${selectedCat === c.key ? 'on' : ''}" data-cat="${c.key}">
          ${c.label}<span class="ccount">${counts[c.key]} questions</span>
        </button>
      `).join('')}
    `;

    const renderModes = () => QUIZ_MODES.map(m => `
      <button class="cat-chip ${selectedMode === m.key ? 'on' : ''}" data-mode="${m.key}">
        ${m.label}<span class="ccount">${m.sub}</span>
      </button>
    `).join('');

    body.innerHTML = `
      <div class="summary-grid" style="margin-bottom:18px">
        <div class="summary-tile">
          <p class="slabel">Games played</p>
          <p class="svalue">${s.gamesPlayed || 0}</p>
        </div>
        <div class="summary-tile">
          <p class="slabel">Best round</p>
          <p class="svalue">${s.bestScore || 0}<small>/ 10</small></p>
        </div>
        <div class="summary-tile wide">
          <p class="slabel">Lifetime correct</p>
          <p class="svalue">${rate !== null ? rate + '%' : '—'}<small>${s.questionsCorrect || 0} of ${s.questionsSeen || 0}</small></p>
        </div>
      </div>

      <p class="sheet-section-label">Mode</p>
      <div class="cat-grid" id="mode-grid">${renderModes()}</div>

      <p class="sheet-section-label" style="margin-top:18px">Category</p>
      <div class="cat-grid" id="cat-grid">${renderCats()}</div>

      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="cancel">Close</button>
        <button class="btn btn-primary" id="start">Play 10</button>
      </div>
    `;

    const catGrid = body.querySelector('#cat-grid');
    catGrid.addEventListener('click', (e) => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      selectedCat = chip.dataset.cat || null;
      catGrid.innerHTML = renderCats();
    });
    const modeGrid = body.querySelector('#mode-grid');
    modeGrid.addEventListener('click', (e) => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      selectedMode = chip.dataset.mode;
      modeGrid.innerHTML = renderModes();
    });

    body.querySelector('#cancel').addEventListener('click', closeSheet);
    body.querySelector('#start').addEventListener('click', () => {
      const batch = pickBatch(quizQuestions, selectedCat);
      if (batch.length === 0) { alert('No questions available for that selection.'); return; }
      state.quizPrefs = { mode: selectedMode, category: selectedCat };
      save();
      startQuiz(batch, selectedCat, selectedMode);
    });
  }

  function startQuiz(batch, categoryKey, mode) {
    let index = 0;
    let revealed = false;
    let currentChoices = null; // cached options for choice mode
    let chosenOption = null;   // for choice mode after reveal
    let typedValue = '';       // for typed mode across renders
    let typedMatched = null;   // null = not submitted; true/false after submit
    const results = [];

    const markSeen = (q) => {
      if (!state.quizSeen) state.quizSeen = {};
      state.quizSeen[q.id] = new Date().toISOString();
    };

    const advance = () => {
      index++;
      revealed = false;
      currentChoices = null;
      chosenOption = null;
      typedValue = '';
      typedMatched = null;
      if (index >= batch.length) finishQuiz(results, categoryKey, mode);
      else render();
    };

    const commitResult = (q, correct) => {
      results.push({ question: q, correct });
      markSeen(q);
    };

    const render = () => {
      const q = batch[index];
      const segs = batch.map((_, i) => {
        const cls = i < index ? 'on' : (i === index ? 'current' : '');
        return `<span class="seg ${cls}"></span>`;
      }).join('');
      const catLabel = (QUIZ_CATEGORIES.find(c => c.key === q.category) || {}).label || q.category;

      const explain = (q.context || q.notes || '').trim();
      let interaction = '';
      if (mode === 'choice') {
        if (!currentChoices) currentChoices = buildChoices(q, quizQuestions);
        const { options: choiceOpts, correctOption } = currentChoices;
        const opts = choiceOpts.map(opt => {
          let cls = 'quiz-option';
          if (revealed) {
            if (opt === correctOption) cls += ' correct';
            else if (opt === chosenOption) cls += ' wrong';
            else cls += ' muted';
          }
          return `<button class="${cls}" data-opt="${opt.replace(/"/g, '&quot;')}"${revealed ? ' disabled' : ''}>${opt.replace(/</g, '&lt;')}</button>`;
        }).join('');
        interaction = `
          <div class="quiz-options">${opts}</div>
          ${revealed ? `
            <div class="quiz-a-reveal" style="margin-top:16px">
              <p class="alabel">Answer</p>
              <p class="aans">${q.answer.replace(/</g, '&lt;')}</p>
              ${explain ? `<p class="anotes">${explain.replace(/</g, '&lt;')}</p>` : ''}
            </div>
            <div class="sheet-actions"><button class="btn btn-primary" id="next">Next</button></div>
          ` : ''}
        `;
      } else if (mode === 'typed') {
        if (typedMatched === null) {
          interaction = `
            <input class="practice-input" id="typed-input" placeholder="Type your answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="${typedValue.replace(/"/g, '&quot;')}">
            <p class="practice-hint">Close is usually enough. Capitalisation doesn't matter.</p>
            <div class="sheet-actions" style="margin-top:10px">
              <button class="btn btn-ghost" id="giveup">Give up</button>
              <button class="btn btn-primary" id="submit">Submit</button>
            </div>
          `;
        } else {
          interaction = `
            <div class="quiz-a-reveal">
              <p class="alabel">${typedMatched ? 'Your answer · correct' : 'You typed'}</p>
              <p class="aans" style="color:${typedMatched ? 'var(--green-deep)' : 'var(--terracotta)'}">${typedValue.replace(/</g, '&lt;') || '—'}</p>
              <p class="alabel" style="margin-top:12px">Correct answer</p>
              <p class="aans">${q.answer.replace(/</g, '&lt;')}</p>
              ${explain ? `<p class="anotes">${explain.replace(/</g, '&lt;')}</p>` : ''}
            </div>
            ${!typedMatched ? `
              <div class="rating-row" style="grid-template-columns: 1fr 1fr; margin-bottom:10px">
                <button class="rating-btn forgot" id="move-on">Move on</button>
                <button class="rating-btn good" id="mark-right">Actually right</button>
              </div>
            ` : ''}
            <div class="sheet-actions"><button class="btn btn-primary" id="next">Next</button></div>
          `;
        }
      } else {
        // flash
        interaction = revealed ? `
          <div class="quiz-a-reveal">
            <p class="alabel">Answer</p>
            <p class="aans">${q.answer.replace(/</g, '&lt;')}</p>
            ${explain ? `<p class="anotes">${explain.replace(/</g, '&lt;')}</p>` : ''}
          </div>
          <div class="rating-row" style="grid-template-columns: 1fr 1fr">
            <button class="rating-btn forgot" data-got="no">Didn't know</button>
            <button class="rating-btn good" data-got="yes">Got it</button>
          </div>
        ` : `
          <div class="sheet-actions"><button class="btn btn-primary" id="reveal">Show answer</button></div>
        `;
      }

      openSheet(`
        <h2>Trivia</h2>
        <p class="review-progress"><span>Round of ${batch.length}</span><span>${index + 1} of ${batch.length}</span></p>
        <div class="review-progress-bar" style="grid-template-columns: repeat(${batch.length}, 1fr);">${segs}</div>

        <span class="quiz-cat-tag">${catLabel}</span>
        <p class="quiz-q">${q.question.replace(/</g, '&lt;')}</p>

        ${interaction}

        <div class="sheet-actions" style="margin-top:18px">
          <button class="btn btn-ghost" id="quit">Quit</button>
        </div>
      `);

      sheet.querySelector('#quit').addEventListener('click', () => {
        if (!confirm('Quit the round? Your progress will be lost.')) return;
        closeSheet();
      });

      if (mode === 'choice') {
        sheet.querySelectorAll('.quiz-option[data-opt]').forEach(btn => {
          btn.addEventListener('click', () => {
            if (revealed) return;
            chosenOption = btn.dataset.opt;
            const correct = chosenOption === (currentChoices && currentChoices.correctOption);
            commitResult(q, correct);
            revealed = true;
            render();
          });
        });
        const next = sheet.querySelector('#next');
        if (next) next.addEventListener('click', advance);
      } else if (mode === 'typed') {
        const input = sheet.querySelector('#typed-input');
        if (input) {
          setTimeout(() => input.focus(), 60);
          input.addEventListener('input', (e) => { typedValue = e.target.value; });
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sheet.querySelector('#submit')?.click(); }
          });
        }
        const submitBtn = sheet.querySelector('#submit');
        if (submitBtn) submitBtn.addEventListener('click', () => {
          if (!typedValue.trim()) return;
          const ok = isTypedCorrect(typedValue, q.answer);
          typedMatched = ok;
          if (ok) commitResult(q, true);
          render();
        });
        const giveUp = sheet.querySelector('#giveup');
        if (giveUp) giveUp.addEventListener('click', () => {
          typedMatched = false;
          commitResult(q, false);
          render();
        });
        const markRight = sheet.querySelector('#mark-right');
        if (markRight) markRight.addEventListener('click', () => {
          // Override: user insists they were right
          const idx = results.findIndex(r => r.question.id === q.id);
          if (idx >= 0) results[idx].correct = true;
          else commitResult(q, true);
          typedMatched = true;
          render();
        });
        const moveOn = sheet.querySelector('#move-on');
        if (moveOn) moveOn.addEventListener('click', advance);
        const next = sheet.querySelector('#next');
        if (next) next.addEventListener('click', advance);
      } else {
        // flash
        const revealBtn = sheet.querySelector('#reveal');
        if (revealBtn) revealBtn.addEventListener('click', () => { revealed = true; render(); });
        sheet.querySelectorAll('[data-got]').forEach(btn => {
          btn.addEventListener('click', () => {
            const gotIt = btn.dataset.got === 'yes';
            commitResult(q, gotIt);
            advance();
          });
        });
      }
    };

    render();
  }

  function finishQuiz(results, categoryKey, mode) {
    const correct = results.filter(r => r.correct).length;
    const total = results.length;

    // Update stats
    const s = state.quizStats || {
      gamesPlayed: 0, questionsSeen: 0, questionsCorrect: 0, bestScore: 0,
      lastScore: null, lastPlayedAt: null, byCategory: {},
    };
    s.gamesPlayed = (s.gamesPlayed || 0) + 1;
    s.questionsSeen = (s.questionsSeen || 0) + total;
    s.questionsCorrect = (s.questionsCorrect || 0) + correct;
    s.bestScore = Math.max(s.bestScore || 0, correct);
    s.lastScore = correct;
    s.lastPlayedAt = new Date().toISOString();
    s.byCategory = s.byCategory || {};
    for (const r of results) {
      const k = r.question.category;
      const bucket = s.byCategory[k] || { seen: 0, correct: 0 };
      bucket.seen++;
      if (r.correct) bucket.correct++;
      s.byCategory[k] = bucket;
    }
    state.quizStats = s;
    save();
    renderPlayTile();

    const message =
      correct === 10 ? 'Flawless round.' :
      correct >= 8  ? 'Very sharp.' :
      correct >= 6  ? 'Respectable.' :
      correct >= 4  ? 'Room to grow.' :
      correct >= 1  ? 'Rough round — try another.' :
                      'Blank slate. Try another.';

    const items = results.map(r => `
      <div class="score-item">
        <span class="sdot ${r.correct ? 'good' : 'bad'}"></span>
        <div>
          <p class="sq" style="margin:0">${r.question.question.replace(/</g, '&lt;')}</p>
          <p class="sa">${r.question.answer.replace(/</g, '&lt;')}</p>
        </div>
      </div>
    `).join('');

    openSheet(`
      <h2>Round complete</h2>
      <div class="score-big">
        <span class="snum">${correct}</span><span class="sout">/ 10</span>
        <p class="sline">${message}</p>
      </div>
      <p class="sheet-section-label" style="margin-top:16px">Review</p>
      <div class="score-list">${items}</div>
      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="close">Close</button>
        <button class="btn btn-primary" id="again">Play again</button>
      </div>
    `);
    sheet.querySelector('#close').addEventListener('click', closeSheet);
    sheet.querySelector('#again').addEventListener('click', () => {
      const batch = pickBatch(quizQuestions, categoryKey);
      if (batch.length === 0) { closeSheet(); return; }
      startQuiz(batch, categoryKey, mode || (state.quizPrefs && state.quizPrefs.mode) || 'choice');
    });
  }

  // --- Workouts ------------------------------------------------------------

  let exercisesCache = null;
  let exercisesLoading = null;

  function loadExercises() {
    if (exercisesCache) return Promise.resolve(exercisesCache);
    if (exercisesLoading) return exercisesLoading;
    exercisesLoading = fetch('exercises.json')
      .then(r => { if (!r.ok) throw new Error('Could not load exercises'); return r.json(); })
      .then(data => { exercisesCache = data; return data; })
      .catch(err => { exercisesLoading = null; throw err; });
    return exercisesLoading;
  }

  const MUSCLE_LABEL = {
    'chest': 'Chest',
    'front-delts': 'Front delts',
    'side-delts': 'Side delts',
    'rear-delts': 'Rear delts',
    'traps': 'Traps',
    'upper-back': 'Upper back',
    'lats': 'Lats',
    'lower-back': 'Lower back',
    'biceps': 'Biceps',
    'triceps': 'Triceps',
    'forearms': 'Forearms',
    'core': 'Core',
    'obliques': 'Obliques',
    'glutes': 'Glutes',
    'quads': 'Quads',
    'hamstrings': 'Hamstrings',
    'calves': 'Calves',
  };

  const MUSCLE_ORDER = [
    'chest', 'upper-back', 'lats', 'traps',
    'front-delts', 'side-delts', 'rear-delts',
    'biceps', 'triceps', 'forearms',
    'core', 'obliques', 'lower-back',
    'glutes', 'quads', 'hamstrings', 'calves',
  ];

  const DIFFICULTY_LABEL = {
    beginner: 'Beginner',
    intermediate: 'Intermediate',
    advanced: 'Advanced',
  };

  function difficultyBadge(d) {
    return `<span class="ex-diff ex-diff-${d}">${DIFFICULTY_LABEL[d] || d}</span>`;
  }

  function renderBodyDiagram() {

        <rect x="76" y="100" rx="6" ry="6" width="14" height="50"/>

  function highlightMuscles(root, primary, secondary) {
    if (!root) return;
    root.querySelectorAll('.muscle.active').forEach(el => el.classList.remove('active', 'primary'));
    (secondary || []).forEach(m => {
      root.querySelectorAll(`.muscle[data-muscle="${m}"]`).forEach(el => el.classList.add('active'));
    });
    (primary || []).forEach(m => {
      root.querySelectorAll(`.muscle[data-muscle="${m}"]`).forEach(el => el.classList.add('active', 'primary'));
    });
  }

  function applyFilterHighlight(root, muscleKey) {
    if (!root) return;
    root.querySelectorAll('.muscle.filter-on').forEach(el => el.classList.remove('filter-on'));
    if (muscleKey) {
      root.querySelectorAll(`.muscle[data-muscle="${muscleKey}"]`).forEach(el => el.classList.add('filter-on'));
    }
  }

  function exerciseMatchesFilters(ex, muscleFilter, diffFilter) {
    if (muscleFilter) {
      const hits = ex.primary.includes(muscleFilter) || ex.secondary.includes(muscleFilter);
      if (!hits) return false;
    }
    if (diffFilter && ex.difficulty !== diffFilter) return false;
    return true;
  }

  // Tab + pick-mode state survives sheet re-renders but resets when the app reloads.
  let workoutTab = 'browse';
  let workoutPickMode = null; // planId or null

  function openWorkouts(opts) {
    if (opts && opts.tab) workoutTab = opts.tab;
    openSheet(`
      <h2>Workouts</h2>
      <p class="subtle">Dumbbell and bench. Pick a muscle, learn a move.</p>
      <div class="archive-tabs" id="workout-tabs">
        <button class="archive-tab ${workoutTab === 'browse' ? 'active' : ''}" data-tab="browse">Browse</button>
        <button class="archive-tab ${workoutTab === 'plans' ? 'active' : ''}" data-tab="plans">My plans</button>
      </div>
      <div id="workouts-body">
        <p class="subtle">Loading exercises…</p>
      </div>
    `);
    const tabsEl = sheet.querySelector('#workout-tabs');
    tabsEl.addEventListener('click', (e) => {
      const t = e.target.closest('.archive-tab');
      if (!t) return;
      workoutTab = t.dataset.tab;
      openWorkouts();
    });
    loadExercises()
      .then(renderWorkoutsBody)
      .catch(err => {
        const body = document.getElementById('workouts-body');
        if (body) {
          body.innerHTML = `<p class="subtle" style="color:var(--terracotta)">${(err && err.message) || 'Could not load exercises.'}</p>
            <div class="sheet-actions"><button class="btn btn-ghost" id="cancel">Close</button></div>`;
          body.querySelector('#cancel').addEventListener('click', closeSheet);
        }
      });
  }

  function renderWorkoutsBody() {
    const body = document.getElementById('workouts-body');
    if (!body) return;
    if (workoutTab === 'plans') {
      renderPlansBody(body);
    } else {
      renderBrowseBody(body);
    }
  }

  function renderBrowseBody(body) {
    const prefs = state.workoutPrefs || { muscleFilter: null, difficultyFilter: null };
    let muscleFilter = prefs.muscleFilter || null;
    let diffFilter = prefs.difficultyFilter || null;
    const pickPlan = workoutPickMode ? state.workoutPlans[workoutPickMode] : null;

    const renderMuscleChips = () => `
      <button class="cat-chip ${muscleFilter === null ? 'on' : ''}" data-muscle="">
        All muscles<span class="ccount">${exercisesCache.length} moves</span>
      </button>
      ${MUSCLE_ORDER.map(m => {
        const count = exercisesCache.filter(e => e.primary.includes(m) || e.secondary.includes(m)).length;
        if (count === 0) return '';
        return `
          <button class="cat-chip ${muscleFilter === m ? 'on' : ''}" data-muscle="${m}">
            ${MUSCLE_LABEL[m]}<span class="ccount">${count} moves</span>
          </button>
        `;
      }).join('')}
    `;

    const renderDiffChips = () => {
      const diffs = [
        { key: null, label: 'All levels' },
        { key: 'beginner', label: 'Beginner' },
        { key: 'intermediate', label: 'Intermediate' },
        { key: 'advanced', label: 'Advanced' },
      ];
      return diffs.map(d => `
        <button class="cat-chip ${diffFilter === d.key ? 'on' : ''}" data-diff="${d.key === null ? '' : d.key}">
          ${d.label}
        </button>
      `).join('');
    };

    const renderList = () => {
      const filtered = exercisesCache.filter(e => exerciseMatchesFilters(e, muscleFilter, diffFilter));
      if (filtered.length === 0) {
        return `<p class="archive-empty">No exercises match that combination.</p>`;
      }
      const rightSide = pickPlan
        ? `<span class="pick-add-chip">Add</span>`
        : '';
      return `<div class="archive-list">${filtered.map(ex => `
        <button class="archive-item workout-item ${pickPlan ? 'workout-item-picking' : ''}"
          data-id="${ex.id}"
          data-muscles-primary="${ex.primary.join(' ')}"
          data-muscles-secondary="${ex.secondary.join(' ')}">
          <div class="aleft">
            <p class="atext">${ex.name}</p>
            <p class="adate">
              ${ex.primary.map(m => `<span class="muscle-tag">${MUSCLE_LABEL[m]}</span>`).join('')}
            </p>
          </div>
          ${pickPlan ? rightSide : difficultyBadge(ex.difficulty)}
        </button>
      `).join('')}</div>`;
    };

    const banner = pickPlan ? `
      <div class="pick-mode-banner">
        <span>Adding to <strong>"${escapeHTML(pickPlan.name)}"</strong></span>
        <button id="cancel-pick">Cancel</button>
      </div>
    ` : '';

    body.innerHTML = `
      ${banner}
      ${renderBodyDiagram()}
      <p class="body-diagram-caption">${pickPlan ? 'Tap an exercise to add it' : 'Tap a muscle to filter · hover a move to preview'}</p>

      <p class="sheet-section-label">Muscle</p>
      <div class="cat-grid" id="muscle-grid">${renderMuscleChips()}</div>

      <p class="sheet-section-label" style="margin-top:18px">Difficulty</p>
      <div class="cat-grid" id="diff-grid">${renderDiffChips()}</div>

      <p class="sheet-section-label" style="margin-top:18px">Exercises</p>
      <div id="workout-list">${renderList()}</div>

      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `;

    const diagramEl = body.querySelector('.body-diagram');
    const muscleGrid = body.querySelector('#muscle-grid');
    const diffGrid = body.querySelector('#diff-grid');
    const listEl = body.querySelector('#workout-list');

    applyFilterHighlight(diagramEl, muscleFilter);

    const persistPrefs = () => {
      state.workoutPrefs = { muscleFilter, difficultyFilter: diffFilter };
      save();
    };

    muscleGrid.addEventListener('click', (e) => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      muscleFilter = chip.dataset.muscle || null;
      muscleGrid.innerHTML = renderMuscleChips();
      listEl.innerHTML = renderList();
      applyFilterHighlight(diagramEl, muscleFilter);
      persistPrefs();
    });
    diffGrid.addEventListener('click', (e) => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      diffFilter = chip.dataset.diff || null;
      diffGrid.innerHTML = renderDiffChips();
      listEl.innerHTML = renderList();
      persistPrefs();
    });
    listEl.addEventListener('click', (e) => {
      const item = e.target.closest('.workout-item');
      if (!item) return;
      if (pickPlan) {
        addExerciseToPlan(pickPlan.id, item.dataset.id);
        const planId = pickPlan.id;
        workoutPickMode = null;
        openPlanDetail(planId);
      } else {
        openExerciseDetail(item.dataset.id);
      }
    });

    diagramEl.addEventListener('click', (e) => {
      const shape = e.target.closest('.muscle');
      if (!shape) return;
      const m = shape.dataset.muscle;
      muscleFilter = (muscleFilter === m) ? null : m;
      muscleGrid.innerHTML = renderMuscleChips();
      listEl.innerHTML = renderList();
      applyFilterHighlight(diagramEl, muscleFilter);
      persistPrefs();
    });

    // Hover preview: highlight the exercise's muscles on the diagram.
    let hoveredItem = null;
    listEl.addEventListener('mouseover', (e) => {
      const item = e.target.closest('.workout-item');
      if (!item || item === hoveredItem) return;
      hoveredItem = item;
      const prim = (item.dataset.musclesPrimary || '').split(' ').filter(Boolean);
      const sec = (item.dataset.musclesSecondary || '').split(' ').filter(Boolean);
      highlightMuscles(diagramEl, prim, sec);
    });
    listEl.addEventListener('mouseleave', () => {
      hoveredItem = null;
      highlightMuscles(diagramEl, [], []);
    });

    if (pickPlan) {
      body.querySelector('#cancel-pick').addEventListener('click', () => {
        const planId = pickPlan.id;
        workoutPickMode = null;
        openPlanDetail(planId);
      });
    }
    body.querySelector('#cancel').addEventListener('click', closeSheet);
  }

  function renderPlansBody(body) {
    const plans = (state.workoutPlanOrder || [])
      .map(id => state.workoutPlans[id])
      .filter(Boolean);

    const list = plans.length === 0
      ? `<p class="archive-empty">No plans yet. Build one to save the moves you actually do.</p>`
      : `<div class="archive-list">${plans.map(p => `
          <button class="archive-item plan-item" data-plan-id="${p.id}">
            <div class="aleft">
              <p class="atext">${escapeHTML(p.name)}</p>
              <p class="adate">${p.exercises.length} move${p.exercises.length === 1 ? '' : 's'} · updated ${formatPlanTimestamp(p.updatedAt)}</p>
            </div>
            <span class="plan-chev">›</span>
          </button>
        `).join('')}</div>`;

    body.innerHTML = `
      <div id="plans-list">${list}</div>
      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="cancel">Close</button>
        <button class="btn btn-primary" id="new-plan">New plan</button>
      </div>
    `;

    body.querySelector('#plans-list').addEventListener('click', (e) => {
      const item = e.target.closest('.plan-item');
      if (!item) return;
      openPlanDetail(item.dataset.planId);
    });
    body.querySelector('#new-plan').addEventListener('click', () => {
      const name = (prompt('Name this plan', 'Push day') || '').trim();
      if (!name) return;
      const id = createPlan(name);
      openPlanDetail(id);
    });
    body.querySelector('#cancel').addEventListener('click', closeSheet);
  }

  // --- Plan mutations ------------------------------------------------------

  function createPlan(name) {
    const id = 'plan-' + Date.now().toString(36) + '-' + Math.floor(Math.random() * 1000).toString(36);
    const now = new Date().toISOString();
    if (!state.workoutPlans) state.workoutPlans = {};
    if (!Array.isArray(state.workoutPlanOrder)) state.workoutPlanOrder = [];
    state.workoutPlans[id] = {
      id,
      name,
      createdAt: now,
      updatedAt: now,
      exercises: [],
    };
    state.workoutPlanOrder.unshift(id);
    save();
    return id;
  }

  function deletePlan(planId) {
    if (!state.workoutPlans || !state.workoutPlans[planId]) return;
    delete state.workoutPlans[planId];
    state.workoutPlanOrder = (state.workoutPlanOrder || []).filter(id => id !== planId);
    save();
  }

  function renamePlan(planId, newName) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan) return;
    plan.name = newName;
    plan.updatedAt = new Date().toISOString();
    save();
  }

  function addExerciseToPlan(planId, exerciseId) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan) return;
    plan.exercises.push({ id: exerciseId, sets: 3, reps: 10 });
    plan.updatedAt = new Date().toISOString();
    save();
  }

  function removeExerciseFromPlan(planId, index) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan) return;
    plan.exercises.splice(index, 1);
    plan.updatedAt = new Date().toISOString();
    save();
  }

  function updateExerciseInPlan(planId, index, patch) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan || !plan.exercises[index]) return;
    Object.assign(plan.exercises[index], patch);
    plan.updatedAt = new Date().toISOString();
    save();
  }

  function moveExerciseInPlan(planId, index, direction) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan) return;
    const target = index + direction;
    if (target < 0 || target >= plan.exercises.length) return;
    const list = plan.exercises;
    [list[index], list[target]] = [list[target], list[index]];
    plan.updatedAt = new Date().toISOString();
    save();
  }

  function formatPlanTimestamp(iso) {
    if (!iso) return 'just now';
    const then = new Date(iso);
    const now = new Date();
    const diff = Math.round((now - then) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
    const days = Math.floor(diff / 86400);
    if (days < 7) return days + ' day' + (days === 1 ? '' : 's') + ' ago';
    return then.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // --- Plan detail sheet ---------------------------------------------------

  function openPlanDetail(planId) {
    const plan = state.workoutPlans && state.workoutPlans[planId];
    if (!plan) { workoutTab = 'plans'; openWorkouts(); return; }
    // Load exercises so we can look up names; if already cached it resolves immediately.
    loadExercises().then(() => renderPlanDetailSheet(planId));
  }

  function renderPlanDetailSheet(planId) {
    const plan = state.workoutPlans[planId];
    if (!plan) return;

    const rows = plan.exercises.map((entry, i) => {
      const ex = exercisesCache.find(e => e.id === entry.id);
      const name = ex ? ex.name : '(exercise no longer available)';
      return `
        <div class="plan-ex-row" data-index="${i}">
          <div class="plan-ex-main">
            <p class="plan-ex-name">${escapeHTML(name)}</p>
            <div class="plan-ex-inputs">
              <label>Sets
                <input type="number" min="1" max="20" step="1" value="${entry.sets}" data-field="sets"/>
              </label>
              <span class="plan-ex-times">×</span>
              <label>Reps
                <input type="number" min="1" max="100" step="1" value="${entry.reps}" data-field="reps"/>
              </label>
            </div>
          </div>
          <div class="plan-ex-actions">
            <button class="plan-ex-btn" data-action="up" aria-label="Move up" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button class="plan-ex-btn" data-action="down" aria-label="Move down" ${i === plan.exercises.length - 1 ? 'disabled' : ''}>↓</button>
            <button class="plan-ex-btn plan-ex-remove" data-action="remove" aria-label="Remove">×</button>
          </div>
        </div>
      `;
    }).join('');

    const body = plan.exercises.length === 0
      ? `<p class="archive-empty">No moves yet. Tap "Add exercise" to start.</p>`
      : `<div class="plan-ex-list">${rows}</div>`;

    openSheet(`
      <p class="ex-eyebrow">Workout plan</p>
      <h2 id="plan-title">${escapeHTML(plan.name)}</h2>
      <p class="subtle">${plan.exercises.length} move${plan.exercises.length === 1 ? '' : 's'} · updated ${formatPlanTimestamp(plan.updatedAt)} · <button class="inline-link" id="rename-plan">Rename</button></p>

      ${body}

      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="back">Back</button>
        <button class="btn btn-primary" id="add-exercise">Add exercise</button>
      </div>
      <div class="sheet-actions">
        <button class="btn btn-danger-ghost" id="delete-plan">Delete plan</button>
      </div>
    `);

    sheet.querySelector('#rename-plan').addEventListener('click', () => {
      const next = (prompt('Rename plan', plan.name) || '').trim();
      if (!next || next === plan.name) return;
      renamePlan(planId, next);
      renderPlanDetailSheet(planId);
    });

    const listEl = sheet.querySelector('.plan-ex-list');
    if (listEl) {
      listEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.plan-ex-btn');
        if (!btn) return;
        const row = btn.closest('.plan-ex-row');
        const idx = Number(row.dataset.index);
        const action = btn.dataset.action;
        if (action === 'up') moveExerciseInPlan(planId, idx, -1);
        else if (action === 'down') moveExerciseInPlan(planId, idx, 1);
        else if (action === 'remove') {
          if (!confirm('Remove this exercise from the plan?')) return;
          removeExerciseFromPlan(planId, idx);

        renderPlanDetailSheet(planId);

        const row = input.closest('.plan-ex-row');
        const idx = Number(row.dataset.index);
        const field = input.dataset.field;
        let val = parseInt(input.value, 10);
        if (isNaN(val) || val < 1) val = 1;
        if (field === 'sets' && val > 20) val = 20;
        if (field === 'reps' && val > 100) val = 100;
        input.value = val;
        updateExerciseInPlan(planId, idx, { [field]: val });
      });
    }

      workoutTab = 'plans';

      workoutTab = 'plans';
      openWorkouts();
    });

  // --- Stats ---------------------------------------------------------------

  const MOOD_COLORS = [
    { key: 'deep',  label: 'Deep',       blurb: 'Clear, on plan',    cssVar: '--green-deep' },
    { key: 'soft',  label: 'Soft',       blurb: 'Gentle, alright',    cssVar: '--green-soft' },
    { key: 'ochre', label: 'Ochre',      blurb: 'Mixed, in-between',  cssVar: '--ochre' },
    { key: 'terra', label: 'Terracotta', blurb: 'Heavy, off',         cssVar: '--terracotta' },
  ];

  function computeChainSummary() {
    // Consider all weeks from startMonday up to (but not including) the current week,
    // since the current week can't be sealed until Sunday.
    const startMonday = getStartMonday();
    const thisMonday = startOfWeek(new Date());
    const weeksSinceStart = Math.max(0, Math.floor((thisMonday - startMonday) / (7 * 86400000)));

    let sealed = 0;
    let currentStreak = 0;
    let longestStreak = 0;
    let runStreak = 0;
    let allSealedIsos = [];

    // Walk oldest → newest so we can track longest streak correctly.
    for (let i = 0; i < weeksSinceStart; i++) {
      const m = addDays(startMonday, i * 7);
      const iso = toISODate(m);
      const color = state.weekColors[iso];
      if (color) {
        sealed += 1;
        runStreak += 1;
        if (runStreak > longestStreak) longestStreak = runStreak;
        allSealedIsos.push(iso);
      } else {
        runStreak = 0;
      }
    }
    // Current streak: count back from the most-recent completed week.
    for (let i = weeksSinceStart - 1; i >= 0; i--) {
      const m = addDays(startMonday, i * 7);
      const iso = toISODate(m);
      if (state.weekColors[iso]) currentStreak += 1;
      else break;
    }

    return { sealed, weeksSinceStart, currentStreak, longestStreak };
  }

  function computeMoodMix(scope) {
    // scope = 'weeks' | 'days'
    const source = scope === 'days' ? state.dayColors : state.weekColors;
    const mix = { deep: 0, soft: 0, ochre: 0, terra: 0 };
    for (const iso in source) {
      const c = source[iso];
      if (mix[c] !== undefined) mix[c] += 1;
    }
    return mix;
  }

  function computeSessionTotals(days) {
    // Totals per activity over the last `days` days (including today).
    const today = new Date();
    const totals = {};
    for (const a of ACTIVITIES) totals[a.key] = 0;
    let grandTotal = 0;
    let daysWithSession = 0;
    for (let i = 0; i < days; i++) {
      const d = addDays(today, -i);
      const iso = toISODate(d);
      const sess = state.sessions[iso];
      if (!sess) continue;
      let any = false;
      for (const a of ACTIVITIES) {
        const v = sess[a.key] || 0;
        if (v > 0) { totals[a.key] += v; grandTotal += v; any = true; }
      }
      if (any) daysWithSession += 1;
    }
    return { totals, grandTotal, daysWithSession, days };
  }

  function computeWeeklySessions(weeks) {
    // Returns array oldest-first of { monday, byActivity, total }.
    const thisMonday = startOfWeek(new Date());
    const firstMonday = addDays(thisMonday, -(weeks - 1) * 7);
    const result = [];
    for (let i = 0; i < weeks; i++) {
      const monday = addDays(firstMonday, i * 7);
      const byActivity = {};
      for (const a of ACTIVITIES) byActivity[a.key] = 0;
      for (let d = 0; d < 7; d++) {
        const day = addDays(monday, d);
        const iso = toISODate(day);
        const sess = state.sessions[iso];
        if (!sess) continue;
        for (const a of ACTIVITIES) {
          if (sess[a.key]) byActivity[a.key] += sess[a.key];
        }
      }
      const total = Object.values(byActivity).reduce((x, y) => x + y, 0);
      result.push({ monday, byActivity, total });
    }
    return result;
  }

  const ACTIVITY_ACCENTS = {
    gym:        '--green-deep',
    yoga:       '--green-soft',
    meditation: '--ochre',
    reading:    '--terracotta',
  };

  function renderSummaryTiles(sum) {
    const rate = sum.weeksSinceStart > 0
      ? Math.round((sum.sealed / sum.weeksSinceStart) * 100)
      : null;
    return `
      <div class="summary-grid stats-summary">

        </div>

        </div>
        <div class="summary-tile wide">
          <p class="slabel">Longest streak · seal rate</p>
          <p class="svalue">${sum.longestStreak}<small>wk${sum.longestStreak === 1 ? '' : 's'}</small> · ${rate !== null ? rate + '%' : '—'}</p>
        </div>
      </div>
    `;

  function renderChainHero() {
    // Last 12 weeks (or fewer if pre-start), bigger tiles, tappable.
    const thisMonday = startOfWeek(new Date());
    const startMonday = getStartMonday();
    const pre = isPreStart();
    const rightMost = pre ? startMonday : thisMonday;
    const count = 12;
    const blocks = [];
    for (let i = count - 1; i >= 0; i--) {
      const m = addDays(rightMost, -i * 7);
      const iso = toISODate(m);
      const color = state.weekColors[iso];
      const isCurrent = i === 0;
      const beforeStart = m < startMonday;
      let cls = 'stats-chain-week';
      if (beforeStart) cls += ' pre-start';
      else if (isCurrent) cls += ' current';
      else if (color) cls += ' ' + color;
      else cls += ' blank';
      blocks.push(`<button class="${cls}" data-iso="${iso}" ${beforeStart ? 'disabled' : ''} aria-label="Week of ${monthShort(m)} ${m.getDate()}"></button>`);
    }
    const firstShown = addDays(rightMost, -(count - 1) * 7);
    return `
      <div class="stats-chain-hero">
        ${blocks.join('')}
      </div>
      <div class="chain-legend stats-chain-legend">
        <span>${monthShort(firstShown)} ${firstShown.getDate()}</span>
        <span>${pre ? 'first week' : 'this week'}</span>
      </div>
    `;
  }

  function renderYearHeatmap() {
    const thisMonday = startOfWeek(new Date());
    const weeks = 52;
    const firstMonday = addDays(thisMonday, -(weeks - 1) * 7);
    const startMonday = getStartMonday();

    const cellW = 12, cellH = 14, gap = 3;
    const svgW = weeks * (cellW + gap) - gap;
    const svgH = cellH;

    const cells = [];
    const monthLabels = [];
    let lastMonthMarked = -1;
    for (let i = 0; i < weeks; i++) {
      const m = addDays(firstMonday, i * 7);
      const iso = toISODate(m);
      const color = state.weekColors[iso];
      const isCurrent = i === weeks - 1;
      const beforeStart = m < startMonday;
      let cls = 'yh-cell';
      if (beforeStart) cls += ' pre';
      else if (isCurrent) cls += ' current';
      else if (color) cls += ' ' + color;
      else cls += ' blank';
      const x = i * (cellW + gap);
      cells.push(`<rect class="${cls}" x="${x}" y="0" width="${cellW}" height="${cellH}" rx="2" data-iso="${iso}"/>`);
      const monthIdx = m.getMonth();
      if (monthIdx !== lastMonthMarked && m.getDate() <= 7) {
        monthLabels.push(`<text class="yh-month" x="${x}" y="${svgH + 12}">${monthShort(m)}</text>`);
        lastMonthMarked = monthIdx;
      }
    }
    return `
      <svg class="year-heatmap-svg" viewBox="0 0 ${svgW} ${svgH + 16}" preserveAspectRatio="xMidYMid meet">
        ${cells.join('')}
        ${monthLabels.join('')}
      </svg>
    `;
  }

  function renderMoodDonut(mix, totalLabel) {
    const total = (mix.deep + mix.soft + mix.ochre + mix.terra) || 0;
    const R = 70, SW = 22, CIRC = 2 * Math.PI * R;
    let offset = 0;
    const segs = MOOD_COLORS.map(c => {
      const count = mix[c.key] || 0;
      if (count === 0) return '';
      const pct = count / (total || 1);
      const length = pct * CIRC;
      const gapPx = total === count ? 0 : 2;
      const dasharray = `${Math.max(0, length - gapPx)} ${CIRC}`;
      const seg = `<circle cx="100" cy="100" r="${R}" fill="none"
          stroke="var(${c.cssVar})" stroke-width="${SW}"
          stroke-dasharray="${dasharray}" stroke-dashoffset="${-offset}"/>`;
      offset += length;
      return seg;
    }).join('');
    const centerNum = total;
    return `
      <svg class="mood-donut" viewBox="0 0 200 200" aria-label="Mood mix">
        <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="${SW}"/>
        <g transform="rotate(-90 100 100)">${segs}</g>
        <text x="100" y="96" text-anchor="middle" class="donut-value">${centerNum}</text>
        <text x="100" y="116" text-anchor="middle" class="donut-label">${totalLabel || 'sealed'}</text>
      </svg>
    `;
  }

  function renderMoodLegend(mix) {
    const total = (mix.deep + mix.soft + mix.ochre + mix.terra) || 0;
    return `<ul class="mood-legend">
      ${MOOD_COLORS.map(c => {
        const count = mix[c.key] || 0;
        const pct = total > 0 ? Math.round((count / total) * 100) : 0;
        return `
          <li class="mood-legend-row">
            <span class="mood-dot" style="background: var(${c.cssVar})"></span>
            <span class="mood-legend-label">${c.label}</span>
            <span class="mood-legend-count">${count} <small>${pct}%</small></span>
          </li>
        `;
      }).join('')}
    </ul>`;
  }

  function renderDayHeatmap() {
    // 13 weeks ending today, columns = weeks, rows = Mon..Sun.
    const weeks = 13;
    const today = new Date();
    const thisMonday = startOfWeek(today);
    const firstMonday = addDays(thisMonday, -(weeks - 1) * 7);
    const startMonday = getStartMonday();

    const cellW = 12, cellH = 12, gap = 3;
    const svgW = weeks * (cellW + gap) - gap;
    const svgH = 7 * (cellH + gap) - gap;
    const leftPad = 16;

    const cells = [];
    for (let w = 0; w < weeks; w++) {
      for (let d = 0; d < 7; d++) {
        const day = addDays(firstMonday, w * 7 + d);
        const iso = toISODate(day);
        const future = day > today;
        const beforeStart = day < startMonday;
        const color = state.dayColors[iso];
        let cls = 'dh-cell';
        if (future) cls += ' dh-future';
        else if (beforeStart) cls += ' dh-pre';
        else if (color) cls += ' dh-' + color;
        else cls += ' dh-blank';
        const x = w * (cellW + gap);
        const y = d * (cellH + gap);
        const interactive = !future && !beforeStart;
        cells.push(`<rect class="${cls}" x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="2" ${interactive ? `data-iso="${iso}"` : ''}/>`);
      }
    }
    const dayLabels = ['M', '', 'W', '', 'F', '', ''].map((l, i) => {
      if (!l) return '';
      const y = i * (cellH + gap) + cellH - 2;
      return `<text class="dh-row-label" x="-4" y="${y}" text-anchor="end">${l}</text>`;
    }).join('');

    return `
      <svg class="day-heatmap" viewBox="-${leftPad} 0 ${svgW + leftPad} ${svgH}" preserveAspectRatio="xMidYMid meet">
        ${dayLabels}
        ${cells.join('')}
      </svg>
    `;
  }

  function renderActivityTotals(stats) {
    const totals = stats.totals;
    const max = Math.max(...Object.values(totals), 1);
    const rows = ACTIVITIES.map(a => {
      const v = totals[a.key] || 0;
      const pct = (v / max) * 100;
      return `
        <div class="act-row">
          <span class="act-label">${a.name}</span>
          <div class="act-bar-wrap">
            <div class="act-bar" style="width: ${pct}%; background: var(${ACTIVITY_ACCENTS[a.key]});"></div>
          </div>
          <span class="act-val">${v}<small>min</small></span>
        </div>
      `;
    }).join('');

    const hrs = Math.floor(stats.grandTotal / 60);
    const mins = stats.grandTotal % 60;
    const totalLabel = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;

    return `
      <div class="act-summary-head">
        <p class="act-total">${totalLabel}</p>
        <p class="act-total-sub">total over ${stats.daysWithSession} active day${stats.daysWithSession === 1 ? '' : 's'}</p>
      </div>
      <div class="act-rows">${rows}</div>
    `;
  }

  function renderWeeklyTrend(weeksData) {
    if (weeksData.length === 0) return '';
    const max = Math.max(...weeksData.map(w => w.total), 1);
    const chartH = 140;
    const barW = 18, gap = 6;
    const svgW = weeksData.length * (barW + gap) - gap;
    const svgH = chartH + 22;

    let lastMonthMarked = -1;
    const bars = weeksData.map((w, i) => {
      const x = i * (barW + gap);
      let y = chartH;
      const segs = ACTIVITIES.map(a => {
        const v = w.byActivity[a.key] || 0;
        if (v === 0) return '';
        const h = (v / max) * chartH;
        y -= h;
        return `<rect class="wb-seg" x="${x}" y="${y}" width="${barW}" height="${h}" fill="var(${ACTIVITY_ACCENTS[a.key]})" rx="1"/>`;
      }).join('');
      let label = '';
      const monthIdx = w.monday.getMonth();
      if (monthIdx !== lastMonthMarked && w.monday.getDate() <= 7) {
        label = `<text class="wb-label" x="${x + barW / 2}" y="${chartH + 14}" text-anchor="middle">${monthShort(w.monday)}</text>`;
        lastMonthMarked = monthIdx;
      }
      const emptyBase = w.total === 0
        ? `<rect class="wb-empty" x="${x}" y="${chartH - 2}" width="${barW}" height="2" rx="1"/>`
        : '';
      return emptyBase + segs + label;
    }).join('');

    return `
      <svg class="weekly-bars" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="xMidYMid meet">
        <line class="wb-axis" x1="0" y1="${chartH + 0.5}" x2="${svgW}" y2="${chartH + 0.5}"/>
        ${bars}
      </svg>
    `;
  }

  function renderActivityLegend() {
    return `<ul class="act-legend">
      ${ACTIVITIES.map(a => `
        <li class="act-legend-row">
          <span class="act-legend-dot" style="background: var(${ACTIVITY_ACCENTS[a.key]})"></span>
          <span>${a.name}</span>
        </li>
      `).join('')}
    </ul>`;
  }

  // --- Batch 6 helpers -----------------------------------------------------

  function computeHabitStats(days) {
    const today = new Date();
    return HABITS.map(h => {
      let done = 0, total = 0;
      const daily = [];
      for (let i = days - 1; i >= 0; i--) {
        const d = addDays(today, -i);
        const iso = toISODate(d);
        const rec = state.habits[iso];
        if (rec && rec[h.key] !== undefined) {
          total += 1;
          if (rec[h.key]) {
            done += 1;
            daily.push('on');
          } else {
            daily.push('off');
          }
        } else {
          daily.push('blank');
        }
      }
      const rate = total > 0 ? Math.round((done / total) * 100) : null;
      return { key: h.key, name: h.name, done, total, rate, daily };
    });
  }

  function computeSleepStats(days) {
    const today = new Date();
    const series = [];
    let sum = 0, count = 0;
    for (let i = days - 1; i >= 0; i--) {
      const d = addDays(today, -i);
      const iso = toISODate(d);
      const hrs = state.sleep[iso];
      if (typeof hrs === 'number' && hrs > 0) {
        series.push({ iso, hours: hrs });
        sum += hrs;
        count += 1;
      } else {
        series.push({ iso, hours: null });
      }
    }
    return { series, avg: count > 0 ? sum / count : 0, count, days };
  }

  function computeQuizStats() {
    const s = state.quizStats || {};
    const byCat = s.byCategory || {};
    const rows = QUIZ_CATEGORIES.map(c => {
      const r = byCat[c.key] || {};
      const seen = r.seen || 0;
      const correct = r.correct || 0;
      const rate = seen > 0 ? Math.round((correct / seen) * 100) : null;
      return { key: c.key, label: c.label, seen, correct, rate };
    });
    return {
      games: s.gamesPlayed || 0,
      seen: s.questionsSeen || 0,
      correct: s.questionsCorrect || 0,
      best: s.bestScore || 0,
      rows,
    };
  }

  function computeDrinkStats(days) {
    const today = new Date();
    let drinkDays = 0, drinkCount = 0, dryDays = 0, tracked = 0;
    const daily = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = addDays(today, -i);
      const iso = toISODate(d);
      const rec = state.drinks[iso];
      if (rec) {
        tracked += 1;
        if (rec.drank) {
          drinkDays += 1;
          drinkCount += rec.count || 0;
          daily.push({ iso, drank: true, count: rec.count || 0 });
        } else {
          dryDays += 1;
          daily.push({ iso, drank: false, count: 0 });
        }
      } else {
        daily.push({ iso, drank: null, count: 0 });
      }
    }
    // Dry streak: consecutive days ending today with rec && !rec.drank.
    let dryStreak = 0;
    for (let i = 0; i < days; i++) {
      const d = addDays(today, -i);
      const iso = toISODate(d);
      const rec = state.drinks[iso];
      if (rec && rec.drank === false) dryStreak += 1;
      else break;
    }
    return { daily, drinkDays, dryDays, drinkCount, tracked, dryStreak, days };
  }

  function computeWorkoutStats() {
    const plans = Object.values(state.workoutPlans || {});
    let moves = 0;
    const muscles = new Set();
    for (const p of plans) {
      moves += (p.exercises || []).length;
      if (!exercisesCache) continue;
      for (const entry of (p.exercises || [])) {
        const ex = exercisesCache.find(e => e.id === entry.id);
        if (!ex) continue;
        for (const m of ex.primary) muscles.add(m);
        for (const m of ex.secondary) muscles.add(m);
      }
    }
    return { plansCount: plans.length, moves, muscles: [...muscles] };
  }

  function computeDeckStats() {
    const stageCount = (deck) => {
      const c = new Array(SRS_INTERVALS.length).fill(0);
      for (const entry of Object.values(deck || {})) {
        const s = Math.min(Math.max(0, entry.stage || 0), c.length - 1);
        c[s] += 1;
      }
      return c;
    };
    const wordArr = Object.values(state.wordDeck || {});
    const quoteArr = Object.values(state.quoteDeck || {});
    return {
      word:  { total: wordArr.length,  stages: stageCount(state.wordDeck) },
      quote: { total: quoteArr.length, stages: stageCount(state.quoteDeck) },
    };
  }

  // --- Batch 6 renderers ---------------------------------------------------

  function renderHabitSection(stats) {
    const rows = stats.map(h => {
      const squares = h.daily.map(state => {
        return `<span class="habit-sq habit-${state}"></span>`;
      }).join('');
      const rateStr = h.rate !== null ? `${h.rate}%` : '—';
      return `
        <div class="habit-row">
          <div class="habit-head">
            <span class="habit-name">${h.name}</span>
            <span class="habit-rate">${rateStr} <small>${h.done}/${h.total}</small></span>
          </div>
          <div class="habit-strip">${squares}</div>
        </div>
      `;
    }).join('');
    return `<div class="habit-list">${rows}</div>`;
  }

  function renderSleepChart(stats) {
    const { series, avg } = stats;
    if (series.length === 0) return '<p class="archive-empty">No sleep logged yet.</p>';
    const chartH = 120;
    const barW = 10, gap = 2;
    const svgW = series.length * (barW + gap) - gap;
    const svgH = chartH + 20;
    const max = 12; // y-axis ceiling in hours
    const target = 8;
    const targetY = chartH - (target / max) * chartH;

    const bars = series.map((p, i) => {
      const x = i * (barW + gap);
      if (p.hours === null) {
        return `<rect class="sleep-empty" x="${x}" y="${chartH - 1}" width="${barW}" height="1"/>`;
      }
      const h = Math.min(p.hours, max) / max * chartH;
      const y = chartH - h;
      let cls = 'sleep-bar';
      if (p.hours >= 7.5) cls += ' sleep-good';
      else if (p.hours >= 6) cls += ' sleep-ok';
      else cls += ' sleep-low';
      return `<rect class="${cls}" x="${x}" y="${y}" width="${barW}" height="${h}" rx="1"/>`;
    }).join('');

    return `
      <svg class="sleep-chart" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="xMidYMid meet">
        <line class="sleep-target" x1="0" y1="${targetY}" x2="${svgW}" y2="${targetY}"/>
        <line class="sleep-axis" x1="0" y1="${chartH + 0.5}" x2="${svgW}" y2="${chartH + 0.5}"/>
        ${bars}
        <text class="sleep-target-label" x="${svgW}" y="${targetY - 3}" text-anchor="end">8h target</text>
      </svg>
      <p class="stats-sub" style="margin-top:6px">Average: ${avg.toFixed(1)}h across ${stats.count} logged night${stats.count === 1 ? '' : 's'}.</p>
    `;
  }

  function renderQuizSection(stats) {
    const overall = stats.seen > 0 ? Math.round((stats.correct / stats.seen) * 100) : null;
    const tiles = `
      <div class="summary-grid stats-summary">
        <div class="summary-tile">
          <p class="slabel">Games</p>
          <p class="svalue">${stats.games}</p>
        </div>
        <div class="summary-tile">
          <p class="slabel">Best round</p>
          <p class="svalue">${stats.best}<small>/10</small></p>
        </div>
        <div class="summary-tile wide">
          <p class="slabel">Lifetime accuracy</p>
          <p class="svalue">${overall !== null ? overall + '%' : '—'}<small>${stats.correct}/${stats.seen}</small></p>
        </div>
      </div>
    `;
    const hasSeen = stats.rows.some(r => r.seen > 0);
    const rows = !hasSeen
      ? `<p class="archive-empty">Play a round to start this chart.</p>`
      : stats.rows.map(r => {
          const rateW = r.rate !== null ? r.rate : 0;
          return `
            <div class="act-row">
              <span class="act-label">${r.label}</span>
              <div class="act-bar-wrap">
                <div class="act-bar act-quiz" style="width: ${rateW}%;"></div>
              </div>
              <span class="act-val">${r.rate !== null ? r.rate + '%' : '—'}<small>${r.correct}/${r.seen}</small></span>
            </div>
          `;
        }).join('');
    return tiles + `<div class="act-rows" style="margin-top:12px">${rows}</div>`;
  }

  function renderDrinkSection(stats) {
    const dailyBars = stats.daily.map((d, i) => {
      let cls = 'drink-cell drink-none';
      if (d.drank === true) cls = 'drink-cell drink-on';
      else if (d.drank === false) cls = 'drink-cell drink-dry';
      return `<span class="${cls}" title="${d.iso}"></span>`;
    }).join('');
    return `
      <div class="summary-grid stats-summary">
        <div class="summary-tile">
          <p class="slabel">Dry streak</p>
          <p class="svalue">${stats.dryStreak}<small>day${stats.dryStreak === 1 ? '' : 's'}</small></p>
        </div>
        <div class="summary-tile">
          <p class="slabel">Drink days · 30d</p>
          <p class="svalue">${stats.drinkDays}<small>of ${stats.tracked}</small></p>
        </div>
        <div class="summary-tile wide">
          <p class="slabel">Drinks · 30d</p>
          <p class="svalue">${stats.drinkCount}</p>
        </div>
      </div>
      <div class="drink-strip">${dailyBars}</div>
      <p class="stats-sub" style="margin-top:6px">Each mark is a day. Filled = drank, outlined = dry, blank = untracked.</p>
    `;
  }

  function renderWorkoutStatsSection(stats) {
    const coverageCount = stats.muscles.length;
    const totalMuscles = MUSCLE_ORDER.length;
    const musclePills = MUSCLE_ORDER
      .filter(m => stats.muscles.includes(m))
      .map(m => `<span class="works-chip works-chip-primary">${MUSCLE_LABEL[m]}</span>`)
      .join('');
    const missing = MUSCLE_ORDER
      .filter(m => !stats.muscles.includes(m))
      .map(m => `<span class="works-chip">${MUSCLE_LABEL[m]}</span>`)
      .join('');
    return `
      <div class="summary-grid stats-summary">
        <div class="summary-tile">
          <p class="slabel">Plans</p>
          <p class="svalue">${stats.plansCount}</p>
        </div>
        <div class="summary-tile">
          <p class="slabel">Moves in plans</p>
          <p class="svalue">${stats.moves}</p>
        </div>
        <div class="summary-tile wide">
          <p class="slabel">Muscle coverage</p>
          <p class="svalue">${coverageCount}<small>/ ${totalMuscles}</small></p>
        </div>
      </div>
      ${stats.plansCount === 0
        ? '<p class="archive-empty">Build a plan in Workouts to populate this.</p>'
        : `
          <p class="sheet-section-label" style="margin-top:14px">Covered</p>
          <div class="works-chips">${musclePills || '<span class="stats-sub">Nothing yet.</span>'}</div>
          <p class="sheet-section-label" style="margin-top:14px">Missing</p>
          <div class="works-chips">${missing || '<span class="stats-sub">All muscles covered.</span>'}</div>
        `}
    `;
  }

  function renderDeckSection(stats) {
    const renderDeck = (label, data) => {
      const total = data.total;
      if (total === 0) {
        return `
          <div class="deck-block">
            <div class="deck-head">
              <span class="deck-name">${label}</span>
              <span class="deck-total">—</span>
            </div>
            <p class="stats-sub">Nothing in this deck yet.</p>
          </div>
        `;
      }
      const bars = data.stages.map((count, i) => {
        const pct = Math.round((count / total) * 100);
        return `
          <div class="deck-stage-row">
            <span class="deck-stage-label">Stage ${i + 1}</span>
            <div class="act-bar-wrap">
              <div class="deck-stage-bar" style="width:${count > 0 ? Math.max(pct, 2) : 0}%; background: var(${i >= 4 ? '--green-deep' : i >= 2 ? '--green-soft' : '--ochre'});"></div>
            </div>
            <span class="deck-stage-count">${count}</span>
          </div>
        `;
      }).join('');
      return `
        <div class="deck-block">
          <div class="deck-head">
            <span class="deck-name">${label}</span>
            <span class="deck-total">${total} card${total === 1 ? '' : 's'}</span>
          </div>
          <div class="deck-stages">${bars}</div>
        </div>
      `;
    };
    return renderDeck('Word deck', stats.word) + renderDeck('Quote deck', stats.quote);
  }

  function openStats() {
    openSheet(`
      <h2>Stats</h2>
      <p class="subtle">The chain, laid out in numbers.</p>
      <div id="stats-body"></div>
    `);
    // Load exercises so workout muscle-coverage can render; if it fails, stats still works.
    loadExercises().catch(() => {}).finally(renderStatsBody);
  }

  function renderStatsBody() {
    const body = document.getElementById('stats-body');
    if (!body) return;
    const sum = computeChainSummary();
    const weekMix = computeMoodMix('weeks');
    const dayMix = computeMoodMix('days');
    const sess30 = computeSessionTotals(30);
    const weekly = computeWeeklySessions(12);
    const weeklyAvg = weekly.length > 0
      ? Math.round(weekly.reduce((s, w) => s + w.total, 0) / weekly.length)
      : 0;

    body.innerHTML = `
      ${renderSummaryTiles(sum)}

      <p class="sheet-section-label">The chain · last 12 weeks</p>
      ${renderChainHero()}

      <p class="sheet-section-label" style="margin-top:22px">The year</p>
      <p class="stats-sub">52 weeks, tap to review.</p>
      <div class="year-heatmap-wrap">${renderYearHeatmap()}</div>

      <p class="sheet-section-label" style="margin-top:22px">Mood mix · weeks</p>
      <p class="stats-sub">How the sealed weeks broke down.</p>
      <div class="mood-mix-wrap">
        ${renderMoodDonut(weekMix, 'sealed')}
        ${renderMoodLegend(weekMix)}
      </div>

      <p class="sheet-section-label" style="margin-top:22px">Every day · last 13 weeks</p>
      <p class="stats-sub">Each square is a day, colored by how it felt.</p>
      <div class="day-heatmap-wrap">${renderDayHeatmap()}</div>

      <p class="sheet-section-label" style="margin-top:22px">Mood mix · days</p>
      <p class="stats-sub">All colored days, across the whole chain.</p>
      <div class="mood-mix-wrap">
        ${renderMoodDonut(dayMix, 'colored')}
        ${renderMoodLegend(dayMix)}
      </div>

      <p class="sheet-section-label" style="margin-top:22px">Sessions · last 30 days</p>
      ${renderActivityTotals(sess30)}

      <p class="sheet-section-label" style="margin-top:22px">Weekly trend · last 12 weeks</p>
      <p class="stats-sub">Total minutes per week. Average: ${weeklyAvg} min.</p>
      ${renderActivityLegend()}
      <div class="weekly-bars-wrap">${renderWeeklyTrend(weekly)}</div>

      <p class="sheet-section-label" style="margin-top:22px">Habits · last 30 days</p>
      <p class="stats-sub">Each square is a day · filled = done, faint = missed, blank = untracked.</p>
      ${renderHabitSection(computeHabitStats(30))}

      <p class="sheet-section-label" style="margin-top:22px">Sleep · last 30 nights</p>
      ${renderSleepChart(computeSleepStats(30))}

      <p class="sheet-section-label" style="margin-top:22px">Trivia</p>
      ${renderQuizSection(computeQuizStats())}

      <p class="sheet-section-label" style="margin-top:22px">Drinks · last 30 days</p>
      ${renderDrinkSection(computeDrinkStats(30))}

      <p class="sheet-section-label" style="margin-top:22px">Workouts</p>
      ${renderWorkoutStatsSection(computeWorkoutStats())}

      <p class="sheet-section-label" style="margin-top:22px">Learning decks</p>
      <p class="stats-sub">SRS stage = how well a card has stuck. Stage 6 = mature.</p>
      ${renderDeckSection(computeDeckStats())}

      <div class="sheet-actions" style="margin-top:22px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `;

    const openWeekByIso = (iso) => {
      const [y, mo, d] = iso.split('-').map(Number);
      closeSheet();
      setTimeout(() => openWeekReview(new Date(y, mo - 1, d)), 200);
    };
    body.querySelectorAll('.stats-chain-week:not(.pre-start)').forEach(el => {
      el.addEventListener('click', () => openWeekByIso(el.dataset.iso));
    });
    body.querySelectorAll('.yh-cell:not(.pre)').forEach(el => {
      el.addEventListener('click', () => openWeekByIso(el.dataset.iso));
    });
    body.querySelectorAll('.dh-cell[data-iso]').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        closeSheet();
        setTimeout(() => openDay(iso), 200);
      });
    });

    body.querySelector('#cancel').addEventListener('click', closeSheet);
  }

  // --- Boot ----------------------------------------------------------------

  function renderAll() {
    renderHeader();
    renderChecklist();
    renderChain();
    renderFlowersPrompt();
    renderPreStart();
    renderTiles();
    renderTodayNoteBtn();
    renderMomentTiles();
    renderThoughts();
    renderPlayTile();
  }

  document.getElementById('open-year').addEventListener('click', openYearView);
  document.getElementById('open-year-2').addEventListener('click', openYearView);
  document.getElementById('open-settings').addEventListener('click', openSettings);
  document.getElementById('open-guide').addEventListener('click', openGuide);
  document.getElementById('open-quote').addEventListener('click', () => openQuote());
  document.getElementById('open-word').addEventListener('click', () => openWord());
  document.getElementById('open-quiz').addEventListener('click', openQuiz);
  document.getElementById('open-quiz-hub').addEventListener('click', openQuizHub);
  document.getElementById('open-workouts').addEventListener('click', openWorkouts);
  document.getElementById('open-workouts-2').addEventListener('click', openWorkouts);
  document.getElementById('open-stats').addEventListener('click', openStats);
  document.getElementById('open-stats-2').addEventListener('click', openStats);
  document.getElementById('open-archive').addEventListener('click', () => openArchive());
  document.getElementById('open-recent').addEventListener('click', openRecent);
  document.getElementById('open-review').addEventListener('click', openReview);
  document.getElementById('today-note-btn').addEventListener('click', () => {
    const iso = toISODate(new Date());
    openDay(iso);
  });

  renderAll();
  initAuth();
})();
</script>
</body>
