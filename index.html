<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Caprisun</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F1E6CB;
    --surface: #FDF6E2;
    --surface-2: #ECDFBF;
    --border: #DBCCA6;
    --border-strong: #C2B388;
    --ink: #2A2620;
    --ink-soft: #6B5F4E;
    --ink-faint: #A69876;

    --green-deep: #2D4A3E;
    --green-soft: #6B8F71;
    --green-leaf: #4F7A55;
    --ochre: #C9A35B;
    --ochre-soft: #E2C58A;
    --terracotta: #B86C5A;
    --warm-glow: rgba(201, 163, 91, 0.22);

    --radius: 10px;
    --radius-lg: 14px;

    --shadow-sheet: 0 -8px 40px rgba(58, 44, 28, 0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    background-image:
      radial-gradient(ellipse 720px 360px at 50% -120px, var(--warm-glow), transparent 70%),
      radial-gradient(ellipse 600px 300px at 100% 8%, rgba(107, 143, 113, 0.10), transparent 70%);
    background-attachment: fixed;
  }

  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 44px 24px 80px;
  }

  .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* Header */
  header {
    margin-bottom: 32px;
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: -14px;
    right: -10px;
    width: 100px;
    height: 100px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 10 C 25 30, 22 60, 50 90 C 60 70, 78 50, 92 50 C 70 48, 58 30, 50 10 Z' fill='%234F7A55' opacity='0.32'/><path d='M50 12 C 50 40, 55 70, 50 88' stroke='%234F7A55' stroke-width='1.5' fill='none' opacity='0.45'/></svg>");
    background-repeat: no-repeat;
    background-size: contain;
    pointer-events: none;
    transform: rotate(20deg);
  }
  header::after {
    content: '';
    position: absolute;
    top: 36px;
    right: 78px;
    width: 42px;
    height: 42px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 10 C 25 30, 22 60, 50 90 C 60 70, 78 50, 92 50 C 70 48, 58 30, 50 10 Z' fill='%23C9A35B' opacity='0.28'/></svg>");
    background-repeat: no-repeat;
    background-size: contain;
    pointer-events: none;
    transform: rotate(-30deg);
  }

  .day-name {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    letter-spacing: -0.02em;
    font-size: 56px;
    line-height: 1;
    margin: 0;
    color: var(--green-deep);
  }

  .day-date {
    color: var(--ink-soft);
    font-size: 14px;
    letter-spacing: 0.02em;
    margin-top: 6px;
  }

  .greeting {
    font-size: 22px;
    line-height: 1.2;
    margin: 14px 0 0;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    color: var(--ink-soft);
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
  }

  .greet-icons {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .icon-maple {
    width: 18px;
    height: 18px;
    color: var(--terracotta);
    transform: translateY(-1px);
  }

  .icon-mountain {
    width: 20px;
    height: 20px;
    color: var(--green-soft);
    transform: translateY(-1px);
  }

  .date {
    color: var(--ink-soft);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  .motivation {
    font-family: 'Inter', system-ui, sans-serif;
    font-style: normal;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    line-height: 1.5;
    margin: 16px 0 0;
    padding-left: 12px;
    border-left: 2px solid var(--ochre-soft);
    max-width: 32em;
  }

  /* Daily checklist (home) */
  .checklist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .checklist .check-item:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(74, 56, 28, 0.04);
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.1s ease, box-shadow 0.18s ease;
  }
  .check-item:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }
  .check-item:active { transform: scale(0.98); }
  .check-item .tick {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid var(--border-strong);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    flex-shrink: 0;
  }
  .check-item.on {
    background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-leaf) 100%);
    border-color: var(--green-deep);
    color: #F8F1DD;
  }
  .check-item.on .tick {
    background: #F8F1DD;
    border-color: #F8F1DD;
    color: var(--green-deep);
  }
  .check-item.on .tick::after { content: '✓'; }
  .checklist-progress {
    margin-top: 10px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }

  .motivation .mot-author {
    font-style: normal;
    font-size: 10px;
    color: var(--ink-faint);
    margin-left: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  section { margin-bottom: 40px; }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--green-leaf);
    margin: 0 0 14px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .section-label > span:first-child::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
    margin-right: 8px;
    transform: translateY(-1px);
  }

  .section-label button {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .section-label button:hover { color: var(--ink); }

  /* The chain */
  .chain {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
  }

  .week {
    aspect-ratio: 1 / 1.15;
    border-radius: 6px;
    background: var(--border);
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .week:hover { transform: translateY(-1px); }

  .week.deep   { background: var(--green-deep); }
  .week.soft   { background: var(--green-soft); }
  .week.ochre  { background: var(--ochre); }
  .week.terra  { background: var(--terracotta); }
  .week.blank  { background: var(--surface-2); }

  .week.current {
    background: transparent;
    border: 1px dashed var(--green-deep);
  }

  .week.current.ready {
    background: repeating-linear-gradient(
      45deg,
      transparent 0 6px,
      rgba(45, 74, 62, 0.08) 6px 12px
    );
  }

  .chain-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }

  .seal-banner {
    margin-top: 14px;
    background: var(--green-deep);
    color: var(--bg);
    padding: 14px 16px;
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .seal-banner p {
    margin: 0;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }

  .seal-banner button {
    background: rgba(245, 241, 232, 0.14);
    color: var(--bg);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Today tiles */
  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    text-align: left;
    position: relative;
    box-shadow: 0 1px 2px rgba(74, 56, 28, 0.04);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease, box-shadow 0.18s ease;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .tile:hover { border-color: var(--border-strong); }
  .tile:active { transform: scale(0.98); }

  .tile .name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }

  .tile .avg {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 2px 0 0;
  }

  .tile .plan-dot {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
  }

  .tile.logged {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }

  .tile.logged .avg { color: rgba(245, 241, 232, 0.7); }
  .tile.logged .plan-dot { background: rgba(245, 241, 232, 0.5); }

  .tile .logged-row {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    gap: 8px;
  }

  .tile.logged .logged-row { display: flex; }

  .tile .duration-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(245, 241, 232, 0.14);
    letter-spacing: 0.02em;
  }

  .tile .edit-link {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.7;
  }

  .tile .edit-link:hover { opacity: 1; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 56px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .footer-actions {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 18px;
    font-style: normal;
  }

  .footer-actions button {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
  }

  .footer-actions button:hover { color: var(--ink-soft); }

  /* Overlay + sheet */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(43, 43, 43, 0.28);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }

  .overlay.open { display: flex; }

  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    border-radius: 18px 18px 0 0;
    padding: 24px 24px 32px;
    box-shadow: var(--shadow-sheet);
    animation: slideUp 0.22s cubic-bezier(0.19, 1, 0.22, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0.6; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 999px;
    margin: 0 auto 18px;
  }

  .sheet h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
  }

  .sheet .subtle {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 20px;
  }

  .sheet-section {
    margin-bottom: 22px;
  }

  .sheet-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 10px;
  }

  /* Duration stepper */
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
  }

  .stepper button {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    font-size: 20px;
    color: var(--ink-soft);
  }

  .stepper button:hover { background: var(--surface-2); }

  .stepper .value {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
  }

  .stepper .value small {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-left: 4px;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  /* Color picker for week review */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .color-option {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    transition: border-color 0.15s ease;
  }

  .color-option:hover { border-color: var(--border-strong); }

  .color-option.selected {
    border-color: var(--ink);
    background: var(--surface-2);
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .color-swatch.deep  { background: var(--green-deep); }
  .color-swatch.soft  { background: var(--green-soft); }
  .color-swatch.ochre { background: var(--ochre); }
  .color-swatch.terra { background: var(--terracotta); }

  .color-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    margin: 0;
  }

  .color-desc {
    font-size: 11px;
    color: var(--ink-soft);
    margin: 0;
  }

  /* Action row */
  .sheet-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--green-deep);
    color: var(--bg);
  }

  .btn-primary:hover { background: #1F362D; }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border-strong); color: var(--ink); }

  .btn-danger-ghost {
    background: transparent;
    color: var(--terracotta);
    flex: 0;
    padding: 14px 0;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Session list in week review */
  .session-list {
    display: grid;
    gap: 6px;
  }

  .session-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid var(--border);
  }

  .session-row .day { color: var(--ink-soft); }

  .session-row .summary {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
  }

  .session-empty {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    padding: 10px 2px;
  }

  /* Year view */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 4px;
    margin-top: 6px;
  }

  .year-grid .week {
    aspect-ratio: 1;
    border-radius: 3px;
  }

  .year-labels {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 4px;
    margin-top: 8px;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Pre-start banner */
  .start-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 20px;
    text-align: center;
    margin-top: 6px;
  }
  .start-banner .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 8px;
  }
  .start-banner h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 6px;
  }
  .start-banner p {
    color: var(--ink-soft);
    font-size: 13px;
    margin: 0;
  }
  .start-banner .countdown {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--green-deep);
    color: var(--bg);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  /* Pre-start chain tile */
  .week.pre-start {
    background: transparent;
    border: 1px solid var(--border);
    opacity: 0.55;
    cursor: default;
  }
  .week.pre-start:hover { transform: none; }

  /* Tappable session row */
  .session-row.tappable { cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; }
  .session-row.tappable:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .session-row .chev { color: var(--ink-faint); margin-left: 8px; }
  .session-row .has-note {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Note textarea */
  .note-area {
    width: 100%;
    min-height: 84px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    resize: vertical;
    font-family: 'Fraunces', Georgia, serif;
    line-height: 1.4;
  }
  .note-area:focus { outline: none; border-color: var(--border-strong); }

  .today-note-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    color: var(--ink-soft);
    font-size: 13px;
    text-align: left;
    background: transparent;
    font-family: 'Fraunces', Georgia, serif;
  }
  .today-note-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .today-note-btn.has-note {
    border-style: solid;
    background: var(--surface);
    color: var(--ink);
  }

  /* Day sheet activity list */
  .day-activities {
    display: grid;
    gap: 8px;
  }
  .day-activity-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .day-activity-row .aname {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .day-activity-row .asub {
    font-size: 11px;
    color: var(--ink-faint);
    display: block;
    margin-top: 2px;
  }
  .mini-stepper {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mini-stepper button {
    width: 30px; height: 30px;
    border-radius: 6px;
    color: var(--ink-soft);
    font-size: 16px;
    background: var(--surface-2);
  }
  .mini-stepper .mval {
    min-width: 54px;
    text-align: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .mini-stepper .mval small {
    font-family: 'Inter', sans-serif;
    color: var(--ink-faint);
    font-size: 10px;
    margin-left: 3px;
  }

  /* Guide sheet */
  .guide-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .guide-item:last-child { border-bottom: 0; }
  .guide-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
  }
  .guide-tier {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 2px;
  }
  .guide-sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 6px;
  }
  .guide-body {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.5;
  }

  /* Habit chips */
  .habit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .habit-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .habit-chip:hover { border-color: var(--border-strong); }
  .habit-chip .tick {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid var(--border-strong);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    flex-shrink: 0;
  }
  .habit-chip.on {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .habit-chip.on .tick {
    background: var(--bg);
    border-color: var(--bg);
    color: var(--green-deep);
  }
  .habit-chip.on .tick::after { content: '✓'; }

  /* Sleep row */
  .sleep-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .sleep-row .slabel {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .sleep-row .ssub {
    display: block;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-family: 'Inter', sans-serif;
  }

  /* Week summary */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .summary-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .summary-tile .slabel {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 4px;
  }
  .summary-tile .svalue {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .summary-tile .svalue small {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: 4px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .summary-tile.wide { grid-column: 1 / -1; }
  .summary-tile.wide .svalue { font-size: 15px; }

  /* Moment tiles */
  .moment-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .moment-tile {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    box-shadow: 0 1px 2px rgba(74, 56, 28, 0.04);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease, box-shadow 0.18s ease;
  }
  .moment-tile:hover {
    border-color: var(--border-strong);
    background: linear-gradient(180deg, var(--surface) 0%, #F5EAC9 100%);
    transform: translateY(-1px);
  }
  .moment-tile .meyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--green-leaf);
  }
  .moment-tile .mtitle {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.35;
  }
  .moment-tile.answered {
    background: var(--surface-2);
  }
  .moment-tile .mbadge {
    margin-top: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green-soft);
  }
  .moment-tile .mbadge.wrong { color: var(--terracotta); }

  /* Quote sheet */
  .quote-body {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    line-height: 1.35;
    margin: 6px 0 14px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .quote-attrib {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 22px;
    letter-spacing: 0.02em;
  }
  .quote-attrib strong {
    color: var(--ink);
    font-weight: 500;
  }
  .quote-meaning-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 8px;
  }
  .quote-meaning {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0;
  }

  /* Word sheet */
  .word-headline {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 30px;
    font-weight: 500;
    margin: 6px 0 2px;
    letter-spacing: -0.01em;
  }
  .word-meta {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    font-style: italic;
  }
  .word-block-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 6px;
  }
  .word-def {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16px;
    line-height: 1.45;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .word-origin, .word-example {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }
  .word-example {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--ink);
  }
  .word-example::before { content: "\201C"; color: var(--ink-faint); margin-right: 2px; }
  .word-example::after  { content: "\201D"; color: var(--ink-faint); margin-left: 2px; }

  /* Quiz sheet */
  .quiz-question {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    line-height: 1.3;
    margin: 4px 0 20px;
  }
  .quiz-options {
    display: grid;
    gap: 8px;
  }
  .quiz-option {
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    text-align: left;
    color: var(--ink);
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--border-strong); }
  .quiz-option.correct {
    background: var(--green-deep);
    color: var(--bg);
    border-color: var(--green-deep);
  }
  .quiz-option.wrong {
    background: var(--terracotta);
    color: var(--bg);
    border-color: var(--terracotta);
  }
  .quiz-option.muted { opacity: 0.55; }
  .quiz-result {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .quiz-result strong { color: var(--ink); font-weight: 500; }

  /* Practice block */
  .practice-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 8px;
  }
  .practice-count { color: var(--ink-soft); letter-spacing: 0.08em; }
  .practice-input {
    width: 100%;
    padding: 12px 14px;
    font: inherit;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .practice-input:focus { outline: none; border-color: var(--border-strong); }
  .practice-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin: 8px 0 0;
    font-style: italic;
  }
  .practice-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin: 10px 0 0;
  }
  .practice-bar span {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
  }
  .practice-bar span.on { background: var(--green-soft); }
  .practice-complete {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    background: var(--green-deep);
    color: var(--bg);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .practice-complete .check-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--green-deep);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
  }
  .practice-complete .label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .practice-complete .reset {
    margin-left: auto;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
    color: var(--bg);
  }
  .practice-complete .reset:hover { opacity: 1; }

  /* Archive */
  .archive-list {
    display: grid;
    gap: 6px;
  }
  .archive-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .archive-item:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .archive-item .aleft {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .archive-item .adate {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
  }
  .archive-item .atext {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .archive-item .abadge {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green-soft);
    flex-shrink: 0;
  }
  .archive-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }
  .archive-tab {
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .archive-tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .archive-empty {
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
    padding: 20px 2px;
    text-align: center;
  }

  /* Recent view */
  .recent-day {
    display: grid;
    gap: 6px;
    margin-bottom: 14px;
  }
  .recent-day-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    padding: 0 2px 4px;
  }
  .recent-day-head .rday-today {
    color: var(--green-deep);
    font-weight: 600;
  }
  .archive-item .akind {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin-right: 8px;
  }

  /* Capture (personal sentence / reflect) */
  .capture-help {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0 0 10px;
  }
  .capture-help em {
    font-style: italic;
    color: var(--ink);
  }
  .capture-input {
    width: 100%;
    min-height: 84px;
    padding: 12px 14px;
    font: inherit;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    resize: vertical;
  }
  .capture-input:focus { outline: none; border-color: var(--border-strong); }
  .capture-warn {
    font-size: 12px;
    color: var(--terracotta);
    margin: 8px 0 0;
    font-style: italic;
    min-height: 16px;
  }

  /* Deck status card */
  .deck-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .deck-card .deck-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .deck-card .deck-sentence {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 10px;
  }
  .deck-card .deck-sentence::before { content: "\201C"; color: var(--ink-faint); margin-right: 2px; }
  .deck-card .deck-sentence::after  { content: "\201D"; color: var(--ink-faint); margin-left: 2px; }
  .deck-wild-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .deck-wild {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    flex-shrink: 0;
    cursor: pointer;
  }
  .deck-wild.on {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .deck-wild.on::after { content: '✓'; }
  .deck-wild-label {
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .deck-wild-label.on { color: var(--ink); }

  /* Review tile */
  .moment-tile.review-due {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .moment-tile.review-due .meyebrow { color: rgba(245, 241, 232, 0.7); }
  .moment-tile.review-due .mtitle { color: var(--bg); }
  .moment-tile.review-empty {
    border-style: dashed;
    background: transparent;
    color: var(--ink-soft);
  }

  /* Review sheet */
  .review-progress {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .review-progress-bar {
    display: grid;
    gap: 4px;
    margin-bottom: 20px;
  }
  .review-progress-bar .seg {
    height: 3px;
    border-radius: 2px;
    background: var(--border);
  }
  .review-progress-bar .seg.on { background: var(--green-soft); }
  .review-progress-bar .seg.current { background: var(--green-deep); }

  .review-prompt {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.2;
    margin: 4px 0 16px;
    letter-spacing: -0.01em;
  }
  .review-subprompt {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }
  .review-answer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .review-answer .def {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 10px;
  }
  .review-answer .meta {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 10px 0 4px;
  }
  .review-answer .personal {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
    font-style: italic;
  }

  .rating-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .rating-btn {
    padding: 14px 10px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
  }
  .rating-btn .sub {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .rating-btn:hover { border-color: var(--border-strong); }
  .rating-btn.forgot { background: var(--terracotta); color: var(--bg); border-color: var(--terracotta); }
  .rating-btn.nearly { background: var(--ochre); color: var(--ink); border-color: var(--ochre); }
  .rating-btn.good   { background: var(--green-deep); color: var(--bg); border-color: var(--green-deep); }
  .rating-btn.forgot .sub, .rating-btn.good .sub { color: rgba(245, 241, 232, 0.7); }

  .review-complete {
    text-align: center;
    padding: 20px 0;
  }
  .review-complete h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 8px;
  }
  .review-complete p {
    color: var(--ink-soft);
    font-size: 13px;
    margin: 0;
  }

  /* Day color picker (dots) */
  .day-color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .day-color-dot {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--border);
    border: 2px solid transparent;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s ease, border-color 0.15s ease;
  }
  .day-color-dot:hover { transform: translateY(-1px); }
  .day-color-dot.deep   { background: var(--green-deep); }
  .day-color-dot.soft   { background: var(--green-soft); }
  .day-color-dot.ochre  { background: var(--ochre); }
  .day-color-dot.terra  { background: var(--terracotta); }
  .day-color-dot.selected { border-color: var(--ink); }
  .day-color-dot.clear {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    width: 34px;
    height: 34px;
    margin-left: auto;
  }
  .day-color-dot.clear:hover { border-color: var(--ink-soft); color: var(--ink-soft); }
  .day-color-tag {
    margin-left: auto;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* Week days strip */
  .week-days-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .week-day-tile {
    aspect-ratio: 1 / 1.2;
    border-radius: 6px;
    background: var(--border);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 4px 0;
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 0;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .week-day-tile:hover { transform: translateY(-1px); }
  .week-day-tile.deep   { background: var(--green-deep); color: rgba(245, 241, 232, 0.8); }
  .week-day-tile.soft   { background: var(--green-soft); color: rgba(245, 241, 232, 0.85); }
  .week-day-tile.ochre  { background: var(--ochre); color: rgba(43, 43, 43, 0.7); }
  .week-day-tile.terra  { background: var(--terracotta); color: rgba(245, 241, 232, 0.85); }
  .week-day-tile.blank {
    background: var(--surface-2);
    color: var(--ink-faint);
  }
  .week-day-tile.future {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--ink-faint);
  }
  .week-day-tile.today {
    outline: 1px solid var(--ink);
    outline-offset: 1px;
  }

  .week-days-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--ink-faint);
  }

  /* Yes / No pill toggle (drinks, flowers) */
  .yn-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .yn-choice {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    text-align: center;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .yn-choice:hover { border-color: var(--border-strong); }
  .yn-choice.on {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .drink-details {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }

  /* Flowers banner — shows on Wednesdays */
  .flowers-banner {
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    padding: 14px 16px;
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .flowers-banner p {
    margin: 0;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .flowers-banner .actions { display: flex; gap: 8px; }
  .flowers-banner .actions button {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--ink);
  }
  .flowers-banner .actions button:hover { border-color: var(--ink-soft); }
  .flowers-banner .actions button.yes {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .flowers-banner.answered {
    background: var(--surface-2);
    border-style: solid;
    border-color: var(--border);
  }
  .flowers-banner.answered p { color: var(--ink-soft); }
  .flowers-banner .undo {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    padding: 4px 8px;
    border: 0;
    background: transparent;
  }
  .flowers-banner .undo:hover { color: var(--ink-soft); }

  /* Thoughts — free-form journal entries on the home page */
  .thoughts-list {
    display: grid;
    gap: 8px;
  }
  .thought-item {
    display: grid;
    gap: 4px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .thought-item:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .thought-item .tdate {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
  }
  .thought-item .ttext {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.45;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    white-space: normal;
  }
  .thought-new-btn {
    margin-top: 10px;
    width: 100%;
    padding: 12px 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    color: var(--ink-soft);
    font-size: 13px;
    text-align: center;
    background: transparent;
    font-family: 'Fraunces', Georgia, serif;
  }
  .thought-new-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .thoughts-see-all {
    display: block;
    margin: 12px auto 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    background: transparent;
  }
  .thoughts-see-all:hover { color: var(--ink-soft); }

  /* Play card — entry into the quiz hub */
  .play-card {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 20px 18px;
    background: var(--green-deep);
    border: 1px solid var(--green-deep);
    border-radius: var(--radius-lg);
    color: var(--bg);
    text-align: left;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .play-card:hover { transform: translateY(-1px); background: #26403a; }
  .play-card:active { transform: scale(0.99); }
  .play-card .pmeyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(245, 241, 232, 0.7);
  }
  .play-card .ptitle {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .play-card .psub {
    font-size: 13px;
    color: rgba(245, 241, 232, 0.8);
    margin-top: 2px;
  }

  /* Quiz — category picker */
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .cat-chip {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .cat-chip:hover { border-color: var(--border-strong); }
  .cat-chip.on {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .cat-chip .ccount {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 2px;
  }
  .cat-chip.on .ccount { color: rgba(245, 241, 232, 0.7); }

  /* Workouts */
  .muscle-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 6px;
  }
  .ex-diff {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    background: var(--surface);
    white-space: nowrap;
  }
  .ex-diff-beginner { color: var(--green-deep); border-color: var(--green-soft); }
  .ex-diff-intermediate { color: var(--ochre); border-color: var(--ochre); }
  .ex-diff-advanced { color: var(--terracotta); border-color: var(--terracotta); }
  .ex-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .works-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .works-chip {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--ink-soft);
  }
  .works-chip-primary {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .howto-steps {
    margin: 4px 0 0;
    padding-left: 20px;
  }
  .howto-steps li {
    margin-bottom: 8px;
    line-height: 1.5;
    color: var(--ink);
  }
  .howto-steps li:last-child { margin-bottom: 0; }
  .ex-what, .ex-tips {
    line-height: 1.5;
    color: var(--ink);
    margin: 4px 0 0;
  }
  .ex-tips { color: var(--ink-soft); font-size: 14px; }
  .workout-item .atext { white-space: normal; }
  .workout-item .adate { display: flex; flex-wrap: wrap; gap: 4px 0; margin-top: 4px; }

  .body-diagram {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 6px 0 18px;
  }
  .body-diagram svg { width: 100%; max-width: 130px; height: auto; }
  .body-diagram .silhouette {
    fill: var(--surface-2);
    stroke: var(--border);
    stroke-width: 1;
    pointer-events: none;
  }
  .muscle {
    fill: var(--surface-2);
    stroke: var(--border);
    stroke-width: 1;
    transition: fill .15s, stroke .15s;
    cursor: pointer;
  }
  .muscle:hover { stroke: var(--border-strong); }
  .muscle.active { fill: var(--green-soft); stroke: var(--green-deep); }
  .muscle.active.primary { fill: var(--green-deep); }
  .muscle.filter-on { stroke: var(--ink); stroke-width: 2; }
  .body-diagram-caption {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: -10px 0 14px;
  }

  /* Plans */
  .plan-item .plan-chev,
  .plan-pick-item .plan-chev {
    font-size: 22px;
    color: var(--ink-faint);
    line-height: 1;
    flex-shrink: 0;
  }
  .pick-mode-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    background: var(--green-deep);
    color: var(--bg);
    border-radius: var(--radius);
    margin-bottom: 14px;
    font-size: 13px;
  }
  .pick-mode-banner strong { font-weight: 600; }
  .pick-mode-banner button {
    background: transparent;
    border: 1px solid rgba(245, 241, 232, 0.35);
    color: var(--bg);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .pick-mode-banner button:hover { background: rgba(245, 241, 232, 0.1); }
  .pick-add-chip {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--green-deep);
    color: var(--bg);
    flex-shrink: 0;
  }
  .workout-item-picking { border-color: var(--green-soft); }
  .inline-link {
    background: transparent;
    border: none;
    padding: 0;
    color: var(--green-deep);
    text-decoration: underline;
    cursor: pointer;
    font: inherit;
  }
  .plan-ex-list {
    display: grid;
    gap: 8px;
    margin-top: 4px;
  }
  .plan-ex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .plan-ex-main {
    flex: 1;
    min-width: 0;
  }
  .plan-ex-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .plan-ex-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }
  .plan-ex-inputs label {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .plan-ex-inputs input {
    width: 44px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: center;
    text-transform: none;
    letter-spacing: normal;
  }
  .plan-ex-inputs input:focus { outline: none; border-color: var(--green-deep); }
  .plan-ex-times { color: var(--ink-faint); font-size: 14px; letter-spacing: 0; }
  .plan-ex-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .plan-ex-btn {
    width: 26px;
    height: 22px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink-soft);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }
  .plan-ex-btn:hover:not(:disabled) { border-color: var(--border-strong); color: var(--ink); }
  .plan-ex-btn:disabled { opacity: 0.35; cursor: default; }
  .plan-ex-remove { color: var(--terracotta); border-color: var(--border); }
  .plan-ex-remove:hover { border-color: var(--terracotta); }

  /* Stats */
  .stats-sub {
    font-size: 12px;
    color: var(--ink-faint);
    margin: -6px 0 10px;
  }
  .stats-summary { margin-bottom: 16px; }

  .stats-chain-hero {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 5px;
  }
  .stats-chain-week {
    aspect-ratio: 1 / 1.3;
    border-radius: 6px;
    background: var(--border);
    border: none;
    padding: 0;
    transition: transform 0.15s ease;
    cursor: pointer;
  }
  .stats-chain-week:hover:not(:disabled) { transform: translateY(-1px); }
  .stats-chain-week.deep   { background: var(--green-deep); }
  .stats-chain-week.soft   { background: var(--green-soft); }
  .stats-chain-week.ochre  { background: var(--ochre); }
  .stats-chain-week.terra  { background: var(--terracotta); }
  .stats-chain-week.blank  { background: var(--surface-2); }
  .stats-chain-week.current {
    background: transparent;
    border: 1px dashed var(--green-deep);
  }
  .stats-chain-week.pre-start {
    background: transparent;
    border: 1px dotted var(--border-strong);
    cursor: default;
  }
  .stats-chain-legend { margin-top: 8px; }

  .year-heatmap-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 4px 0 2px;
  }
  .year-heatmap-svg { width: 100%; min-width: 520px; height: auto; display: block; }
  .yh-cell {
    fill: var(--surface-2);
    transition: opacity 0.15s ease;
    cursor: pointer;
  }
  .yh-cell:hover { opacity: 0.8; }
  .yh-cell.deep   { fill: var(--green-deep); }
  .yh-cell.soft   { fill: var(--green-soft); }
  .yh-cell.ochre  { fill: var(--ochre); }
  .yh-cell.terra  { fill: var(--terracotta); }
  .yh-cell.blank  { fill: var(--surface-2); }
  .yh-cell.current {
    fill: transparent;
    stroke: var(--green-deep);
    stroke-dasharray: 2 2;
    stroke-width: 1;
  }
  .yh-cell.pre {
    fill: transparent;
    stroke: var(--border);
    stroke-width: 0.5;
    cursor: default;
  }
  .yh-month {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    fill: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .mood-mix-wrap {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 18px;
    align-items: center;
    padding: 8px 0;
  }
  @media (max-width: 380px) {
    .mood-mix-wrap { grid-template-columns: 1fr; justify-items: center; }
  }
  .mood-donut {
    width: 160px;
    height: 160px;
    display: block;
  }
  .mood-donut .donut-value {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 34px;
    fill: var(--ink);
    font-weight: 500;
  }
  .mood-donut .donut-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    fill: var(--ink-faint);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .mood-legend {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 6px;
  }
  .mood-legend-row {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--ink);
  }
  .mood-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    display: inline-block;
  }
  .mood-legend-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
  }
  .mood-legend-count { color: var(--ink-soft); font-size: 13px; }
  .mood-legend-count small {
    color: var(--ink-faint);
    margin-left: 4px;
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  .day-heatmap-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 4px 0 2px;
  }
  .day-heatmap { width: 100%; min-width: 240px; max-width: 360px; height: auto; display: block; }
  .dh-cell {
    fill: var(--surface-2);
    transition: opacity 0.15s ease;
    cursor: pointer;
  }
  .dh-cell[data-iso]:hover { opacity: 0.75; }
  .dh-cell.dh-blank  { fill: var(--surface-2); }
  .dh-cell.dh-deep   { fill: var(--green-deep); }
  .dh-cell.dh-soft   { fill: var(--green-soft); }
  .dh-cell.dh-ochre  { fill: var(--ochre); }
  .dh-cell.dh-terra  { fill: var(--terracotta); }
  .dh-cell.dh-future {
    fill: transparent;
    stroke: var(--border);
    stroke-width: 0.5;
    cursor: default;
  }
  .dh-cell.dh-pre {
    fill: transparent;
    stroke: var(--border);
    stroke-width: 0.5;
    cursor: default;
  }
  .dh-row-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    fill: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .act-summary-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .act-total {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .act-total-sub {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .act-rows { display: grid; gap: 8px; }
  .act-row {
    display: grid;
    grid-template-columns: 84px 1fr 64px;
    gap: 10px;
    align-items: center;
  }
  .act-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
  }
  .act-bar-wrap {
    height: 10px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .act-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s ease;
    min-width: 2px;
  }
  .act-val {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: right;
  }
  .act-val small {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    margin-left: 2px;
    text-transform: uppercase;
  }

  .act-legend {
    list-style: none;
    margin: 0 0 10px;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
  }
  .act-legend-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .act-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  .weekly-bars-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 6px 0 2px;
  }
  .weekly-bars {
    width: 100%;
    min-width: 280px;
    max-width: 480px;
    height: auto;
    display: block;
  }
  .wb-axis {
    stroke: var(--border);
    stroke-width: 1;
  }
  .wb-empty {
    fill: var(--surface-2);
  }
  .wb-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    fill: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Habits */
  .habit-list { display: grid; gap: 14px; }
  .habit-row {
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .habit-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .habit-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
  }
  .habit-rate {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .habit-rate small {
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: 6px;
    letter-spacing: 0.06em;
  }
  .habit-strip {
    display: flex;
    flex-wrap: nowrap;
    gap: 3px;
  }
  .habit-sq {
    flex: 1;
    aspect-ratio: 1 / 1;
    border-radius: 2px;
    max-width: 10px;
  }
  .habit-sq.habit-on    { background: var(--green-deep); }
  .habit-sq.habit-off   { background: var(--surface-2); }
  .habit-sq.habit-blank {
    background: transparent;
    border: 1px dashed var(--border);
  }

  /* Sleep */
  .sleep-chart {
    width: 100%;
    max-width: 480px;
    height: auto;
    display: block;
  }
  .sleep-bar { fill: var(--green-soft); }
  .sleep-bar.sleep-good { fill: var(--green-deep); }
  .sleep-bar.sleep-ok   { fill: var(--green-soft); }
  .sleep-bar.sleep-low  { fill: var(--ochre); }
  .sleep-empty { fill: var(--border); }
  .sleep-axis { stroke: var(--border); stroke-width: 1; }
  .sleep-target {
    stroke: var(--ink-faint);
    stroke-width: 0.75;
    stroke-dasharray: 3 3;
  }
  .sleep-target-label {

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return { ...defaultState(), ...JSON.parse(raw) };
    } catch { return defaultState(); }
  }
  function saveLocal() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }
  function save() {
    state._updatedAt = new Date().toISOString();
    saveLocal();
    schedulePush();

  // --- Cloud sync ----------------------------------------------------------

  let currentUser = null;
  let syncStatus = sb ? 'signed-out' : 'disabled'; // signed-out | syncing | synced | offline | error | disabled
  let lastSyncAt = null;
  let pushTimer = null;

  function setSyncStatus(s) {
    syncStatus = s;
    if (s === 'synced') lastSyncAt = new Date();
    renderSyncSection();
  }

  function schedulePush() {
    if (!sb || !currentUser) return;
    clearTimeout(pushTimer);
    setSyncStatus('syncing');
    pushTimer = setTimeout(pushToCloud, 1000);
  }

  async function pushToCloud() {
    if (!sb || !currentUser) return;
    try {
      const { error } = await sb.from('user_state').upsert({
        user_id: currentUser.id,
        state: state,
        updated_at: state._updatedAt || new Date().toISOString(),
      });
      if (error) throw error;
      setSyncStatus('synced');
    } catch (err) {
      console.warn('[caprisun] push failed:', err);
      setSyncStatus('offline');
    }
  }

  async function pullFromCloud() {
    if (!sb || !currentUser) return;
    try {
      setSyncStatus('syncing');
      const { data, error } = await sb.from('user_state')
        .select('state, updated_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) throw error;

      const localAt = state._updatedAt || '';
      if (data && data.state) {
        const cloudAt = data.updated_at || '';
        if (cloudAt > localAt) {
          // Cloud wins — replace local
          state = { ...defaultState(), ...data.state };
          saveLocal();
          renderAll();
        } else if (localAt > cloudAt) {
          // Local is newer — push
          await pushToCloud();
          return;
        }
      } else {
        // No cloud yet — push whatever we have
        await pushToCloud();
        return;
      }
      setSyncStatus('synced');
    } catch (err) {
      console.warn('[caprisun] pull failed:', err);
      setSyncStatus('offline');
    }
  }

  function initAuth() {
    if (!sb) return;
    sb.auth.getSession().then(({ data }) => {
      if (data?.session?.user && !currentUser) {
        currentUser = data.session.user;
        pullFromCloud();
      }
    });
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
        const user = session?.user || null;
        const changed = user?.id !== currentUser?.id;
        currentUser = user;
        if (changed && currentUser) pullFromCloud();
        else renderSyncSection();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        setSyncStatus('signed-out');
      }
    });
  }

  function timeAgo(d) {
    if (!d) return '';
    const s = Math.floor((Date.now() - d.getTime()) / 1000);
    if (s < 10) return 'just now';
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return d.toLocaleDateString();
  }
