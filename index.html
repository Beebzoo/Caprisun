  // --- Date helpers --------------------------------------------------------

  const pad = (n) => String(n).padStart(2, '0');
  const toISODate = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

  function startOfWeek(d) {
    const out = new Date(d);
    out.setHours(0, 0, 0, 0);
    const day = out.getDay(); // 0 = Sun
    const diff = (day + 6) % 7; // Monday-start
    out.setDate(out.getDate() - diff);
    return out;
  }

  function addDays(d, n) {
    const out = new Date(d);
    out.setDate(out.getDate() + n);
    return out;
  }

  function monthShort(d) {
    return d.toLocaleString('en-GB', { month: 'short' });
  }

  function parseISO(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function daysBetween(a, b) {
    const ms = startOfDay(b) - startOfDay(a);
    return Math.round(ms / 86400000);
  }

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function getStartMonday() {
    return startOfWeek(parseISO(state.startDate));
  }

  function isPreStart() {
    return startOfDay(new Date()) < startOfDay(parseISO(state.startDate));
  }

  function daySeed(date) {
    // YYYYMMDD as a single integer — stable, sortable, distinct per day.
    return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
  }

  // Drinks "till how late" — encoded as offset-in-minutes from 18:00, range 0..660 (18:00 → 05:00 next day).
  const DRINK_OFFSET_MAX = 11 * 60; // 05:00 next day
  function offsetToTime(off) {
    const clamped = Math.max(0, Math.min(DRINK_OFFSET_MAX, off));
    const mins = (18 * 60 + clamped) % (24 * 60);
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${pad(h)}:${pad(m)}`;
  }
  function timeToOffset(str) {
    if (!str || typeof str !== 'string') return 5 * 60 + 30; // default 23:30
    const [h, m] = str.split(':').map(Number);
    let mins = (h || 0) * 60 + (m || 0);
    if (mins < 18 * 60) mins += 24 * 60; // past midnight
    return Math.max(0, Math.min(DRINK_OFFSET_MAX, mins - 18 * 60));
  }

  function nextReviewISOFromStage(stage) {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    const days = SRS_INTERVALS[Math.min(Math.max(0, stage), SRS_INTERVALS.length - 1)];
    d.setDate(d.getDate() + days);
    return toISODate(d);
  }

  function applyRatingToEntry(entry, rating) {
    const todayISO = toISODate(new Date());
    entry.lastReview = todayISO;
    entry.history = entry.history || [];
    entry.history.push({ date: todayISO, rating });
    if (rating === 'good') entry.stage = Math.min(SRS_INTERVALS.length - 1, (entry.stage || 0) + 1);
    else if (rating === 'forgot') entry.stage = 0;
    // 'nearly' → stage unchanged
    entry.nextReview = nextReviewISOFromStage(entry.stage || 0);
    return entry;
  }

  function createDeckEntry({ personalSentence, personalNote }) {
    const todayISO = toISODate(new Date());
    return {
      stage: 0,
      firstSeen: todayISO,
      lastReview: null,
      nextReview: nextReviewISOFromStage(0),
      personalSentence: personalSentence || '',
      personalNote: personalNote || '',
      usedInWild: false,
      history: [],
    };
  }

  function dueDeckEntries(deck) {
    const todayISO = toISODate(new Date());
    return Object.entries(deck)
      .filter(([_, e]) => e.nextReview && e.nextReview <= todayISO)
      .sort((a, b) => (a[1].nextReview || '').localeCompare(b[1].nextReview || ''));
  }

  function stageLabel(stage) {
    const s = Math.min(Math.max(0, stage || 0), SRS_INTERVALS.length - 1);
    return `Stage ${s + 1} of ${SRS_INTERVALS.length}`;
  }

  function pickQuoteForDate(date) {
    const seed = daySeed(date);
    return QUOTES[seed % QUOTES.length];
  }

  function pickWordForDate(date) {
    // Offset so word and quote don't always rotate in lockstep.
    const seed = daySeed(date) + 13;
    return WORDS[seed % WORDS.length];
  }

  function pickMotivationForDate(date) {
    const seed = daySeed(date) + 5;
    return MOTIVATIONS[seed % MOTIVATIONS.length];
  }

  function pickQuizForDate(date) {
    const seed = daySeed(date);
    const idx = seed % CAPITALS.length;
    const correct = CAPITALS[idx];
    const distractors = [];
    let step = 1;
    while (distractors.length < 3 && step < CAPITALS.length) {
      const i = (idx + step * 7) % CAPITALS.length;
      const cand = CAPITALS[i];
      if (cand.country !== correct.country && !distractors.find(d => d.capital === cand.capital)) {
        distractors.push(cand);
      }
      step++;
    }
    const options = new Array(4);
    const correctPos = seed % 4;
    options[correctPos] = correct.capital;
    let di = 0;
    for (let i = 0; i < 4; i++) {
      if (i !== correctPos) options[i] = distractors[di++].capital;
    }
    return { country: correct.country, answer: correct.capital, options };
  }

  // --- Computed ------------------------------------------------------------

  function avgFor(activity) {
    const mins = [];
    for (const day of Object.values(state.sessions)) {
      const v = day?.[activity.key];
      if (typeof v === 'number' && v > 0) mins.push(v);
    }
    if (mins.length === 0) return activity.defaultAvg;
    return Math.round(mins.reduce((a, b) => a + b, 0) / mins.length);
  }

  function sessionsForDate(dateISO) {
    return state.sessions[dateISO] || {};
  }

  function sessionsForWeek(monday) {
    const out = [];
    for (let i = 0; i < 7; i++) {
      const d = addDays(monday, i);
      const iso = toISODate(d);
      out.push({ date: d, iso, sessions: sessionsForDate(iso) });
    }
    return out;
  }

  function weekSummary(weekDays) {
    let gymCount = 0, yogaCount = 0, medCount = 0, readCount = 0, anyMovement = 0;
    for (const { sessions } of weekDays) {
      if (sessions.gym > 0) { gymCount++; anyMovement++; }
      if (sessions.yoga > 0) { yogaCount++; anyMovement++; }
      if (sessions.meditation > 0) medCount++;
      if (sessions.reading > 0) readCount++;
    }
    return { gymCount, yogaCount, medCount, readCount, anyMovement };
  }

  const COLOR_RANK = { deep: 4, soft: 3, ochre: 2, terra: 1 };

  function colorFromAvg(avg) {
    if (avg >= 3.5) return 'deep';
    if (avg >= 2.5) return 'soft';
    if (avg >= 1.5) return 'ochre';
    return 'terra';
  }

  function weekDayColors(weekDays) {
    return weekDays.map(({ iso }) => state.dayColors[iso] || null);
  }

  function suggestColorFromDays(weekDays) {
    const colors = weekDayColors(weekDays).filter(Boolean);
    if (colors.length === 0) return null;
    const sum = colors.reduce((s, c) => s + (COLOR_RANK[c] || 0), 0);
    const avg = sum / colors.length;
    return { color: colorFromAvg(avg), coloredDays: colors.length, avg };
  }

  function weekHabits(weekDays) {
    const counts = {};
    for (const h of HABITS) counts[h.key] = 0;
    for (const { iso } of weekDays) {
      const h = state.habits[iso] || {};
      for (const k of Object.keys(counts)) if (h[k]) counts[k]++;
    }
    return counts;
  }

  function weekSleep(weekDays) {
    const hrs = [];
    for (const { iso } of weekDays) {
      const s = state.sleep[iso];
      if (typeof s === 'number' && s > 0) hrs.push(s);
    }
    if (hrs.length === 0) return null;
    const total = hrs.reduce((a, b) => a + b, 0);
    return { avg: total / hrs.length, total, days: hrs.length };
  }

  function weekActivityTotals(weekDays) {
    const totals = {};
    for (const a of ACTIVITIES) totals[a.key] = 0;
    for (const { sessions } of weekDays) {
      for (const a of ACTIVITIES) if (sessions[a.key]) totals[a.key] += sessions[a.key];
    }
    return totals;
  }

  function suggestColor(weekDays) {
    const s = weekSummary(weekDays);
    if (s.gymCount >= 3 && s.yogaCount >= 1) return 'deep';
    if (s.gymCount >= 2) return 'soft';
    if (s.anyMovement >= 1) return 'ochre';
    return 'terra';
  }

  // --- Rendering: header ---------------------------------------------------

  function hourOfDay() { return new Date().getHours(); }

  function renderHeader() {
    const now = new Date();
    const h = hourOfDay();
    const greet =
      h < 5 ? 'Still up.' :
      h < 12 ? 'Good morning.' :
      h < 17 ? 'Good afternoon.' :
      h < 21 ? 'Good evening.' : 'Good night.';
    document.getElementById('greeting').textContent = greet;

    const dayName = new Intl.DateTimeFormat('en-GB', { weekday: 'long' }).format(now);
    const dayEl = document.getElementById('day-name');
    if (dayEl) dayEl.textContent = dayName;

    const dateFmt = new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'long' });
    document.getElementById('date').textContent = dateFmt.format(now);

    const motEl = document.getElementById('motivation');
    if (motEl) {
      const m = pickMotivationForDate(now);
      if (m.author) motEl.innerHTML = `${m.text}<span class="mot-author">${m.author}</span>`;
      else motEl.textContent = m.text;
    }
  }

  // --- Rendering: chain ----------------------------------------------------

  const WEEKS_SHOWN = 8;

  function renderChain() {
    const chain = document.getElementById('chain');
    chain.innerHTML = '';
    const thisMonday = startOfWeek(new Date());
    const startMonday = getStartMonday();
    const pre = isPreStart();
    const rightMostMonday = pre ? startMonday : thisMonday;

    for (let i = WEEKS_SHOWN - 1; i >= 0; i--) {
      const monday = addDays(rightMostMonday, -i * 7);
      const iso = toISODate(monday);
      const color = state.weekColors[iso];
      const isRightmost = i === 0;
      const beforeStart = monday < startMonday;

      const btn = document.createElement('button');
      btn.className = 'week';

      if (beforeStart) {
        btn.classList.add('pre-start');
        btn.disabled = true;
      } else if (isRightmost) {
        btn.classList.add('current');
        if (!pre && new Date().getDay() === 0) btn.classList.add('ready');
        btn.addEventListener('click', () => openWeekReview(monday));
      } else if (color) {
        btn.classList.add(color);
        btn.addEventListener('click', () => openWeekReview(monday));
      } else {
        btn.classList.add('blank');
        btn.addEventListener('click', () => openWeekReview(monday));
      }

      btn.setAttribute('aria-label', `Week of ${monthShort(monday)} ${monday.getDate()}`);
      chain.appendChild(btn);
    }

    // Left-edge label
    const oldestMonday = addDays(rightMostMonday, -(WEEKS_SHOWN - 1) * 7);
    const leftLabel = oldestMonday < startMonday
      ? `before ${monthShort(startMonday)} ${startMonday.getDate()}`
      : `${monthShort(oldestMonday)} ${oldestMonday.getDate()}`;
    document.getElementById('chain-start-label').textContent = leftLabel;
    const legendRight = chain.parentElement.querySelector('.chain-legend span:last-child');
    if (legendRight) legendRight.textContent = pre ? 'first week' : 'this week';

    // Sunday seal banner (not pre-start)
    const slot = document.getElementById('seal-slot');
    slot.innerHTML = '';
    if (!pre && new Date().getDay() === 0 && !state.weekColors[toISODate(thisMonday)]) {
      const banner = document.createElement('div');
      banner.className = 'seal-banner';
      banner.innerHTML = `
        <p>Sunday. Time to seal the week.</p>
        <button>Review</button>
      `;
      banner.querySelector('button').addEventListener('click', () => openWeekReview(thisMonday));
      slot.appendChild(banner);
    }
  }

  function renderFlowersPrompt() {
    const slot = document.getElementById('flowers-slot');
    if (!slot) return;
    slot.innerHTML = '';
    if (isPreStart()) return;
    const today = new Date();
    if (today.getDay() !== 3) return; // Wednesday

    const iso = toISODate(today);
    const answer = state.flowers[iso];

    const banner = document.createElement('div');
    banner.className = 'flowers-banner' + (answer ? ' answered' : '');

    if (answer === 'yes') {
      banner.innerHTML = `
        <p>Flowers for Roberta · yes</p>
        <button class="undo" data-action="undo">Change</button>
      `;
    } else if (answer === 'no') {
      banner.innerHTML = `
        <p>Flowers for Roberta · not today</p>
        <button class="undo" data-action="undo">Change</button>
      `;
    } else {
      banner.innerHTML = `
        <p>Flowers for Roberta?</p>
        <div class="actions">
          <button data-val="no">Not today</button>
          <button class="yes" data-val="yes">Yes</button>
        </div>
      `;
    }

    slot.appendChild(banner);

    banner.querySelectorAll('[data-val]').forEach(b => {
      b.addEventListener('click', () => {
        state.flowers[iso] = b.dataset.val;
        save();
        renderFlowersPrompt();
      });
    });
    const undoBtn = banner.querySelector('[data-action="undo"]');
    if (undoBtn) undoBtn.addEventListener('click', () => {
      delete state.flowers[iso];
      save();
      renderFlowersPrompt();
    });
  }

  function renderChecklist() {
    const container = document.getElementById('checklist');
    const progressEl = document.getElementById('checklist-progress');
    if (!container) return;
    const iso = toISODate(new Date());
    const habits = state.habits[iso] || {};

    container.innerHTML = HABITS.map(h => `
      <button class="check-item ${habits[h.key] ? 'on' : ''}" data-habit="${h.key}">
        <span class="tick"></span>
        <span>${h.name}</span>
      </button>
    `).join('');

    container.querySelectorAll('.check-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.habit;
        const cur = state.habits[iso] || {};
        if (cur[k]) delete cur[k];
        else cur[k] = true;
        if (Object.keys(cur).length) state.habits[iso] = cur;
        else delete state.habits[iso];
        save();
        renderChecklist();
      });
    });

    if (progressEl) {
      const done = HABITS.filter(h => habits[h.key]).length;
      progressEl.textContent = `${done}/${HABITS.length}`;
    }
  }

  function renderPreStart() {
    const pre = isPreStart();
    document.getElementById('today-section').style.display = pre ? 'none' : '';
    document.getElementById('prestart-section').style.display = pre ? '' : 'none';
    if (!pre) return;
    const start = parseISO(state.startDate);
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('start-title').textContent = fmt.format(start);
    const days = daysBetween(new Date(), start);
    document.getElementById('start-countdown').textContent = days <= 0 ? 'Starts today' : `In ${days} day${days === 1 ? '' : 's'}`;
  }

  // --- Rendering: today tiles ----------------------------------------------

  function renderTiles() {
    if (isPreStart()) return;
    const today = new Date();
    const todayISO = toISODate(today);
    const plan = PLAN_BY_DAY[today.getDay()] || [];
    const plannedNames = plan.map(k => ACTIVITIES.find(a => a.key === k)?.name).filter(Boolean);
    document.getElementById('plan-label').textContent = plannedNames.length ? `Plan: ${plannedNames.join(' · ')}` : '';

    const container = document.getElementById('tiles');
    container.innerHTML = '';

    for (const act of ACTIVITIES) {
      const mins = state.sessions[todayISO]?.[act.key] || 0;
      const logged = mins > 0;
      const planned = plan.includes(act.key);

      const tile = document.createElement('button');
      tile.className = 'tile' + (logged ? ' logged' : '');
      tile.innerHTML = `
        ${planned ? '<span class="plan-dot" aria-label="planned for today"></span>' : ''}
        <div>
          <p class="name">${act.name}</p>
          <p class="avg">Avg ${avgFor(act)} min</p>
        </div>
        <div class="logged-row">
          <span class="duration-pill">${mins} min</span>
          <span class="edit-link">Edit</span>
        </div>
      `;
      tile.addEventListener('click', () => openLog(act, todayISO));
      container.appendChild(tile);
    }
  }

  // --- Overlay/sheet -------------------------------------------------------

  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');

  function closeSheet() {
    overlay.classList.remove('open');
    sheet.innerHTML = '';
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSheet();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSheet();
  });

  function openSheet(html) {
    sheet.innerHTML = `<div class="sheet-handle"></div>` + html;
    overlay.classList.add('open');
  }

  // --- Log sheet -----------------------------------------------------------

  function openLog(activity, dateISO) {
    const current = state.sessions[dateISO]?.[activity.key] || 0;
    const avg = avgFor(activity);
    let value = current > 0 ? current : avg;

    openSheet(`
      <h2>${activity.name}</h2>
      <p class="subtle">${current > 0 ? `Logged ${current} min today. Adjust or remove.` : `Tap save to log your usual ${avg} min — or adjust first.`}</p>
      <div class="sheet-section">
        <p class="sheet-section-label">Duration</p>
        <div class="stepper">
          <button id="dec" aria-label="Decrease">−</button>
          <span class="value"><span id="val">${value}</span><small>min</small></span>
          <button id="inc" aria-label="Increase">+</button>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">${current > 0 ? 'Update' : 'Log it'}</button>
      </div>
      ${current > 0 ? `<div class="sheet-actions"><button class="btn btn-danger-ghost" id="remove">Remove</button></div>` : ''}
    `);

    const valEl = sheet.querySelector('#val');
    const step = (delta) => { value = Math.max(0, value + delta); valEl.textContent = value; };
    sheet.querySelector('#dec').addEventListener('click', () => step(-5));
    sheet.querySelector('#inc').addEventListener('click', () => step(5));
    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelector('#save').addEventListener('click', () => {
      if (!state.sessions[dateISO]) state.sessions[dateISO] = {};
      if (value <= 0) delete state.sessions[dateISO][activity.key];
      else state.sessions[dateISO][activity.key] = value;
      save();
      renderTiles();
      closeSheet();
    });
    const remove = sheet.querySelector('#remove');
    if (remove) remove.addEventListener('click', () => {
      if (state.sessions[dateISO]) {
        delete state.sessions[dateISO][activity.key];
        save();
      }
      renderTiles();
      closeSheet();
    });
  }

  function renderWeekSummary(weekDays) {
    const habitCounts = weekHabits(weekDays);
    const sleep = weekSleep(weekDays);
    const totals = weekActivityTotals(weekDays);
    const drinkNights = weekDays.filter(({ iso }) => state.drinks[iso]?.drank).length;
    const drinkTotal = weekDays.reduce((s, { iso }) => s + (state.drinks[iso]?.count || 0), 0);
    const fmtH = (n) => Number.isInteger(n) ? String(n) : n.toFixed(1);

    const activityTiles = ACTIVITIES.map(a => {
      const mins = totals[a.key] || 0;
      if (mins === 0) return '';
      return `
        <div class="summary-tile">
          <p class="slabel">${a.name}</p>
          <p class="svalue">${mins}<small>min total</small></p>
        </div>
      `;
    }).join('');

    const habitTiles = HABITS.map(h => {
      const c = habitCounts[h.key] || 0;
      return `
        <div class="summary-tile">
          <p class="slabel">${h.name}</p>
          <p class="svalue">${c}<small>/ 7 days</small></p>
        </div>
      `;
    }).join('');

    const sleepTile = sleep ? `
      <div class="summary-tile wide">
        <p class="slabel">Sleep</p>
        <p class="svalue">${fmtH(sleep.avg)} h avg <small>over ${sleep.days} day${sleep.days === 1 ? '' : 's'}</small></p>
      </div>
    ` : `
      <div class="summary-tile wide">
        <p class="slabel">Sleep</p>
        <p class="svalue" style="color:var(--ink-faint)">—<small>no sleep logged</small></p>
      </div>
    `;

    const drinksTile = drinkNights > 0 ? `
      <div class="summary-tile wide">
        <p class="slabel">Drinks</p>
        <p class="svalue">${drinkNights} night${drinkNights === 1 ? '' : 's'}<small>${drinkTotal} total</small></p>
      </div>
    ` : '';

    const anyActivity = ACTIVITIES.some(a => (totals[a.key] || 0) > 0);

    return `
      <div class="summary-grid">
        ${anyActivity ? activityTiles : '<div class="summary-tile wide"><p class="slabel">Sessions</p><p class="svalue" style="color:var(--ink-faint)">—<small>none logged</small></p></div>'}
        ${habitTiles}
        ${sleepTile}
        ${drinksTile}
      </div>
    `;
  }

  // --- Week review sheet ---------------------------------------------------

  function openWeekReview(monday) {
    const iso = toISODate(monday);
    const weekDays = sessionsForWeek(monday);
    const isCurrent = iso === toISODate(startOfWeek(new Date()));
    const existing = state.weekColors[iso];

    // Prefer day-color average when the user has coloured enough days.
    const fromDays = suggestColorFromDays(weekDays);
    const suggested = (fromDays && fromDays.coloredDays >= 3) ? fromDays.color : suggestColor(weekDays);

    const endOfRange = addDays(monday, 6);
    const rangeLabel = `${monthShort(monday)} ${monday.getDate()} – ${monthShort(endOfRange)} ${endOfRange.getDate()}`;

    const summary = weekSummary(weekDays);
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dayInitials = ['M','T','W','T','F','S','S'];
    const todayISO = toISODate(new Date());

    const strip = weekDays.map(({ date, iso: dIso }, i) => {
      const c = state.dayColors[dIso];
      let cls = 'week-day-tile';
      const isFuture = dIso > todayISO;
      const isToday = dIso === todayISO;
      if (c) cls += ` ${c}`;
      else if (isFuture) cls += ' future';
      else cls += ' blank';
      if (isToday) cls += ' today';
      return `
        <button class="${cls}" data-date="${dIso}" aria-label="${dayNames[i]}">
          ${dayInitials[i]}
        </button>
      `;
    }).join('');

    const rows = weekDays.map(({ date, iso: dIso, sessions }, i) => {
      const parts = [];
      if (sessions.gym) parts.push(`Gym ${sessions.gym}m`);
      if (sessions.yoga) parts.push(`Yoga ${sessions.yoga}m`);
      if (sessions.meditation) parts.push(`Meditation ${sessions.meditation}m`);
      if (sessions.reading) parts.push(`Reading ${sessions.reading}m`);
      const hasNote = !!(state.dayNotes[dIso] && state.dayNotes[dIso].trim());
      return `
        <button class="session-row tappable" data-date="${dIso}">
          <span class="day">${dayNames[i]} · ${date.getDate()} ${monthShort(date)}${hasNote ? '<span class="has-note" title="Note"></span>' : ''}</span>
          <span class="summary">${parts.length ? parts.join(' · ') : '—'}<span class="chev">›</span></span>
        </button>
      `;
    }).join('');

    const weekNote = state.weekNotes[iso] || '';

    const colorOptions = Object.entries(COLOR_META).map(([key, meta]) => {
      const selected = (existing || suggested) === key ? 'selected' : '';
      return `
        <button class="color-option ${selected}" data-color="${key}">
          <span class="color-swatch ${key}"></span>
          <span>
            <p class="color-label">${meta.label}</p>
            <p class="color-desc">${meta.desc}</p>
          </span>
        </button>
      `;
    }).join('');

    const title = isCurrent ? 'This week' : 'Week review';
    const subtitleExtra = isCurrent && new Date().getDay() !== 0
      ? ' · You can seal this on Sunday.'
      : '';

    openSheet(`
      <h2>${title}</h2>
      <p class="subtle">${rangeLabel}${subtitleExtra}</p>

      <div class="sheet-section">
        <p class="sheet-section-label">Days</p>
        <div class="week-days-strip">${strip}</div>
        <div class="week-days-legend">
          <span>${fromDays ? `${fromDays.coloredDays} of 7 coloured · avg ${COLOR_META[fromDays.color].label.toLowerCase()}` : 'Tap a day to colour it'}</span>
          <span>Mon → Sun</span>
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Summary</p>
        ${renderWeekSummary(weekDays)}
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Sessions</p>
        <div class="session-list">
          ${rows || '<p class="session-empty">No sessions logged this week.</p>'}
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Color this week</p>
        <div class="color-grid">${colorOptions}</div>
        ${!existing ? `<p class="subtle" style="margin-top:10px">${fromDays && fromDays.coloredDays >= 3
          ? `Suggested: <strong>${COLOR_META[suggested].label}</strong> — the average of your ${fromDays.coloredDays} coloured day${fromDays.coloredDays === 1 ? '' : 's'}.`
          : `Suggested: <strong>${COLOR_META[suggested].label}</strong> based on ${summary.gymCount} gym · ${summary.yogaCount} yoga · ${summary.medCount} meditation · ${summary.readCount} reading.`
        }</p>` : ''}
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Note on the week</p>
        <textarea class="note-area" id="week-note" placeholder="How did this week feel? What got in the way? What worked?">${weekNote.replace(/</g, '&lt;')}</textarea>
      </div>

      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Close</button>
        <button class="btn btn-primary" id="save">${existing ? 'Update' : 'Seal week'}</button>
      </div>
      ${existing ? `<div class="sheet-actions"><button class="btn btn-danger-ghost" id="clear">Clear color</button></div>` : ''}
    `);

    let chosen = existing || suggested;
    sheet.querySelectorAll('.color-option').forEach(el => {
      el.addEventListener('click', () => {
        sheet.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        chosen = el.dataset.color;
      });
    });
    sheet.querySelectorAll('.session-row.tappable').forEach(el => {
      el.addEventListener('click', () => {
        const d = el.dataset.date;
        closeSheet();
        setTimeout(() => openDay(d, () => openWeekReview(monday)), 180);
      });
    });
    sheet.querySelectorAll('.week-days-strip .week-day-tile').forEach(el => {
      el.addEventListener('click', () => {
        const d = el.dataset.date;
        closeSheet();
        setTimeout(() => openDay(d, () => openWeekReview(monday)), 180);
      });
    });
    sheet.querySelector('#cancel').addEventListener('click', () => {
      const note = sheet.querySelector('#week-note')?.value ?? '';
      if (note.trim()) state.weekNotes[iso] = note;
      else delete state.weekNotes[iso];
      save();
      closeSheet();
    });
    sheet.querySelector('#save').addEventListener('click', () => {
      state.weekColors[iso] = chosen;
      const note = sheet.querySelector('#week-note')?.value ?? '';
      if (note.trim()) state.weekNotes[iso] = note;
      else delete state.weekNotes[iso];
      save();
      renderChain();
      closeSheet();
    });
    const clear = sheet.querySelector('#clear');
    if (clear) clear.addEventListener('click', () => {
      delete state.weekColors[iso];
      save();
      renderChain();
      closeSheet();
    });
  }

  // --- Day sheet -----------------------------------------------------------

  function openDay(dateISO, onClose) {
    const date = parseISO(dateISO);
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const title = dayNames[date.getDay()];
    const fmt = new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'long' });
    const sessions = state.sessions[dateISO] || {};
    const habits = state.habits[dateISO] || {};
    const sleepHrs = state.sleep[dateISO] ?? 0;
    const note = state.dayNotes[dateISO] || '';
    const drinkRec = state.drinks[dateISO] || null;

    const activityRows = ACTIVITIES.map(act => {
      const mins = sessions[act.key] || 0;
      return `
        <div class="day-activity-row" data-key="${act.key}">
          <span>
            <span class="aname">${act.name}</span>
            <span class="asub">Avg ${avgFor(act)} min</span>
          </span>
          <span class="mini-stepper">
            <button data-delta="-5" aria-label="Decrease">−</button>
            <span class="mval"><span class="mv">${mins}</span><small>min</small></span>
            <button data-delta="5" aria-label="Increase">+</button>
          </span>
        </div>
      `;
    }).join('');

    const habitChips = HABITS.map(h => `
      <button class="habit-chip ${habits[h.key] ? 'on' : ''}" data-habit="${h.key}">
        <span class="tick"></span>
        <span>${h.name}</span>
      </button>
    `).join('');

    const initialColor = state.dayColors[dateISO] || '';
    const colorTagText = initialColor ? (COLOR_META[initialColor]?.label || '') : 'Not yet coloured';
    const colorDotsHTML = ['deep', 'soft', 'ochre', 'terra'].map(c => `
      <button class="day-color-dot ${c} ${initialColor === c ? 'selected' : ''}" data-color="${c}" aria-label="${COLOR_META[c].label}"></button>
    `).join('');

    openSheet(`
      <h2>${title}</h2>
      <p class="subtle">${fmt.format(date)}</p>

      <div class="sheet-section">
        <p class="sheet-section-label">How did today feel?</p>
        <div class="day-color-row">
          ${colorDotsHTML}
          <button class="day-color-dot clear" data-color="" aria-label="Clear color">×</button>
          <span class="day-color-tag" id="day-color-tag">${colorTagText}</span>
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Sessions</p>
        <div class="day-activities">${activityRows}</div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Habits</p>
        <div class="habit-grid">${habitChips}</div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Sleep</p>
        <div class="sleep-row">
          <span>
            <span class="slabel">Last night</span>
            <span class="ssub">Tap − / + by half-hours</span>
          </span>
          <span class="mini-stepper">
            <button id="sleep-dec" aria-label="Less sleep">−</button>
            <span class="mval"><span id="sleep-val">${sleepHrs}</span><small>h</small></span>
            <button id="sleep-inc" aria-label="More sleep">+</button>
          </span>
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Did we drink last night?</p>
        <div class="yn-toggle">
          <button class="yn-choice ${drinkRec && drinkRec.drank === false ? 'on' : ''}" data-drink="no">No</button>
          <button class="yn-choice ${drinkRec && drinkRec.drank === true ? 'on' : ''}" data-drink="yes">Yes</button>
        </div>
        <div class="drink-details" id="drink-details" style="display:${drinkRec && drinkRec.drank ? 'grid' : 'none'}">
          <div class="sleep-row">
            <span>
              <span class="slabel">Till how late</span>
              <span class="ssub">half-hour steps</span>
            </span>
            <span class="mini-stepper">
              <button id="until-dec" aria-label="Earlier">−</button>
              <span class="mval"><span id="until-val">${offsetToTime(timeToOffset(drinkRec && drinkRec.until))}</span></span>
              <button id="until-inc" aria-label="Later">+</button>
            </span>
          </div>
          <div class="sleep-row">
            <span>
              <span class="slabel">Roughly how many</span>
              <span class="ssub">beers or equivalents</span>
            </span>
            <span class="mini-stepper">
              <button id="count-dec" aria-label="Fewer">−</button>
              <span class="mval"><span id="count-val">${drinkRec && typeof drinkRec.count === 'number' ? drinkRec.count : 3}</span></span>
              <button id="count-inc" aria-label="More">+</button>
            </span>
          </div>
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Note</p>
        <textarea class="note-area" id="day-note" placeholder="A line or two. How it went, how it felt.">${note.replace(/</g, '&lt;')}</textarea>
      </div>

      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">Save</button>
      </div>
    `);

    // Day color working copy
    let workingColor = initialColor;
    const tagEl = sheet.querySelector('#day-color-tag');
    sheet.querySelectorAll('.day-color-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const c = dot.dataset.color;
        workingColor = c;
        sheet.querySelectorAll('.day-color-dot').forEach(d => d.classList.remove('selected'));
        if (c) dot.classList.add('selected');
        if (tagEl) tagEl.textContent = c ? (COLOR_META[c]?.label || '') : 'Not yet coloured';
      });
    });

    // Sessions working copy
    const working = { ...sessions };
    sheet.querySelectorAll('.day-activity-row').forEach(row => {
      const key = row.dataset.key;
      const mv = row.querySelector('.mv');
      row.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const delta = Number(btn.dataset.delta);
          const next = Math.max(0, (working[key] || 0) + delta);
          working[key] = next;
          mv.textContent = next;
        });
      });
    });

    // Habits working copy
    const workingHabits = { ...habits };
    sheet.querySelectorAll('.habit-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const k = chip.dataset.habit;
        workingHabits[k] = !workingHabits[k];
        chip.classList.toggle('on', !!workingHabits[k]);
      });
    });

    // Sleep stepper
    let workingSleep = sleepHrs;
    const sleepValEl = sheet.querySelector('#sleep-val');
    const fmtSleep = (n) => (Number.isInteger(n) ? String(n) : n.toFixed(1));
    sleepValEl.textContent = fmtSleep(workingSleep);
    const stepSleep = (delta) => {
      workingSleep = Math.max(0, Math.min(14, Math.round((workingSleep + delta) * 2) / 2));
      sleepValEl.textContent = fmtSleep(workingSleep);
    };
    sheet.querySelector('#sleep-dec').addEventListener('click', () => stepSleep(-0.5));
    sheet.querySelector('#sleep-inc').addEventListener('click', () => stepSleep(0.5));

    // Drinks working copy
    let workingDrank = drinkRec ? drinkRec.drank : null; // null | true | false
    let workingUntilOffset = timeToOffset(drinkRec && drinkRec.until);
    let workingCount = drinkRec && typeof drinkRec.count === 'number' ? drinkRec.count : 3;
    const drinkDetails = sheet.querySelector('#drink-details');
    const untilValEl = sheet.querySelector('#until-val');
    const countValEl = sheet.querySelector('#count-val');
    sheet.querySelectorAll('.yn-choice[data-drink]').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.drink;
        workingDrank = (val === 'yes');
        sheet.querySelectorAll('.yn-choice[data-drink]').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        if (drinkDetails) drinkDetails.style.display = workingDrank ? 'grid' : 'none';
      });
    });
    sheet.querySelector('#until-dec').addEventListener('click', () => {
      workingUntilOffset = Math.max(0, workingUntilOffset - 30);
      if (untilValEl) untilValEl.textContent = offsetToTime(workingUntilOffset);
    });
    sheet.querySelector('#until-inc').addEventListener('click', () => {
      workingUntilOffset = Math.min(DRINK_OFFSET_MAX, workingUntilOffset + 30);
      if (untilValEl) untilValEl.textContent = offsetToTime(workingUntilOffset);
    });
    sheet.querySelector('#count-dec').addEventListener('click', () => {
      workingCount = Math.max(0, workingCount - 1);
      if (countValEl) countValEl.textContent = workingCount;
    });
    sheet.querySelector('#count-inc').addEventListener('click', () => {
      workingCount = Math.min(30, workingCount + 1);
      if (countValEl) countValEl.textContent = workingCount;
    });

    sheet.querySelector('#cancel').addEventListener('click', () => {
      closeSheet();
      if (onClose) setTimeout(onClose, 180);
    });
    sheet.querySelector('#save').addEventListener('click', () => {
      const clean = {};
      for (const [k, v] of Object.entries(working)) if (v > 0) clean[k] = v;
      if (Object.keys(clean).length) state.sessions[dateISO] = clean;
      else delete state.sessions[dateISO];

      const cleanHabits = {};
      for (const [k, v] of Object.entries(workingHabits)) if (v) cleanHabits[k] = true;
      if (Object.keys(cleanHabits).length) state.habits[dateISO] = cleanHabits;
      else delete state.habits[dateISO];

      if (workingSleep > 0) state.sleep[dateISO] = workingSleep;
      else delete state.sleep[dateISO];

      if (workingColor) state.dayColors[dateISO] = workingColor;
      else delete state.dayColors[dateISO];

      if (workingDrank === true) {
        state.drinks[dateISO] = {
          drank: true,
          until: offsetToTime(workingUntilOffset),
          count: workingCount,
        };
      } else if (workingDrank === false) {
        state.drinks[dateISO] = { drank: false };
      } else {
        delete state.drinks[dateISO];
      }

      const noteVal = sheet.querySelector('#day-note').value;
      if (noteVal.trim()) state.dayNotes[dateISO] = noteVal;
      else delete state.dayNotes[dateISO];

      save();
      renderTiles();
      renderChecklist();
      renderTodayNoteBtn();
      closeSheet();
      if (onClose) setTimeout(onClose, 180);
    });
  }

  function openYearView() {
    const today = new Date();
    const thisMonday = startOfWeek(today);
    const weeks = 52;
    const firstMonday = addDays(thisMonday, -(weeks - 1) * 7);

    const tiles = [];
    const monthMarkers = new Array(13).fill('');
    for (let i = 0; i < weeks; i++) {
      const m = addDays(firstMonday, i * 7);
      const iso = toISODate(m);
      const color = state.weekColors[iso];
      const isCurrent = i === weeks - 1;
      let cls = 'week blank';
      if (isCurrent) cls = 'week current';
      else if (color) cls = `week ${color}`;
      tiles.push(`<button class="${cls}" data-iso="${iso}" aria-label="Week of ${monthShort(m)} ${m.getDate()}"></button>`);
      const col = i % 13;
      if (!monthMarkers[col]) monthMarkers[col] = monthShort(m);
    }

    openSheet(`
      <h2>The year</h2>
      <p class="subtle">Every week, colored the way you saw it.</p>
      <div class="year-grid">${tiles.join('')}</div>
      <div class="year-labels">${monthMarkers.map(m => `<span>${m}</span>`).join('')}</div>
      <div class="sheet-actions" style="margin-top:22px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);
    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelectorAll('.year-grid .week').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        const [y, mo, d] = iso.split('-').map(Number);
        closeSheet();
        setTimeout(() => openWeekReview(new Date(y, mo - 1, d)), 200);
      });
    });
  }

  function exportData() {
    const payload = {
      app: 'caprisun',
      version: 1,
      exportedAt: new Date().toISOString(),
      data: state,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `caprisun-backup-${toISODate(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importDataFromFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          const data = (parsed && typeof parsed === 'object' && parsed.data) ? parsed.data : parsed;
          if (!data || typeof data !== 'object') throw new Error('Not a valid Caprisun backup.');
          // Loose validation: at least one expected key
          const expected = ['sessions','weekColors','dayColors','dayNotes','weekNotes','habits','sleep','wordDeck','quoteDeck','startDate'];
          if (!expected.some(k => k in data)) throw new Error('File doesn\'t look like a Caprisun backup.');
          resolve(data);
        } catch (err) { reject(err); }
      };
      reader.onerror = () => reject(new Error('Could not read the file.'));
      reader.readAsText(file);
    });
  }

    openSheet(`

        <p class="subtle" style="margin-top:8px">The first Monday the framework is live. Days before this are hidden.</p>
      </div>

        <input type="file" id="import-file" accept="application/json,.json" style="display:none" />
      </div>

      <div class="sheet-actions">

        <button class="btn btn-danger-ghost" id="reset">Reset everything</button>
      </div>
    `);

    renderSyncSection();

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelector('#save-settings').addEventListener('click', () => {
      const val = sheet.querySelector('#start-input').value;
      if (val) state.startDate = val;

    sheet.querySelector('#reset').addEventListener('click', () => {

    });

    sheet.querySelector('#export-btn').addEventListener('click', exportData);

    const importBtn = sheet.querySelector('#import-btn');
    const fileInput = sheet.querySelector('#import-file');
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];

      try {
        const data = await importDataFromFile(file);
        const proceed = confirm('This will replace all your current data with the backup. Continue?');
        if (!proceed) { fileInput.value = ''; return; }
        state = { ...defaultState(), ...data };
        save();
        renderAll();
        closeSheet();
        setTimeout(() => alert('Backup restored.'), 180);
      } catch (err) {
        alert(err.message || 'Could not import that file.');
        fileInput.value = '';
      }
    });
  }

  function renderPastWordsSection(todayISO) {

      const w = pickWordForDate(d);
      items.push({ iso, date: d, w });

    if (!items.length) return '';
    const fmtDate = new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

      const def = (w.definition || '').replace(/\.$/, '');

        if (label) label.classList.toggle('on', entry.usedInWild);
      };
      wild.addEventListener('click', toggle);
      if (label) label.addEventListener('click', toggle);
    }
    const addBtn = sheet.querySelector('#w-add');
    if (addBtn) {
      addBtn.addEventListener('click', () => {
        const sentence = (sheet.querySelector('#w-sentence').value || '').trim();
        const warn = sheet.querySelector('#w-warn');
        if (sentence.length < 6) { warn.textContent = 'A short sentence is fine — just one real line.'; return; }
        const norm = sentence.toLowerCase();
        const wRoot = w.word.toLowerCase().slice(0, Math.max(4, w.word.length - 3));
        if (!norm.includes(wRoot)) {
          warn.textContent = `Try to use the word "${w.word}" itself (any form is fine).`;
          return;
        }
        state.wordDeck[w.word] = createDeckEntry({ personalSentence: sentence });
        save();
        renderMomentTiles();
        closeSheet();
        setTimeout(() => openWord(), 120);
      });
    }
  }

  function renderPracticeBlock({ target, count, placeholder, label, longForm }) {
    const segs = new Array(5).fill(0).map((_, i) => `<span class="${i < count ? 'on' : ''}"></span>`).join('');
    if (count >= 5) {
      return `
        <div class="sheet-section">
          <p class="practice-label"><span>${label}</span><span class="practice-count">5 / 5</span></p>
          <div class="practice-bar">${segs}</div>
          <div class="practice-complete">
            <span class="check-circle">✓</span>
            <span class="label">Complete. Well done.</span>
            <button class="reset" id="practice-reset">Reset</button>
          </div>
        </div>
      `;
    }
    const inputTag = longForm
      ? `<textarea class="practice-input" id="practice-input" rows="3" placeholder="${placeholder}"></textarea>`
      : `<input class="practice-input" id="practice-input" placeholder="${placeholder}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
    return `
      <div class="sheet-section">
        <p class="practice-label"><span>${label}</span><span class="practice-count">${count} / 5</span></p>
        ${inputTag}
        <div class="practice-bar">${segs}</div>
        <p class="practice-hint">Write it out five times to commit it to memory.</p>
      </div>
    `;
  }

  function wirePractice({ target, getCount, setCount, onChange }) {
    const normalizedTarget = normalizePractice(target);
    const input = sheet.querySelector('#practice-input');
    const countEl = sheet.querySelector('.practice-count');
    const bar = sheet.querySelector('.practice-bar');
    const resetBtn = sheet.querySelector('#practice-reset');

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        setCount(0);
        if (onChange) onChange();
        // Refresh this sheet by reopening the current path — simplest:
        closeSheet();
      });
    }
    if (!input) return;

    const submit = () => {
      const val = normalizePractice(input.value);
      if (!val) return;
      if (val === normalizedTarget) {
        const next = Math.min(5, getCount() + 1);
        setCount(next);
        input.value = '';
        // Update bar + count inline
        if (countEl) countEl.textContent = `${next} / 5`;
        if (bar) {
          [...bar.children].forEach((seg, i) => seg.classList.toggle('on', i < next));
        }
        if (next >= 5) {
          // Swap the input area for the "complete" card
          const section = input.closest('.sheet-section');
          section.innerHTML = `
            <p class="practice-label"><span>Practice writing</span><span class="practice-count">5 / 5</span></p>
            <div class="practice-bar">${new Array(5).fill('<span class="on"></span>').join('')}</div>
            <div class="practice-complete">
              <span class="check-circle">✓</span>
              <span class="label">Complete. Well done.</span>
              <button class="reset" id="practice-reset">Reset</button>
            </div>
          `;
          section.querySelector('#practice-reset').addEventListener('click', () => {
            setCount(0);
            if (onChange) onChange();
            closeSheet();
          });
        }
        if (onChange) onChange();
      } else {
        // Light feedback: brief border flash
        input.style.borderColor = 'var(--terracotta)';
        setTimeout(() => { input.style.borderColor = ''; }, 400);
      }
    };

    input.addEventListener('keydown', (e) => {
      // Enter submits; for textarea we require Ctrl/Cmd+Enter? Let plain Enter work.
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
  }

  function openQuiz() {
    const todayISO = toISODate(new Date());
    const quiz = pickQuizForDate(new Date());
    const prior = state.quizResults[todayISO];

    const optionBtns = quiz.options.map(opt => {
      let cls = 'quiz-option';
      if (prior) {
        if (opt === quiz.answer) cls += ' correct';
        else if (opt === prior.answer) cls += ' wrong';
        else cls += ' muted';
      }
      return `<button class="${cls}" data-opt="${opt.replace(/"/g, '&quot;')}"${prior ? ' disabled' : ''}>${opt}</button>`;
    }).join('');

    let resultHTML = '';
    if (prior) {
      resultHTML = prior.correct
        ? `<div class="quiz-result"><strong>You got it.</strong> ${quiz.answer} is the capital of ${quiz.country}.</div>`
        : `<div class="quiz-result"><strong>Not quite.</strong> The capital of ${quiz.country} is <strong>${quiz.answer}</strong>.</div>`;
    }

    openSheet(`
      <h2>Geography</h2>
      <p class="subtle">One question a day. Same question if you come back later.</p>
      <p class="quiz-question">What is the capital of ${quiz.country}?</p>
      <div class="quiz-options" id="quiz-opts">${optionBtns}</div>
      <div id="quiz-result-slot">${resultHTML}</div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);

    if (!prior) {
      sheet.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const chosen = btn.dataset.opt;
          const correct = chosen === quiz.answer;
          state.quizResults[todayISO] = { answer: chosen, correct };
          save();

          // Re-style options in place
          sheet.querySelectorAll('.quiz-option').forEach(b => {
            b.disabled = true;
            const v = b.dataset.opt;
            if (v === quiz.answer) b.classList.add('correct');
            else if (v === chosen) b.classList.add('wrong');
            else b.classList.add('muted');
          });

          const slot = sheet.querySelector('#quiz-result-slot');
          slot.innerHTML = correct
            ? `<div class="quiz-result"><strong>You got it.</strong> ${quiz.answer} is the capital of ${quiz.country}.</div>`
            : `<div class="quiz-result"><strong>Not quite.</strong> The capital of ${quiz.country} is <strong>${quiz.answer}</strong>.</div>`;

          renderMomentTiles();
        });
      });
    }
  }

  function renderMomentTiles() {
    const q = pickQuoteForDate(new Date());
    const preview = q.text.length > 52 ? q.text.slice(0, 52).trim() + '…' : q.text;
    const qp = document.getElementById('quote-preview');
    if (qp) qp.textContent = '"' + preview + '"';

    const w = pickWordForDate(new Date());
    const wp = document.getElementById('word-preview');
    if (wp) wp.textContent = `${w.word} — ${w.definition.replace(/\.$/, '').slice(0, 54)}${w.definition.length > 55 ? '…' : '.'}`;

    // Review tile — show only when items are due, or when deck is non-empty.
    const reviewBtn = document.getElementById('open-review');
    const reviewPreview = document.getElementById('review-preview');
    if (reviewBtn && reviewPreview) {
      const dueWords = dueDeckEntries(state.wordDeck).length;
      const dueQuotes = dueDeckEntries(state.quoteDeck).length;
      const totalDeck = Object.keys(state.wordDeck).length + Object.keys(state.quoteDeck).length;
      reviewBtn.classList.remove('review-due', 'review-empty');
      if (dueWords + dueQuotes > 0) {
        reviewBtn.style.display = '';
        reviewBtn.classList.add('review-due');
        const parts = [];
        if (dueWords) parts.push(`${dueWords} word${dueWords === 1 ? '' : 's'}`);
        if (dueQuotes) parts.push(`${dueQuotes} quote${dueQuotes === 1 ? '' : 's'}`);
        reviewPreview.textContent = `${parts.join(' · ')} due`;
      } else if (totalDeck > 0) {
        reviewBtn.style.display = '';
        reviewBtn.classList.add('review-empty');
        const next = [earliestUpcoming(state.wordDeck), earliestUpcoming(state.quoteDeck)].filter(Boolean).sort()[0];
        reviewPreview.textContent = next ? `All caught up · next on ${formatShortDate(next)}` : 'All caught up.';
      } else {
        reviewBtn.style.display = 'none';
      }
    }

    const todayISO = toISODate(new Date());
    const prior = state.quizResults[todayISO];
    const quiz = pickQuizForDate(new Date());
    const quizTile = document.getElementById('open-quiz');
    const qzp = document.getElementById('quiz-preview');
    if (!qzp || !quizTile) return;

    // Clear old badge
    const oldBadge = quizTile.querySelector('.mbadge');
    if (oldBadge) oldBadge.remove();

    if (prior) {
      qzp.textContent = `Capital of ${quiz.country}`;
      quizTile.classList.add('answered');
      const badge = document.createElement('span');
      badge.className = 'mbadge' + (prior.correct ? '' : ' wrong');
      badge.textContent = prior.correct ? 'Answered correctly' : 'Answered';
      quizTile.appendChild(badge);
    } else {
      qzp.textContent = `Capital of ${quiz.country}?`;
      quizTile.classList.remove('answered');
    }
  }

  // --- Review (spaced repetition) -----------------------------------------

  function openReview() {
    const dueWordPairs = dueDeckEntries(state.wordDeck);
    const dueQuotePairs = dueDeckEntries(state.quoteDeck);

    // Build unified queue: words first, then quotes.
    const queue = [
      ...dueWordPairs.map(([key, entry]) => ({ kind: 'word', key, entry })),
      ...dueQuotePairs.map(([key, entry]) => ({ kind: 'quote', key, entry })),
    ];

    if (queue.length === 0) {
      const nextWord = earliestUpcoming(state.wordDeck);
      const nextQuote = earliestUpcoming(state.quoteDeck);
      const next = [nextWord, nextQuote].filter(Boolean).sort()[0];
      openSheet(`
        <h2>Review</h2>
        <p class="subtle">Spaced repetition keeps the good stuff from leaking out.</p>
        <div class="review-complete">
          <h3>All reviewed.</h3>
          <p>${next ? `Next review on ${formatShortDate(next)}.` : 'Add a word or quote to your deck to begin.'}</p>
        </div>
        <div class="sheet-actions"><button class="btn btn-ghost" id="cancel">Close</button></div>
      `);
      sheet.querySelector('#cancel').addEventListener('click', closeSheet);
      return;
    }

    let index = 0;
    let revealed = false;

    const render = () => {
      const item = queue[index];
      const segs = queue.map((_, i) => {
        const cls = i < index ? 'on' : (i === index ? 'current' : '');
        return `<span class="seg ${cls}"></span>`;
      }).join('');

      let body;
      if (item.kind === 'word') {
        const w = WORDS.find(x => x.word === item.key);
        if (!w) { advance(); return; }
        body = `
          <p class="review-prompt">${w.word}</p>
          <p class="review-subprompt">What does this mean? Think it through, then reveal.</p>
          ${revealed ? `
            <div class="review-answer">
              <p class="def">${w.definition}</p>
              <p class="meta">Your sentence</p>
              <p class="personal">${(item.entry.personalSentence || '—').replace(/</g, '&lt;')}</p>
            </div>
          ` : `
            <div class="sheet-actions"><button class="btn btn-primary" id="reveal">Show answer</button></div>
          `}
        `;
      } else {
        const q = QUOTES.find(x => x.text === item.key);
        if (!q) { advance(); return; }
        body = `
          <p class="review-prompt" style="font-size:22px">"${q.text}"</p>
          <p class="review-subprompt"><strong>${q.author}</strong> · ${q.year}. Does the idea still land?</p>
          ${revealed ? `
            <div class="review-answer">
              <p class="def">${q.meaning}</p>
              <p class="meta">Your note</p>
              <p class="personal">${(item.entry.personalNote || '—').replace(/</g, '&lt;')}</p>
            </div>
          ` : `
            <div class="sheet-actions"><button class="btn btn-primary" id="reveal">Show meaning</button></div>
          `}
        `;
      }

      openSheet(`
        <h2>Review</h2>
        <p class="review-progress"><span>${item.kind === 'word' ? 'Word' : 'Quote'}</span><span>${index + 1} of ${queue.length}</span></p>
        <div class="review-progress-bar" style="grid-template-columns: repeat(${queue.length}, 1fr);">${segs}</div>
        ${body}
        ${revealed ? `
          <div class="rating-row">
            <button class="rating-btn forgot" data-rating="forgot">Forgot<span class="sub">back to 1 day</span></button>
            <button class="rating-btn nearly" data-rating="nearly">Nearly<span class="sub">same interval</span></button>
            <button class="rating-btn good"   data-rating="good">Got it<span class="sub">advance</span></button>
          </div>
        ` : ''}
        <div class="sheet-actions" style="margin-top:18px">
          <button class="btn btn-ghost" id="cancel">Pause</button>
        </div>
      `);

      sheet.querySelector('#cancel').addEventListener('click', closeSheet);
      const revealBtn = sheet.querySelector('#reveal');
      if (revealBtn) revealBtn.addEventListener('click', () => { revealed = true; render(); });
      sheet.querySelectorAll('.rating-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const rating = btn.dataset.rating;
          const deck = item.kind === 'word' ? state.wordDeck : state.quoteDeck;
          const entry = deck[item.key];
          if (entry) applyRatingToEntry(entry, rating);
          save();
          advance();
        });
      });
    };

    const advance = () => {
      index++;
      revealed = false;
      if (index >= queue.length) {
        openSheet(`
          <h2>Review</h2>
          <div class="review-complete">
            <h3>Done for today.</h3>
            <p>The chain holds for the mind, too.</p>
          </div>
          <div class="sheet-actions"><button class="btn btn-ghost" id="cancel">Close</button></div>
        `);
        sheet.querySelector('#cancel').addEventListener('click', closeSheet);
        renderMomentTiles();
      } else {
        render();
      }
    };

    render();
  }

  function earliestUpcoming(deck) {
    const dates = Object.values(deck).map(e => e.nextReview).filter(Boolean).sort();
    return dates[0];
  }

  // --- Recent days ---------------------------------------------------------

  const RECENT_DAYS = 14;

  function openRecent() {
    const fmtDate = new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const today = startOfDay(new Date());
    const todayISO = toISODate(today);
    const startISO = state.startDate || todayISO;

    const days = [];
    for (let i = 0; i < RECENT_DAYS; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const iso = toISODate(d);
      if (iso < startISO) break;
      days.push({ iso, date: d });
    }

    const blocks = days.map(({ iso, date }) => {
      const q = pickQuoteForDate(date);
      const w = pickWordForDate(date);
      const quotePreview = q.text.length > 64 ? q.text.slice(0, 64).trim() + '…' : q.text;
      const wordDef = (w.definition || '').replace(/\.$/, '');
      const wordText = wordDef.length > 72 ? wordDef.slice(0, 72).trim() + '…' : wordDef;
      const isToday = iso === todayISO;
      return `
        <div class="recent-day">
          <div class="recent-day-head">
            <span>${fmtDate.format(date)}</span>
            ${isToday ? '<span class="rday-today">Today</span>' : ''}
          </div>
          <button class="archive-item" data-iso="${iso}" data-kind="quote">
            <span class="aleft">
              <span class="adate"><span class="akind">Quote</span>${q.author}</span>
              <span class="atext">"${quotePreview.replace(/</g, '&lt;')}"</span>
            </span>
          </button>
          <button class="archive-item" data-iso="${iso}" data-kind="word">
            <span class="aleft">
              <span class="adate"><span class="akind">Word</span>${w.pos}</span>
              <span class="atext">${w.word} — ${wordText.replace(/</g, '&lt;')}</span>
            </span>
          </button>
        </div>
      `;
    }).join('');

    const body = days.length === 0
      ? `<p class="archive-empty">Nothing yet — the chain hasn't started.</p>`
      : blocks;

    openSheet(`
      <h2>Recent days</h2>
      <p class="subtle">The quote and word of the day from the last ${days.length} day${days.length === 1 ? '' : 's'}. Tap one to open it.</p>
      ${body}
      <div class="sheet-actions" style="margin-top:18px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelectorAll('.archive-item').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        const kind = el.dataset.kind;
        closeSheet();
        setTimeout(() => {
          if (kind === 'quote') openQuote({ dateISO: iso });
          else openWord({ dateISO: iso });
        }, 180);
      });
    });
  }

  // --- Archive -------------------------------------------------------------

  function openArchive(tab) {
    const active = tab === 'words' ? 'words' : 'quotes';
    const quoteDays = Object.keys(state.seenQuotes).sort().reverse();
    const wordDays = Object.keys(state.seenWords).sort().reverse();

    const fmtDate = new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

    let listHTML;
    if (active === 'quotes') {
      if (quoteDays.length === 0) {
        listHTML = `<p class="archive-empty">Nothing here yet. Open a quote of the day to start your archive.</p>`;
      } else {
        listHTML = `<div class="archive-list">${quoteDays.map(iso => {
          const q = pickQuoteForDate(parseISO(iso));
          const deck = state.quoteDeck[q.text];
          const badge = deck
            ? `<span class="abadge">${stageLabel(deck.stage)}${deck.usedInWild ? ' · in the wild' : ''}</span>`
            : '';
          const preview = q.text.length > 48 ? q.text.slice(0, 48).trim() + '…' : q.text;
          return `
            <button class="archive-item" data-iso="${iso}">
              <span class="aleft">
                <span class="adate">${fmtDate.format(parseISO(iso))} · ${q.author}</span>
                <span class="atext">"${preview}"</span>
              </span>
              ${badge}
            </button>
          `;
        }).join('')}</div>`;
      }
    } else {
      if (wordDays.length === 0) {
        listHTML = `<p class="archive-empty">Nothing here yet. Open a word of the day to start your archive.</p>`;
      } else {
        listHTML = `<div class="archive-list">${wordDays.map(iso => {
          const w = pickWordForDate(parseISO(iso));
          const deck = state.wordDeck[w.word];
          const badge = deck
            ? `<span class="abadge">${stageLabel(deck.stage)}${deck.usedInWild ? ' · in the wild' : ''}</span>`
            : '';
          return `
            <button class="archive-item" data-iso="${iso}">
              <span class="aleft">
                <span class="adate">${fmtDate.format(parseISO(iso))} · ${w.pos}</span>
                <span class="atext">${w.word} — ${w.definition.replace(/\.$/, '')}</span>
              </span>
              ${badge}
            </button>
          `;
        }).join('')}</div>`;
      }
    }

    openSheet(`
      <h2>Archive</h2>
      <p class="subtle">Every quote and word you've opened.</p>
      <div class="archive-tabs">
        <button class="archive-tab ${active === 'quotes' ? 'active' : ''}" data-tab="quotes">Quotes <small>(${quoteDays.length})</small></button>
        <button class="archive-tab ${active === 'words' ? 'active' : ''}" data-tab="words">Words <small>(${wordDays.length})</small></button>
      </div>
      ${listHTML}
      <div class="sheet-actions" style="margin-top:22px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelectorAll('.archive-tab').forEach(el => {
      el.addEventListener('click', () => {
        closeSheet();
        setTimeout(() => openArchive(el.dataset.tab), 180);
      });
    });
    sheet.querySelectorAll('.archive-item').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        closeSheet();
        setTimeout(() => {
          if (active === 'quotes') openQuote({ dateISO: iso });
          else openWord({ dateISO: iso });
        }, 180);
      });
    });
  }

  // --- Today note button ---------------------------------------------------

  function renderTodayNoteBtn() {
    const btn = document.getElementById('today-note-btn');
    if (!btn) return;
    const iso = toISODate(new Date());
    const note = state.dayNotes[iso] || '';
    if (note.trim()) {
      btn.classList.add('has-note');
      const preview = note.length > 60 ? note.slice(0, 60).trim() + '…' : note;
      btn.textContent = preview;
    } else {
      btn.classList.remove('has-note');
      btn.textContent = 'Leave a note for today…';
    }
  }

  // --- Thoughts ------------------------------------------------------------

  function sortedThoughts() {
    return (state.thoughts || []).slice()
      .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }

  function formatThoughtDate(iso) {
    const d = new Date(iso);
    return new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })
      .format(d).toUpperCase();
  }

  function renderThoughts() {
    const body = document.getElementById('thoughts-body');
    if (!body) return;
    const list = sortedThoughts();
    const shown = list.slice(0, 3);

    if (list.length === 0) {
      body.innerHTML = `<button class="thought-new-btn" id="thought-new">A thought to keep…</button>`;
    } else {
      const items = shown.map(t => `
        <button class="thought-item" data-id="${t.id}">
          <span class="tdate">${formatThoughtDate(t.createdAt)}</span>
          <span class="ttext">${(t.text || '').replace(/</g, '&lt;')}</span>
        </button>
      `).join('');
      const seeAll = list.length > 3
        ? `<button class="thoughts-see-all" id="thoughts-see-all">See all ${list.length}</button>`
        : '';
      body.innerHTML = `
        <div class="thoughts-list">${items}</div>
        <button class="thought-new-btn" id="thought-new">+ New thought</button>
        ${seeAll}
      `;
    }

    const newBtn = body.querySelector('#thought-new');
    if (newBtn) newBtn.addEventListener('click', () => openThought(null));
    body.querySelectorAll('.thought-item').forEach(el => {
      el.addEventListener('click', () => openThought(el.dataset.id));
    });
    const seeBtn = body.querySelector('#thoughts-see-all');
    if (seeBtn) seeBtn.addEventListener('click', openThoughtsList);
  }

  function openThought(id) {
    const existing = id ? (state.thoughts || []).find(t => t.id === id) : null;
    const text = existing?.text || '';
    const dateStr = existing
      ? new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date(existing.createdAt))
      : 'Today';

    openSheet(`
      <h2>${existing ? 'Thought' : 'New thought'}</h2>
      <p class="subtle">${dateStr}</p>
      <textarea class="note-area" id="thought-text" style="min-height:200px" placeholder="What's on your mind? Not tied to today, not tied to the week — just a thought to keep.">${text.replace(/</g, '&lt;')}</textarea>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">Save</button>
      </div>
      ${existing ? `<div class="sheet-actions"><button class="btn btn-danger-ghost" id="delete">Delete</button></div>` : ''}
    `);

    const ta = sheet.querySelector('#thought-text');
    setTimeout(() => ta?.focus(), 80);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelector('#save').addEventListener('click', () => {
      const val = (ta.value || '').trim();
      if (!val) { closeSheet(); return; }
      if (!state.thoughts) state.thoughts = [];
      if (existing) {
        existing.text = val;
        existing.updatedAt = new Date().toISOString();
      } else {
        const newId = (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
        state.thoughts.push({
          id: newId,
          createdAt: new Date().toISOString(),
          text: val,
        });
      }
      save();
      renderThoughts();
      closeSheet();
    });
    const del = sheet.querySelector('#delete');
    if (del) del.addEventListener('click', () => {
      if (!confirm('Delete this thought?')) return;
      state.thoughts = (state.thoughts || []).filter(t => t.id !== id);
      save();
      renderThoughts();
      closeSheet();
    });
  }

  function openThoughtsList() {
    const list = sortedThoughts();
    const items = list.map(t => `
      <button class="thought-item" data-id="${t.id}">

    sheet.querySelectorAll('.thought-item').forEach(el => {
