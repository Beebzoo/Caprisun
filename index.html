<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Caprisun</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F5F1E8;
    --surface: #FBF8F0;
    --surface-2: #EFE9DB;
    --border: #E2DBC9;
    --border-strong: #CFC5AC;
    --ink: #2B2B2B;
    --ink-soft: #6B6358;
    --ink-faint: #A69E90;

    --green-deep: #2D4A3E;
    --green-soft: #6B8F71;
    --ochre: #C9A35B;
    --terracotta: #B86C5A;

    --radius: 10px;
    --radius-lg: 14px;

    --shadow-sheet: 0 -8px 40px rgba(43, 43, 43, 0.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 44px 24px 80px;
  }

  .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* Header */
  header { margin-bottom: 40px; }

  .greeting {
    font-size: 30px;
    line-height: 1.1;
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .greet-icons {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .icon-maple {
    width: 22px;
    height: 22px;
    color: var(--terracotta);
    transform: translateY(-2px);
  }

  .icon-mountain {
    width: 24px;
    height: 24px;
    color: var(--green-soft);
    transform: translateY(-1px);
  }

  .date {
    color: var(--ink-soft);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  section { margin-bottom: 40px; }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 14px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .section-label button {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .section-label button:hover { color: var(--ink); }

  /* The chain */
  .chain {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
  }

  .week {
    aspect-ratio: 1 / 1.15;
    border-radius: 6px;
    background: var(--border);
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .week:hover { transform: translateY(-1px); }

  .week.deep   { background: var(--green-deep); }
  .week.soft   { background: var(--green-soft); }
  .week.ochre  { background: var(--ochre); }
  .week.terra  { background: var(--terracotta); }
  .week.blank  { background: var(--surface-2); }

  .week.current {
    background: transparent;
    border: 1px dashed var(--green-deep);
  }

  .week.current.ready {
    background: repeating-linear-gradient(
      45deg,
      transparent 0 6px,
      rgba(45, 74, 62, 0.08) 6px 12px
    );
  }

  .chain-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }

  .seal-banner {
    margin-top: 14px;
    background: var(--green-deep);
    color: var(--bg);
    padding: 14px 16px;
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .seal-banner p {
    margin: 0;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }

  .seal-banner button {
    background: rgba(245, 241, 232, 0.14);
    color: var(--bg);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Today tiles */
  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    text-align: left;
    position: relative;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .tile:hover { border-color: var(--border-strong); }
  .tile:active { transform: scale(0.98); }

  .tile .name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }

  .tile .avg {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 2px 0 0;
  }

  .tile .plan-dot {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
  }

  .tile.logged {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }

  .tile.logged .avg { color: rgba(245, 241, 232, 0.7); }
  .tile.logged .plan-dot { background: rgba(245, 241, 232, 0.5); }

  .tile .logged-row {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    gap: 8px;
  }

  .tile.logged .logged-row { display: flex; }

  .tile .duration-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(245, 241, 232, 0.14);
    letter-spacing: 0.02em;
  }

  .tile .edit-link {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.7;
  }

  .tile .edit-link:hover { opacity: 1; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 56px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .footer-actions {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 18px;
    font-style: normal;
  }

  .footer-actions button {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
  }

  .footer-actions button:hover { color: var(--ink-soft); }

  /* Overlay + sheet */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(43, 43, 43, 0.28);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }

  .overlay.open { display: flex; }

  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    border-radius: 18px 18px 0 0;
    padding: 24px 24px 32px;
    box-shadow: var(--shadow-sheet);
    animation: slideUp 0.22s cubic-bezier(0.19, 1, 0.22, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0.6; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 999px;
    margin: 0 auto 18px;
  }

  .sheet h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
  }

  .sheet .subtle {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 20px;
  }

  .sheet-section {
    margin-bottom: 22px;
  }

  .sheet-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 10px;
  }

  /* Duration stepper */
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
  }

  .stepper button {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    font-size: 20px;
    color: var(--ink-soft);
  }

  .stepper button:hover { background: var(--surface-2); }

  .stepper .value {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
  }

  .stepper .value small {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-left: 4px;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  /* Color picker for week review */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .color-option {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    transition: border-color 0.15s ease;
  }

  .color-option:hover { border-color: var(--border-strong); }

  .color-option.selected {
    border-color: var(--ink);
    background: var(--surface-2);
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .color-swatch.deep  { background: var(--green-deep); }
  .color-swatch.soft  { background: var(--green-soft); }
  .color-swatch.ochre { background: var(--ochre); }
  .color-swatch.terra { background: var(--terracotta); }

  .color-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    margin: 0;
  }

  .color-desc {
    font-size: 11px;
    color: var(--ink-soft);
    margin: 0;
  }

  /* Action row */
  .sheet-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--green-deep);
    color: var(--bg);
  }

  .btn-primary:hover { background: #1F362D; }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border-strong); color: var(--ink); }

  .btn-danger-ghost {
    background: transparent;
    color: var(--terracotta);
    flex: 0;
    padding: 14px 0;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Session list in week review */
  .session-list {
    display: grid;
    gap: 6px;
  }

  .session-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid var(--border);
  }

  .session-row .day { color: var(--ink-soft); }

  .session-row .summary {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
  }

  .session-empty {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    padding: 10px 2px;
  }

  /* Year view */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 4px;
    margin-top: 6px;
  }

  .year-grid .week {
    aspect-ratio: 1;
    border-radius: 3px;
  }

  .year-labels {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 4px;
    margin-top: 8px;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Pre-start banner */
  .start-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 20px;
    text-align: center;
    margin-top: 6px;
  }
  .start-banner .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 8px;
  }
  .start-banner h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 6px;
  }
  .start-banner p {
    color: var(--ink-soft);
    font-size: 13px;
    margin: 0;
  }
  .start-banner .countdown {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--green-deep);
    color: var(--bg);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  /* Pre-start chain tile */
  .week.pre-start {
    background: transparent;
    border: 1px solid var(--border);
    opacity: 0.55;
    cursor: default;
  }
  .week.pre-start:hover { transform: none; }

  /* Tappable session row */
  .session-row.tappable { cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; }
  .session-row.tappable:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .session-row .chev { color: var(--ink-faint); margin-left: 8px; }
  .session-row .has-note {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Note textarea */
  .note-area {
    width: 100%;
    min-height: 84px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    resize: vertical;
    font-family: 'Fraunces', Georgia, serif;
    line-height: 1.4;
  }
  .note-area:focus { outline: none; border-color: var(--border-strong); }

  .today-note-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    color: var(--ink-soft);
    font-size: 13px;
    text-align: left;
    background: transparent;
    font-family: 'Fraunces', Georgia, serif;
  }
  .today-note-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .today-note-btn.has-note {
    border-style: solid;
    background: var(--surface);
    color: var(--ink);
  }

  /* Day sheet activity list */
  .day-activities {
    display: grid;
    gap: 8px;
  }
  .day-activity-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .day-activity-row .aname {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .day-activity-row .asub {
    font-size: 11px;
    color: var(--ink-faint);
    display: block;
    margin-top: 2px;
  }
  .mini-stepper {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mini-stepper button {
    width: 30px; height: 30px;
    border-radius: 6px;
    color: var(--ink-soft);
    font-size: 16px;
    background: var(--surface-2);
  }
  .mini-stepper .mval {
    min-width: 54px;
    text-align: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .mini-stepper .mval small {
    font-family: 'Inter', sans-serif;
    color: var(--ink-faint);
    font-size: 10px;
    margin-left: 3px;
  }

  /* Guide sheet */
  .guide-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .guide-item:last-child { border-bottom: 0; }
  .guide-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
  }
  .guide-tier {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 2px;
  }
  .guide-sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 6px;
  }
  .guide-body {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.5;
  }

  /* Habit chips */
  .habit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .habit-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink);
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .habit-chip:hover { border-color: var(--border-strong); }
  .habit-chip .tick {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid var(--border-strong);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    flex-shrink: 0;
  }
  .habit-chip.on {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: var(--bg);
  }
  .habit-chip.on .tick {
    background: var(--bg);
    border-color: var(--bg);
    color: var(--green-deep);
  }
  .habit-chip.on .tick::after { content: '✓'; }

  /* Sleep row */
  .sleep-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .sleep-row .slabel {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
  }
  .sleep-row .ssub {
    display: block;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-family: 'Inter', sans-serif;
  }

  /* Week summary */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .summary-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .summary-tile .slabel {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 4px;
  }
  .summary-tile .svalue {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .summary-tile .svalue small {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: 4px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .summary-tile.wide { grid-column: 1 / -1; }
  .summary-tile.wide .svalue { font-size: 15px; }

  /* Moment tiles */
  .moment-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .moment-tile {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .moment-tile:hover { border-color: var(--border-strong); }
  .moment-tile .meyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
  }
  .moment-tile .mtitle {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.35;
  }
  .moment-tile.answered {
    background: var(--surface-2);
  }
  .moment-tile .mbadge {
    margin-top: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green-soft);
  }
  .moment-tile .mbadge.wrong { color: var(--terracotta); }

  /* Quote sheet */
  .quote-body {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    line-height: 1.35;
    margin: 6px 0 14px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .quote-attrib {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 22px;
    letter-spacing: 0.02em;
  }

  }
  .archive-empty {
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
    padding: 20px 2px;
    text-align: center;
  }

  /* Desktop polish — slightly roomier */
  @media (min-width: 720px) {
    .app { padding-top: 64px; }
  }

  // --- State ---------------------------------------------------------------

  const defaultState = () => ({
    sessions: {},   // key: YYYY-MM-DD, value: { gym: minutes, yoga: ... }
    weekColors: {}, // key: YYYY-MM-DD (Monday of the ISO week), value: color key
    dayNotes: {},   // key: YYYY-MM-DD, value: note text
    weekNotes: {},  // key: YYYY-MM-DD (Monday), value: note text
    habits: {},     // key: YYYY-MM-DD, value: { teeth: bool, breakfast: bool, vitamins: bool, shower: bool }
    sleep: {},      // key: YYYY-MM-DD, value: number (hours)
    quizResults: {},// key: YYYY-MM-DD, value: { answer: string, correct: bool }
    seenQuotes: {}, // key: YYYY-MM-DD, value: true (opened the quote sheet)
    seenWords: {},  // key: YYYY-MM-DD, value: true
    quotePractice: {}, // key: YYYY-MM-DD, value: number (repetitions, capped at 5)
    wordPractice: {},  // key: YYYY-MM-DD, value: number
    startDate: '2026-04-27', // first Monday the framework is live
  });

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return { ...defaultState(), ...JSON.parse(raw) };
    } catch { return defaultState(); }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }

  // --- Date helpers --------------------------------------------------------

  const pad = (n) => String(n).padStart(2, '0');
  const toISODate = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

  function startOfWeek(d) {
    const out = new Date(d);
    out.setHours(0, 0, 0, 0);
    const day = out.getDay(); // 0 = Sun
    const diff = (day + 6) % 7; // Monday-start
    out.setDate(out.getDate() - diff);
    return out;
  }

  function addDays(d, n) {
    const out = new Date(d);
    out.setDate(out.getDate() + n);
    return out;
  }

  function monthShort(d) {
    return d.toLocaleString('en-GB', { month: 'short' });
  }

  function parseISO(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function daysBetween(a, b) {
    const ms = startOfDay(b) - startOfDay(a);
    return Math.round(ms / 86400000);
  }

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function getStartMonday() {
    return startOfWeek(parseISO(state.startDate));
  }

  function isPreStart() {
    return startOfDay(new Date()) < startOfDay(parseISO(state.startDate));
  }

  function daySeed(date) {
    // YYYYMMDD as a single integer — stable, sortable, distinct per day.
    return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
  }

  function pickQuoteForDate(date) {
    const seed = daySeed(date);
    return QUOTES[seed % QUOTES.length];
  }

  function pickWordForDate(date) {
    // Offset so word and quote don't always rotate in lockstep.
    const seed = daySeed(date) + 13;
    return WORDS[seed % WORDS.length];
  }

  function pickQuizForDate(date) {
    const seed = daySeed(date);
    const idx = seed % CAPITALS.length;
    const correct = CAPITALS[idx];
    const distractors = [];
    let step = 1;
    while (distractors.length < 3 && step < CAPITALS.length) {
      const i = (idx + step * 7) % CAPITALS.length;
      const cand = CAPITALS[i];
      if (cand.country !== correct.country && !distractors.find(d => d.capital === cand.capital)) {
        distractors.push(cand);
      }
      step++;
    }
    const options = new Array(4);
    const correctPos = seed % 4;
    options[correctPos] = correct.capital;
    let di = 0;
    for (let i = 0; i < 4; i++) {
      if (i !== correctPos) options[i] = distractors[di++].capital;
    }
    return { country: correct.country, answer: correct.capital, options };
  }

  // --- Computed ------------------------------------------------------------

  function avgFor(activity) {
    const mins = [];
    for (const day of Object.values(state.sessions)) {
      const v = day?.[activity.key];
      if (typeof v === 'number' && v > 0) mins.push(v);
    }
    if (mins.length === 0) return activity.defaultAvg;
    return Math.round(mins.reduce((a, b) => a + b, 0) / mins.length);
  }

  function sessionsForDate(dateISO) {
    return state.sessions[dateISO] || {};
  }

  function sessionsForWeek(monday) {
    const out = [];
    for (let i = 0; i < 7; i++) {
      const d = addDays(monday, i);
      const iso = toISODate(d);
      out.push({ date: d, iso, sessions: sessionsForDate(iso) });
    }
    return out;
  }

  function weekSummary(weekDays) {
    let gymCount = 0, yogaCount = 0, medCount = 0, readCount = 0, anyMovement = 0;
    for (const { sessions } of weekDays) {
      if (sessions.gym > 0) { gymCount++; anyMovement++; }
      if (sessions.yoga > 0) { yogaCount++; anyMovement++; }
      if (sessions.meditation > 0) medCount++;
      if (sessions.reading > 0) readCount++;
    }
    return { gymCount, yogaCount, medCount, readCount, anyMovement };
  }

  function weekHabits(weekDays) {
    const counts = {};
    for (const h of HABITS) counts[h.key] = 0;
    for (const { iso } of weekDays) {
      const h = state.habits[iso] || {};
      for (const k of Object.keys(counts)) if (h[k]) counts[k]++;
    }
    return counts;
  }

  function weekSleep(weekDays) {
    const hrs = [];
    for (const { iso } of weekDays) {
      const s = state.sleep[iso];
      if (typeof s === 'number' && s > 0) hrs.push(s);
    }
    if (hrs.length === 0) return null;
    const total = hrs.reduce((a, b) => a + b, 0);
    return { avg: total / hrs.length, total, days: hrs.length };
  }

  function weekActivityTotals(weekDays) {
    const totals = {};
    for (const a of ACTIVITIES) totals[a.key] = 0;
    for (const { sessions } of weekDays) {
      for (const a of ACTIVITIES) if (sessions[a.key]) totals[a.key] += sessions[a.key];
    }
    return totals;
  }

  function suggestColor(weekDays) {
    const s = weekSummary(weekDays);
    if (s.gymCount >= 3 && s.yogaCount >= 1) return 'deep';
    if (s.gymCount >= 2) return 'soft';
    if (s.anyMovement >= 1) return 'ochre';
    return 'terra';
  }

  // --- Rendering: header ---------------------------------------------------

  function hourOfDay() { return new Date().getHours(); }

  function renderHeader() {
    const h = hourOfDay();
    const greet =
      h < 5 ? 'Still up.' :
      h < 12 ? 'Good morning.' :
      h < 17 ? 'Good afternoon.' :
      h < 21 ? 'Good evening.' : 'Good night.';
    document.getElementById('greeting').textContent = greet;
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('date').textContent = fmt.format(new Date());

  // --- Rendering: chain ----------------------------------------------------

  const WEEKS_SHOWN = 8;

  function renderChain() {
    const chain = document.getElementById('chain');
    chain.innerHTML = '';
    const thisMonday = startOfWeek(new Date());
    const startMonday = getStartMonday();
    const pre = isPreStart();
    const rightMostMonday = pre ? startMonday : thisMonday;

    for (let i = WEEKS_SHOWN - 1; i >= 0; i--) {
      const monday = addDays(rightMostMonday, -i * 7);
      const iso = toISODate(monday);
      const color = state.weekColors[iso];
      const isRightmost = i === 0;
      const beforeStart = monday < startMonday;

      const btn = document.createElement('button');
      btn.className = 'week';

      if (beforeStart) {
        btn.classList.add('pre-start');
        btn.disabled = true;
      } else if (isRightmost) {
        btn.classList.add('current');
        if (!pre && new Date().getDay() === 0) btn.classList.add('ready');
        btn.addEventListener('click', () => openWeekReview(monday));
      } else if (color) {
        btn.classList.add(color);
        btn.addEventListener('click', () => openWeekReview(monday));
      } else {
        btn.classList.add('blank');
        btn.addEventListener('click', () => openWeekReview(monday));
      }

      btn.setAttribute('aria-label', `Week of ${monthShort(monday)} ${monday.getDate()}`);
      chain.appendChild(btn);
    }

    // Left-edge label
    const oldestMonday = addDays(rightMostMonday, -(WEEKS_SHOWN - 1) * 7);
    const leftLabel = oldestMonday < startMonday
      ? `before ${monthShort(startMonday)} ${startMonday.getDate()}`
      : `${monthShort(oldestMonday)} ${oldestMonday.getDate()}`;
    document.getElementById('chain-start-label').textContent = leftLabel;
    const legendRight = chain.parentElement.querySelector('.chain-legend span:last-child');
    if (legendRight) legendRight.textContent = pre ? 'first week' : 'this week';

    // Sunday seal banner (not pre-start)
    const slot = document.getElementById('seal-slot');
    slot.innerHTML = '';
    if (!pre && new Date().getDay() === 0 && !state.weekColors[toISODate(thisMonday)]) {
      const banner = document.createElement('div');
      banner.className = 'seal-banner';
      banner.innerHTML = `
        <p>Sunday. Time to seal the week.</p>
        <button>Review</button>
      `;
      banner.querySelector('button').addEventListener('click', () => openWeekReview(thisMonday));
      slot.appendChild(banner);
    }
  }

  function renderPreStart() {
    const pre = isPreStart();
    document.getElementById('today-section').style.display = pre ? 'none' : '';
    document.getElementById('prestart-section').style.display = pre ? '' : 'none';
    if (!pre) return;
    const start = parseISO(state.startDate);
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('start-title').textContent = fmt.format(start);
    const days = daysBetween(new Date(), start);
    document.getElementById('start-countdown').textContent = days <= 0 ? 'Starts today' : `In ${days} day${days === 1 ? '' : 's'}`;
  }

  // --- Rendering: today tiles ----------------------------------------------

  function renderTiles() {
    if (isPreStart()) return;
    const today = new Date();
    const todayISO = toISODate(today);
    const plan = PLAN_BY_DAY[today.getDay()] || [];
    const plannedNames = plan.map(k => ACTIVITIES.find(a => a.key === k)?.name).filter(Boolean);
    document.getElementById('plan-label').textContent = plannedNames.length ? `Plan: ${plannedNames.join(' · ')}` : '';

    const container = document.getElementById('tiles');
    container.innerHTML = '';

    for (const act of ACTIVITIES) {
      const mins = state.sessions[todayISO]?.[act.key] || 0;
      const logged = mins > 0;
      const planned = plan.includes(act.key);

      const tile = document.createElement('button');
      tile.className = 'tile' + (logged ? ' logged' : '');
      tile.innerHTML = `
        ${planned ? '<span class="plan-dot" aria-label="planned for today"></span>' : ''}
        <div>
          <p class="name">${act.name}</p>
          <p class="avg">Avg ${avgFor(act)} min</p>
        </div>
        <div class="logged-row">
          <span class="duration-pill">${mins} min</span>
          <span class="edit-link">Edit</span>
        </div>
      `;
      tile.addEventListener('click', () => openLog(act, todayISO));
      container.appendChild(tile);
    }
  }

  // --- Overlay/sheet -------------------------------------------------------

  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');

  function closeSheet() {
    overlay.classList.remove('open');
    sheet.innerHTML = '';
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSheet();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSheet();

  function openSheet(html) {
    sheet.innerHTML = `<div class="sheet-handle"></div>` + html;
    overlay.classList.add('open');
  }

  // --- Log sheet -----------------------------------------------------------

  function openLog(activity, dateISO) {
    const current = state.sessions[dateISO]?.[activity.key] || 0;
    const avg = avgFor(activity);
    let value = current > 0 ? current : avg;

    openSheet(`
      <h2>${activity.name}</h2>
      <p class="subtle">${current > 0 ? `Logged ${current} min today. Adjust or remove.` : `Tap save to log your usual ${avg} min — or adjust first.`}</p>
      <div class="sheet-section">
        <p class="sheet-section-label">Duration</p>
        <div class="stepper">
          <button id="dec" aria-label="Decrease">−</button>
          <span class="value"><span id="val">${value}</span><small>min</small></span>
          <button id="inc" aria-label="Increase">+</button>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">${current > 0 ? 'Update' : 'Log it'}</button>
      </div>
      ${current > 0 ? `<div class="sheet-actions"><button class="btn btn-danger-ghost" id="remove">Remove</button></div>` : ''}
    `);

    const valEl = sheet.querySelector('#val');
    const step = (delta) => { value = Math.max(0, value + delta); valEl.textContent = value; };
    sheet.querySelector('#dec').addEventListener('click', () => step(-5));
    sheet.querySelector('#inc').addEventListener('click', () => step(5));
    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelector('#save').addEventListener('click', () => {
      if (!state.sessions[dateISO]) state.sessions[dateISO] = {};
      if (value <= 0) delete state.sessions[dateISO][activity.key];
      else state.sessions[dateISO][activity.key] = value;
      save();
      renderTiles();
      closeSheet();
    });
    const remove = sheet.querySelector('#remove');
    if (remove) remove.addEventListener('click', () => {
      if (state.sessions[dateISO]) {
        delete state.sessions[dateISO][activity.key];
        save();
      }
      renderTiles();
      closeSheet();
    });
  }

  function renderWeekSummary(weekDays) {
    const habitCounts = weekHabits(weekDays);
    const sleep = weekSleep(weekDays);
    const totals = weekActivityTotals(weekDays);
    const fmtH = (n) => Number.isInteger(n) ? String(n) : n.toFixed(1);

    const activityTiles = ACTIVITIES.map(a => {
      const mins = totals[a.key] || 0;
      if (mins === 0) return '';
      return `
        <div class="summary-tile">
          <p class="slabel">${a.name}</p>
          <p class="svalue">${mins}<small>min total</small></p>
        </div>
      `;
    }).join('');

    const habitTiles = HABITS.map(h => {
      const c = habitCounts[h.key] || 0;
      return `
        <div class="summary-tile">
          <p class="slabel">${h.name}</p>
          <p class="svalue">${c}<small>/ 7 days</small></p>
        </div>
      `;
    }).join('');

    const sleepTile = sleep ? `
      <div class="summary-tile wide">
        <p class="slabel">Sleep</p>
        <p class="svalue">${fmtH(sleep.avg)} h avg <small>over ${sleep.days} day${sleep.days === 1 ? '' : 's'}</small></p>
      </div>
    ` : `
      <div class="summary-tile wide">
        <p class="slabel">Sleep</p>
        <p class="svalue" style="color:var(--ink-faint)">—<small>no sleep logged</small></p>
      </div>
    `;

    const anyActivity = ACTIVITIES.some(a => (totals[a.key] || 0) > 0);

    return `
      <div class="summary-grid">
        ${anyActivity ? activityTiles : '<div class="summary-tile wide"><p class="slabel">Sessions</p><p class="svalue" style="color:var(--ink-faint)">—<small>none logged</small></p></div>'}
        ${habitTiles}
        ${sleepTile}
      </div>
    `;
  }

  // --- Week review sheet ---------------------------------------------------

  function openWeekReview(monday) {
    const iso = toISODate(monday);
    const weekDays = sessionsForWeek(monday);
    const isCurrent = iso === toISODate(startOfWeek(new Date()));
    const existing = state.weekColors[iso];
    const suggested = suggestColor(weekDays);
    const endOfRange = addDays(monday, 6);
    const rangeLabel = `${monthShort(monday)} ${monday.getDate()} – ${monthShort(endOfRange)} ${endOfRange.getDate()}`;

    const summary = weekSummary(weekDays);
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    const rows = weekDays.map(({ date, iso: dIso, sessions }, i) => {
      const parts = [];
      if (sessions.gym) parts.push(`Gym ${sessions.gym}m`);
      if (sessions.yoga) parts.push(`Yoga ${sessions.yoga}m`);
      if (sessions.meditation) parts.push(`Meditation ${sessions.meditation}m`);
      if (sessions.reading) parts.push(`Reading ${sessions.reading}m`);
      const hasNote = !!(state.dayNotes[dIso] && state.dayNotes[dIso].trim());
      return `
        <button class="session-row tappable" data-date="${dIso}">
          <span class="day">${dayNames[i]} · ${date.getDate()} ${monthShort(date)}${hasNote ? '<span class="has-note" title="Note"></span>' : ''}</span>
          <span class="summary">${parts.length ? parts.join(' · ') : '—'}<span class="chev">›</span></span>
        </button>
      `;
    }).join('');

    const weekNote = state.weekNotes[iso] || '';

    const colorOptions = Object.entries(COLOR_META).map(([key, meta]) => {
      const selected = (existing || suggested) === key ? 'selected' : '';
      return `
        <button class="color-option ${selected}" data-color="${key}">
          <span class="color-swatch ${key}"></span>
          <span>
            <p class="color-label">${meta.label}</p>
            <p class="color-desc">${meta.desc}</p>
          </span>
        </button>
      `;
    }).join('');

    const title = isCurrent ? 'This week' : 'Week review';
    const subtitleExtra = isCurrent && new Date().getDay() !== 0
      ? ' · You can seal this on Sunday.'
      : '';

    openSheet(`
      <h2>${title}</h2>
      <p class="subtle">${rangeLabel}${subtitleExtra}</p>

      <div class="sheet-section">
        <p class="sheet-section-label">Summary</p>
        ${renderWeekSummary(weekDays)}
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Sessions</p>
        <div class="session-list">
          ${rows || '<p class="session-empty">No sessions logged this week.</p>'}
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Color this week</p>
        <div class="color-grid">${colorOptions}</div>
        ${!existing ? `<p class="subtle" style="margin-top:10px">Suggested: <strong>${COLOR_META[suggested].label}</strong> based on ${summary.gymCount} gym · ${summary.yogaCount} yoga · ${summary.medCount} meditation · ${summary.readCount} reading.</p>` : ''}
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Note on the week</p>
        <textarea class="note-area" id="week-note" placeholder="How did this week feel? What got in the way? What worked?">${weekNote.replace(/</g, '&lt;')}</textarea>
      </div>

      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Close</button>
        <button class="btn btn-primary" id="save">${existing ? 'Update' : 'Seal week'}</button>
      </div>
      ${existing ? `<div class="sheet-actions"><button class="btn btn-danger-ghost" id="clear">Clear color</button></div>` : ''}
    `);

    let chosen = existing || suggested;
    sheet.querySelectorAll('.color-option').forEach(el => {
      el.addEventListener('click', () => {
        sheet.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        chosen = el.dataset.color;
      });
    });
    sheet.querySelectorAll('.session-row.tappable').forEach(el => {
      el.addEventListener('click', () => {
        const d = el.dataset.date;
        closeSheet();
        setTimeout(() => openDay(d, () => openWeekReview(monday)), 180);
      });
    });
    sheet.querySelector('#cancel').addEventListener('click', () => {
      const note = sheet.querySelector('#week-note')?.value ?? '';
      if (note.trim()) state.weekNotes[iso] = note;
      else delete state.weekNotes[iso];
      save();
      closeSheet();
    });
    sheet.querySelector('#save').addEventListener('click', () => {
      state.weekColors[iso] = chosen;
      const note = sheet.querySelector('#week-note')?.value ?? '';
      if (note.trim()) state.weekNotes[iso] = note;
      else delete state.weekNotes[iso];
      save();
      renderChain();
      closeSheet();
    });
    const clear = sheet.querySelector('#clear');
    if (clear) clear.addEventListener('click', () => {
      delete state.weekColors[iso];
      save();
      renderChain();
      closeSheet();
    });
  }

  // --- Day sheet -----------------------------------------------------------

  function openDay(dateISO, onClose) {

    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    const sleepHrs = state.sleep[dateISO] ?? 0;
    const note = state.dayNotes[dateISO] || '';

    const activityRows = ACTIVITIES.map(act => {
      const mins = sessions[act.key] || 0;
      return `
        <div class="day-activity-row" data-key="${act.key}">
          <span>
            <span class="aname">${act.name}</span>
            <span class="asub">Avg ${avgFor(act)} min</span>
          </span>
          <span class="mini-stepper">
            <button data-delta="-5" aria-label="Decrease">−</button>
            <span class="mval"><span class="mv">${mins}</span><small>min</small></span>
            <button data-delta="5" aria-label="Increase">+</button>
          </span>
        </div>
      `;
    }).join('');

    const habitChips = HABITS.map(h => `
      <button class="habit-chip ${habits[h.key] ? 'on' : ''}" data-habit="${h.key}">
        <span class="tick"></span>
        <span>${h.name}</span>
      </button>
    `).join('');

    openSheet(`
      <h2>${title}</h2>
      <p class="subtle">${fmt.format(date)}</p>

      <div class="sheet-section">
        <p class="sheet-section-label">Sessions</p>
        <div class="day-activities">${activityRows}</div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Habits</p>
        <div class="habit-grid">${habitChips}</div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Sleep</p>
        <div class="sleep-row">
          <span>
            <span class="slabel">Last night</span>
            <span class="ssub">Tap − / + by half-hours</span>
          </span>
          <span class="mini-stepper">
            <button id="sleep-dec" aria-label="Less sleep">−</button>
            <span class="mval"><span id="sleep-val">${sleepHrs}</span><small>h</small></span>
            <button id="sleep-inc" aria-label="More sleep">+</button>
          </span>
        </div>
      </div>

      <div class="sheet-section">
        <p class="sheet-section-label">Note</p>
        <textarea class="note-area" id="day-note" placeholder="A line or two. How it went, how it felt.">${note.replace(/</g, '&lt;')}</textarea>
      </div>

      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">Save</button>
      </div>
    `);

    // Sessions working copy
    const working = { ...sessions };
    sheet.querySelectorAll('.day-activity-row').forEach(row => {
      const key = row.dataset.key;
      const mv = row.querySelector('.mv');
      row.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const delta = Number(btn.dataset.delta);
          const next = Math.max(0, (working[key] || 0) + delta);
          working[key] = next;
          mv.textContent = next;
        });
      });
    });

    // Habits working copy
    const workingHabits = { ...habits };
    sheet.querySelectorAll('.habit-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const k = chip.dataset.habit;
        workingHabits[k] = !workingHabits[k];
        chip.classList.toggle('on', !!workingHabits[k]);
      });
    });

    // Sleep stepper
    let workingSleep = sleepHrs;
    const sleepValEl = sheet.querySelector('#sleep-val');
    const fmtSleep = (n) => (Number.isInteger(n) ? String(n) : n.toFixed(1));
    sleepValEl.textContent = fmtSleep(workingSleep);
    const stepSleep = (delta) => {
      workingSleep = Math.max(0, Math.min(14, Math.round((workingSleep + delta) * 2) / 2));
      sleepValEl.textContent = fmtSleep(workingSleep);
    };
    sheet.querySelector('#sleep-dec').addEventListener('click', () => stepSleep(-0.5));
    sheet.querySelector('#sleep-inc').addEventListener('click', () => stepSleep(0.5));

    sheet.querySelector('#cancel').addEventListener('click', () => {
      closeSheet();
      if (onClose) setTimeout(onClose, 180);
    });
    sheet.querySelector('#save').addEventListener('click', () => {
      const clean = {};
      for (const [k, v] of Object.entries(working)) if (v > 0) clean[k] = v;
      if (Object.keys(clean).length) state.sessions[dateISO] = clean;
      else delete state.sessions[dateISO];

      const cleanHabits = {};
      for (const [k, v] of Object.entries(workingHabits)) if (v) cleanHabits[k] = true;
      if (Object.keys(cleanHabits).length) state.habits[dateISO] = cleanHabits;
      else delete state.habits[dateISO];

      if (workingSleep > 0) state.sleep[dateISO] = workingSleep;
      else delete state.sleep[dateISO];

      const noteVal = sheet.querySelector('#day-note').value;
      if (noteVal.trim()) state.dayNotes[dateISO] = noteVal;
      else delete state.dayNotes[dateISO];

      save();
      renderTiles();
      renderTodayNoteBtn();
      closeSheet();
      if (onClose) setTimeout(onClose, 180);
    });
  }

  // --- Year view sheet -----------------------------------------------------

  function openYearView() {
    const today = new Date();
    const thisMonday = startOfWeek(today);
    const weeks = 52;
    const firstMonday = addDays(thisMonday, -(weeks - 1) * 7);

    const tiles = [];
    const monthMarkers = new Array(13).fill('');
    for (let i = 0; i < weeks; i++) {
      const m = addDays(firstMonday, i * 7);
      const iso = toISODate(m);
      const color = state.weekColors[iso];
      const isCurrent = i === weeks - 1;
      let cls = 'week blank';
      if (isCurrent) cls = 'week current';
      else if (color) cls = `week ${color}`;
      tiles.push(`<button class="${cls}" data-iso="${iso}" aria-label="Week of ${monthShort(m)} ${m.getDate()}"></button>`);
      const col = i % 13;
      if (!monthMarkers[col]) monthMarkers[col] = monthShort(m);
    }

    openSheet(`
      <h2>The year</h2>
      <p class="subtle">Every week, colored the way you saw it.</p>
      <div class="year-grid">${tiles.join('')}</div>
      <div class="year-labels">${monthMarkers.map(m => `<span>${m}</span>`).join('')}</div>
      <div class="sheet-actions" style="margin-top:22px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);
    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelectorAll('.year-grid .week').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        const [y, mo, d] = iso.split('-').map(Number);
        closeSheet();
        setTimeout(() => openWeekReview(new Date(y, mo - 1, d)), 200);
      });
    });
  }

  // --- Moment: quote & quiz ------------------------------------------------

  // Normalize strings for practice matching: collapse whitespace, lowercase,
  // strip most punctuation so small differences don't block the drill.
  function normalizePractice(s) {
    return (s || '')
      .toLowerCase()
      .replace(/[""''‘’“”]/g, '')
      .replace(/[.,;:!?—\-–()\[\]{}"']/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function openQuote(opts) {
    const isToday = !opts || !opts.dateISO;
    const dateISO = isToday ? toISODate(new Date()) : opts.dateISO;
    const q = pickQuoteForDate(parseISO(dateISO));
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    const subtitle = isToday
      ? 'A line from the canon. Sit with it if it earns it.'
      : fmt.format(parseISO(dateISO));

    if (isToday) { state.seenQuotes[dateISO] = true; save(); }

    const practiceCount = state.quotePractice[dateISO] || 0;
    const target = q.text;
    const practiceHTML = isToday ? renderPracticeBlock({
      target,
      count: practiceCount,
      placeholder: 'Type the quote. Press enter after each try.',
      label: 'Practice writing',
      longForm: target.length > 80,
    }) : '';

    openSheet(`
      <h2>Quote of the day</h2>
      <p class="subtle">${subtitle}</p>
      <p class="quote-body">"${q.text}"</p>
      <p class="quote-attrib"><strong>${q.author}</strong> · ${q.year} · ${q.source}</p>
      <p class="quote-meaning-label">What it means</p>
      <p class="quote-meaning">${q.meaning}</p>
      ${practiceHTML}
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);
    sheet.querySelector('#cancel').addEventListener('click', closeSheet);

    if (isToday) wirePractice({
      target,
      getCount: () => state.quotePractice[dateISO] || 0,
      setCount: (n) => {
        if (n > 0) state.quotePractice[dateISO] = n;
        else delete state.quotePractice[dateISO];
        save();
      },
      onChange: renderMomentTiles,
    });
  }

  function openWord(opts) {
    const isToday = !opts || !opts.dateISO;
    const dateISO = isToday ? toISODate(new Date()) : opts.dateISO;
    const w = pickWordForDate(parseISO(dateISO));
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    const subtitle = isToday ? 'One word. Small tool, sharp edge.' : fmt.format(parseISO(dateISO));

    if (isToday) { state.seenWords[dateISO] = true; save(); }

    const practiceCount = state.wordPractice[dateISO] || 0;
    const target = w.word;
    const practiceHTML = isToday ? renderPracticeBlock({
      target,

    }) : '';

  function renderPracticeBlock({ target, count, placeholder, label, longForm }) {
    const segs = new Array(5).fill(0).map((_, i) => `<span class="${i < count ? 'on' : ''}"></span>`).join('');
    if (count >= 5) {
      return `
        <div class="sheet-section">
          <p class="practice-label"><span>${label}</span><span class="practice-count">5 / 5</span></p>
          <div class="practice-bar">${segs}</div>
          <div class="practice-complete">
            <span class="check-circle">✓</span>
            <span class="label">Complete. Well done.</span>
            <button class="reset" id="practice-reset">Reset</button>
          </div>
        </div>
      `;
    }
    const inputTag = longForm
      ? `<textarea class="practice-input" id="practice-input" rows="3" placeholder="${placeholder}"></textarea>`
      : `<input class="practice-input" id="practice-input" placeholder="${placeholder}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
    return `
      <div class="sheet-section">
        <p class="practice-label"><span>${label}</span><span class="practice-count">${count} / 5</span></p>
        ${inputTag}
        <div class="practice-bar">${segs}</div>
        <p class="practice-hint">Write it out five times to commit it to memory.</p>
      </div>
    `;
  }

  function wirePractice({ target, getCount, setCount, onChange }) {
    const normalizedTarget = normalizePractice(target);
    const input = sheet.querySelector('#practice-input');
    const countEl = sheet.querySelector('.practice-count');
    const bar = sheet.querySelector('.practice-bar');
    const resetBtn = sheet.querySelector('#practice-reset');

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        setCount(0);
        if (onChange) onChange();
        // Refresh this sheet by reopening the current path — simplest:
        closeSheet();
      });
    }
    if (!input) return;

    const submit = () => {
      const val = normalizePractice(input.value);
      if (!val) return;
      if (val === normalizedTarget) {
        const next = Math.min(5, getCount() + 1);
        setCount(next);
        input.value = '';
        // Update bar + count inline
        if (countEl) countEl.textContent = `${next} / 5`;
        if (bar) {
          [...bar.children].forEach((seg, i) => seg.classList.toggle('on', i < next));
        }
        if (next >= 5) {
          // Swap the input area for the "complete" card
          const section = input.closest('.sheet-section');
          section.innerHTML = `
            <p class="practice-label"><span>Practice writing</span><span class="practice-count">5 / 5</span></p>
            <div class="practice-bar">${new Array(5).fill('<span class="on"></span>').join('')}</div>
            <div class="practice-complete">
              <span class="check-circle">✓</span>
              <span class="label">Complete. Well done.</span>
              <button class="reset" id="practice-reset">Reset</button>
            </div>
          `;
          section.querySelector('#practice-reset').addEventListener('click', () => {
            setCount(0);
            if (onChange) onChange();
            closeSheet();
          });
        }
        if (onChange) onChange();
      } else {
        // Light feedback: brief border flash
        input.style.borderColor = 'var(--terracotta)';
        setTimeout(() => { input.style.borderColor = ''; }, 400);
      }
    };

    input.addEventListener('keydown', (e) => {
      // Enter submits; for textarea we require Ctrl/Cmd+Enter? Let plain Enter work.
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
  }

  function openQuiz() {
    const todayISO = toISODate(new Date());
    const quiz = pickQuizForDate(new Date());
    const prior = state.quizResults[todayISO];

    const optionBtns = quiz.options.map(opt => {
      let cls = 'quiz-option';
      if (prior) {
        if (opt === quiz.answer) cls += ' correct';
        else if (opt === prior.answer) cls += ' wrong';
        else cls += ' muted';
      }
      return `<button class="${cls}" data-opt="${opt.replace(/"/g, '&quot;')}"${prior ? ' disabled' : ''}>${opt}</button>`;
    }).join('');

    let resultHTML = '';
    if (prior) {
      resultHTML = prior.correct
        ? `<div class="quiz-result"><strong>You got it.</strong> ${quiz.answer} is the capital of ${quiz.country}.</div>`
        : `<div class="quiz-result"><strong>Not quite.</strong> The capital of ${quiz.country} is <strong>${quiz.answer}</strong>.</div>`;
    }

    openSheet(`
      <h2>Geography</h2>
      <p class="subtle">One question a day. Same question if you come back later.</p>
      <p class="quiz-question">What is the capital of ${quiz.country}?</p>
      <div class="quiz-options" id="quiz-opts">${optionBtns}</div>
      <div id="quiz-result-slot">${resultHTML}</div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);

    if (!prior) {
      sheet.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const chosen = btn.dataset.opt;
          const correct = chosen === quiz.answer;
          state.quizResults[todayISO] = { answer: chosen, correct };
          save();

          // Re-style options in place
          sheet.querySelectorAll('.quiz-option').forEach(b => {
            b.disabled = true;
            const v = b.dataset.opt;
            if (v === quiz.answer) b.classList.add('correct');
            else if (v === chosen) b.classList.add('wrong');
            else b.classList.add('muted');
          });

          const slot = sheet.querySelector('#quiz-result-slot');
          slot.innerHTML = correct
            ? `<div class="quiz-result"><strong>You got it.</strong> ${quiz.answer} is the capital of ${quiz.country}.</div>`
            : `<div class="quiz-result"><strong>Not quite.</strong> The capital of ${quiz.country} is <strong>${quiz.answer}</strong>.</div>`;

          renderMomentTiles();
        });
      });
    }
  }

  function renderMomentTiles() {
    const q = pickQuoteForDate(new Date());
    const preview = q.text.length > 52 ? q.text.slice(0, 52).trim() + '…' : q.text;
    const qp = document.getElementById('quote-preview');
    if (qp) qp.textContent = '"' + preview + '"';

    const w = pickWordForDate(new Date());
    const wp = document.getElementById('word-preview');
    if (wp) wp.textContent = `${w.word} — ${w.definition.replace(/\.$/, '').slice(0, 54)}${w.definition.length > 55 ? '…' : '.'}`;

    const todayISO = toISODate(new Date());
    const prior = state.quizResults[todayISO];
    const quiz = pickQuizForDate(new Date());
    const quizTile = document.getElementById('open-quiz');
    const qzp = document.getElementById('quiz-preview');
    if (!qzp || !quizTile) return;

    // Clear old badge
    const oldBadge = quizTile.querySelector('.mbadge');
    if (oldBadge) oldBadge.remove();

    if (prior) {
      qzp.textContent = `Capital of ${quiz.country}`;
      quizTile.classList.add('answered');
      const badge = document.createElement('span');
      badge.className = 'mbadge' + (prior.correct ? '' : ' wrong');
      badge.textContent = prior.correct ? 'Answered correctly' : 'Answered';
      quizTile.appendChild(badge);
    } else {
      qzp.textContent = `Capital of ${quiz.country}?`;
      quizTile.classList.remove('answered');
    }
  }

  // --- Archive -------------------------------------------------------------

  function openArchive(tab) {
    const active = tab === 'words' ? 'words' : 'quotes';
    const quoteDays = Object.keys(state.seenQuotes).sort().reverse();
    const wordDays = Object.keys(state.seenWords).sort().reverse();

    const fmtDate = new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

    let listHTML;
    if (active === 'quotes') {
      if (quoteDays.length === 0) {
        listHTML = `<p class="archive-empty">Nothing here yet. Open a quote of the day to start your archive.</p>`;
      } else {
        listHTML = `<div class="archive-list">${quoteDays.map(iso => {
          const q = pickQuoteForDate(parseISO(iso));
          const done = (state.quotePractice[iso] || 0) >= 5;
          const preview = q.text.length > 48 ? q.text.slice(0, 48).trim() + '…' : q.text;
          return `
            <button class="archive-item" data-iso="${iso}">
              <span class="aleft">
                <span class="adate">${fmtDate.format(parseISO(iso))} · ${q.author}</span>
                <span class="atext">"${preview}"</span>
              </span>
              ${done ? '<span class="abadge">Memorized</span>' : ''}
            </button>
          `;
        }).join('')}</div>`;
      }
    } else {
      if (wordDays.length === 0) {
        listHTML = `<p class="archive-empty">Nothing here yet. Open a word of the day to start your archive.</p>`;
      } else {
        listHTML = `<div class="archive-list">${wordDays.map(iso => {
          const w = pickWordForDate(parseISO(iso));
          const done = (state.wordPractice[iso] || 0) >= 5;
          return `
            <button class="archive-item" data-iso="${iso}">
              <span class="aleft">
                <span class="adate">${fmtDate.format(parseISO(iso))} · ${w.pos}</span>
                <span class="atext">${w.word} — ${w.definition.replace(/\.$/, '')}</span>
              </span>
              ${done ? '<span class="abadge">Memorized</span>' : ''}
            </button>
          `;
        }).join('')}</div>`;
      }
    }

    openSheet(`
      <h2>Archive</h2>
      <p class="subtle">Every quote and word you've opened.</p>
      <div class="archive-tabs">
        <button class="archive-tab ${active === 'quotes' ? 'active' : ''}" data-tab="quotes">Quotes <small>(${quoteDays.length})</small></button>
        <button class="archive-tab ${active === 'words' ? 'active' : ''}" data-tab="words">Words <small>(${wordDays.length})</small></button>
      </div>
      ${listHTML}
      <div class="sheet-actions" style="margin-top:22px">
        <button class="btn btn-ghost" id="cancel">Close</button>
      </div>
    `);

    sheet.querySelector('#cancel').addEventListener('click', closeSheet);
    sheet.querySelectorAll('.archive-tab').forEach(el => {
      el.addEventListener('click', () => {
        closeSheet();
        setTimeout(() => openArchive(el.dataset.tab), 180);
      });
    });
    sheet.querySelectorAll('.archive-item').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        closeSheet();
        setTimeout(() => {
          if (active === 'quotes') openQuote({ dateISO: iso });
          else openWord({ dateISO: iso });
        }, 180);
      });
    });
  }

  // --- Today note button ---------------------------------------------------

  function renderTodayNoteBtn() {
    const btn = document.getElementById('today-note-btn');
    if (!btn) return;
    const iso = toISODate(new Date());
    const note = state.dayNotes[iso] || '';
    if (note.trim()) {
      btn.classList.add('has-note');
      const preview = note.length > 60 ? note.slice(0, 60).trim() + '…' : note;
      btn.textContent = preview;
    } else {
      btn.classList.remove('has-note');
      btn.textContent = 'Leave a note for today…';
    }
  }

  // --- Boot ----------------------------------------------------------------

  function renderAll() {
    renderHeader();
    renderChain();
    renderPreStart();
    renderTiles();
    renderTodayNoteBtn();
    renderMomentTiles();
  }

  document.getElementById('open-year').addEventListener('click', openYearView);
  document.getElementById('open-year-2').addEventListener('click', openYearView);
  document.getElementById('open-settings').addEventListener('click', openSettings);
  document.getElementById('open-guide').addEventListener('click', openGuide);
  document.getElementById('open-quote').addEventListener('click', () => openQuote());
  document.getElementById('open-word').addEventListener('click', () => openWord());
  document.getElementById('open-quiz').addEventListener('click', openQuiz);
  document.getElementById('open-archive').addEventListener('click', () => openArchive());
  document.getElementById('today-note-btn').addEventListener('click', () => {
    const iso = toISODate(new Date());
    openDay(iso);
  });

  renderAll();
})();
</script>
</body>
</html>
